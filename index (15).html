function splitEnglishSyllables(word){
  // Split a Latin/English word into syllables
  // Simple algorithm: split on vowel-consonant-vowel boundaries
  if(!word||word.length<=2) return [word];
  let w=word.toLowerCase();
  let chars=[...w];
  let len=chars.length;
  function isVowel(c){return /[aeiouyáéíóúàèìòùäëïöüâêîôûãõ]/.test(c);}

  let breaks=[0]; // positions where we start new syllables
  for(let i=1;i<len-1;i++){
    let prev=chars[i-1],cur=chars[i],next=chars[i+1];
    // Split between consonant clusters: V-C-V → V | CV
    if(!isVowel(prev)&&isVowel(cur)&&!isVowel(next)){continue;}
    // Split between two consonants between vowels: VC-CV
    if(isVowel(prev)&&!isVowel(cur)&&!isVowel(next)&&i+2<len&&isVowel(chars[i+1])){
      breaks.push(i);continue;
    }
    // Vowel followed by consonant then vowel: split before consonant
    if(isVowel(prev)&&!isVowel(cur)&&isVowel(next)){
      breaks.push(i);continue;
    }
    // Two vowels together: split between them
    if(isVowel(prev)&&isVowel(cur)&&prev!==cur){
      breaks.push(i);continue;
    }
  }
  breaks.push(len);
  // Build syllable chunks from original casing
  let origChars=[...word];
  let syllables=[];
  for(let b=0;b<breaks.length-1;b++){
    syllables.push(origChars.slice(breaks[b],breaks[b+1]).join(''));
  }
  // Merge single-char leftovers at edges
  if(syllables.length>1&&syllables[0].length===1) syllables=[syllables[0]+syllables[1],...syllables.slice(2)];
  if(syllables.length>1&&syllables[syllables.length-1].length===1){
    let last=syllables.pop();syllables[syllables.length-1]+=last;
  }
  return syllables.filter(s=>s.length>0).length>=2?syllables.filter(s=>s.length>0):[word];
}

/* ── SORT TILE CHUNKING ── */
function isKanaOrCJK(str){
  // Returns true if the string is primarily CJK / kana (should stay as individual chars)
  let cjkCount=0,total=[...str].length;
  for(let ch of str){
    let cp=ch.codePointAt(0);
    // Hiragana, Katakana, CJK Unified, CJK Extension ranges
    if((cp>=0x3040&&cp<=0x30FF)||(cp>=0x4E00&&cp<=0x9FFF)||(cp>=0x3400&&cp<=0x4DBF)||(cp>=0xF900&&cp<=0xFAFF)){cjkCount++;}
  }
  return total>0&&(cjkCount/total)>=0.5;
}

function splitSortTiles(word, mode){
  // mode: "chars" = individual letters, "chunks" = syllable groups (default)
  // For CJK/kana: always individual characters regardless of mode
  if(isKanaOrCJK(word)) return [...word];

  // "chars" mode: every letter is its own tile
  if(mode==="chars") return [...word];

  // "chunks" mode: syllable-like groups
  let chars=[...word];
  let len=chars.length;
  if(len<=3) return [word];
  if(len<=5) return splitEvenly(chars,2);

  function isVowel(c){return /[aeiouáéíóúàèìòùäëïöüâêîôûãõ]/i.test(c);}

  let chunks=[];
  let i=0;
  while(i<len){
    let chunkSize=2;
    if(i+2<len){
      let c2=chars[i+1];
      let c3=i+2<len?chars[i+2]:null;
      if(!isVowel(c2)&&c3&&!isVowel(c3)){chunkSize=3;}
      else{chunkSize=2;}
    }
    let remaining=len-i;
    if(remaining-chunkSize===1) chunkSize++;
    if(chunkSize>remaining) chunkSize=remaining;
    chunks.push(chars.slice(i,i+chunkSize).join(''));
    i+=chunkSize;
  }
  return chunks.length>=2?chunks:[word];
}

function splitEvenly(chars,n){
  let len=chars.length,chunks=[];
  let base=Math.floor(len/n),rem=len%n,i=0;
  for(let j=0;j<n;j++){let sz=base+(j<rem?1:0);chunks.push(chars.slice(i,i+sz).join(''));i+=sz;}
  return chunks;
}

/* ── SORT MODE GAME ── */
let _sortAnswer="";
let _sortTiles=[];
let _sortPlaced=[];
let _sortChunks=[]; // The original ordered chunks (for comparison)
let _sortSplitMode="chunks"; // "letter", "chunks" (syllable-like groups), "syllable" (proper syllables)

function renderSortGame(){
  isLocked=false;_delayTimer=null;_skipCooldown=false;_wordShownAt=Date.now();
  _sortPlaced=[];

  // Determine the word to sort and the hint based on gameType
  let sortWord="", hint="";
  if(gameType==="kanji-hira"){
    sortWord=currentWord.kanji; hint=currentWord.hira;
  } else if(gameType==="kanji-arti"){
    sortWord=currentWord.kanji; hint=currentWord.arti;
  } else if(gameType==="hira-kanji"){
    sortWord=currentWord.hira; hint=currentWord.kanji;
  } else if(gameType==="arti-kanji"){
    sortWord=currentWord.arti; hint=currentWord.kanji;
  } else {
    sortWord=currentWord.kanji; hint=currentWord.hira||currentWord.arti;
  }

  // Fallback if field is empty
  if(!sortWord||sortWord==='-') sortWord=currentWord.kanji||currentWord.hira||currentWord.arti||"?";

  _sortAnswer=sortWord;
  let isCJK=isKanaOrCJK(sortWord);

  // For CJK: always single chars, no split toggle
  if(isCJK) _sortSplitMode="letter";

  function getChunksForMode(mode){
    if(isCJK||mode==="letter") return [...sortWord];
    if(mode==="syllable") return splitEnglishSyllables(sortWord);
    return splitSortTiles(sortWord,"chunks"); // chunks mode
  }

  function buildTiles(mode){
    let chunks=getChunksForMode(mode);
    // Shuffle but don't give away answer
    let shuffled=[...chunks];
    let attempts=0;
    do{shuffled=shuffle([...chunks]);attempts++;}
    while(attempts<20&&shuffled.join('')===_sortAnswer&&chunks.length>1);
    return{chunks,tiles:shuffled};
  }

  let {chunks,tiles}=buildTiles(_sortSplitMode);
  _sortChunks=chunks;
  _sortTiles=tiles;

  let progress=sessionTotal>0?Math.floor(((sessionTotal-sessionWords.length)/sessionTotal)*100):0;
  let hmLabel=getHardnessMult()>1?`<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--purple);margin-left:4px;">×${getHardnessMult()}</span>`:'';
  // Sort game unified status bar
  let sortStatusChips=[];
  if(combo>=3){let cm=comboMultiplier(combo);let cc=combo>=20?'#ff4dff':combo>=10?'#ff8040':'var(--accent2)';sortStatusChips.push(`<span style="font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:${cc};padding:2px 8px;background:${cc}18;border:1px solid ${cc}55;">🔥 ×${combo} <span style="font-size:10px;font-family:'Share Tech Mono',monospace;color:${cc}99;">[${cm}×XP]</span></span>`);}
  if(glitchWordActive) sortStatusChips.push(`<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#ff2060;padding:2px 7px;border:1px solid rgba(255,32,96,0.4);animation:pulse 0.4s ease infinite alternate;">⚠ GLITCH</span>`);
  if(luckyWordActive) sortStatusChips.push(`<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#3ac864;padding:2px 7px;border:1px solid rgba(58,200,100,0.35);animation:pulse 0.6s ease infinite alternate;">${luckyBonusWordActive?'✦ BONUS':'🍀 LUCKY'}</span>`);
  let sortStatusBarHtml=sortStatusChips.length?`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px;">${sortStatusChips.join('')}</div>`:'';
  let timerBar="";
  if(hardcoreMode){timerBar=`<div class="ark-progress"><div id="timerFill" class="ark-progress-fill" style="width:100%;transition:width linear ${hardcoreTimer}ms;background:linear-gradient(90deg,#c94040,#e87070);"></div></div>`;}

  function tileFontSize(chunks){return isCJK?'24px':(chunks.some(c=>c.length>2)?'18px':'22px');}
  function tileMinW(chunks){return isCJK?'44px':(chunks.some(c=>c.length>2)?'44px':'40px');}

  // Dagger weapon: 30% chance to reveal extra hint in sort game
  let _daggerHint='';
  if(hasWeapon("dagger")&&gameMode==="sort"&&Math.random()<0.30){
    _daggerHint=`<div style="display:inline-block;background:rgba(192,96,255,0.08);border:1px solid #c060ff44;padding:3px 10px;margin-top:4px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#c060ff;letter-spacing:2px;">🗡️ DAGGER HINT: <b style="color:#e0a0ff;">${sortWord}</b></div>`;
  }
  // BookMagic: always show answer hint in typing mode
  let _bookHint='';
  if(hasWeapon("bookmagic")&&gameMode==="typing"){
    _bookHint=`<div style="display:inline-block;background:rgba(192,96,255,0.08);border:1px solid #c060ff44;padding:3px 10px;margin-top:4px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#c060ff;letter-spacing:2px;">📖 BOOK HINT: <b style="color:#e0a0ff;">${sortWord}</b></div>`;
  }
  let qLabel=appLang==='jp'?'ヒント':'HINT';
  let hintLabel=appLang==='jp'?'並び替える単語を作る':'Arrange the tiles to form the word';

  // Split toggle — only show for Latin words
  let splitToggleHtml=!isCJK?`
    <div style="display:flex;justify-content:center;gap:6px;margin-bottom:8px;">
      <button id="split-letter-btn" style="width:auto;padding:5px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;justify-content:center;${_sortSplitMode==='letter'?'border-color:var(--accent);color:var(--accent);background:rgba(232,168,56,0.1);':'border-color:var(--border);color:var(--text-dim);background:var(--bg-card);'}">A-B-C</button>
      <button id="split-syllable-btn" style="width:auto;padding:5px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;justify-content:center;${_sortSplitMode==='chunks'?'border-color:var(--accent);color:var(--accent);background:rgba(232,168,56,0.1);':'border-color:var(--border);color:var(--text-dim);background:var(--bg-card);'}">AB-CD</button>
      <button id="split-eng-syl-btn" style="width:auto;padding:5px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;justify-content:center;${_sortSplitMode==='syllable'?'border-color:var(--blue);color:var(--blue);background:rgba(58,114,176,0.1);':'border-color:var(--border);color:var(--text-dim);background:var(--bg-card);'}">SYL</button>
    </div>`:'';

  let _sortNoteExists=!!(currentWord.note&&currentWord.note.trim());
  app.innerHTML=`<div class="container">
    <div class="ark-header"><button class="back" data-action="exitGame">${appLang==='jp'?'退出':'EXIT'}</button><div class="ark-title">Sort <span>Op</span></div><div class="ark-badge" style="margin-left:auto;">${sessionWords.length} ${appLang==='jp'?'残り':'LEFT'}</div>${hmLabel}<button id="sort-note-btn" class="note-btn ${_sortNoteExists?'has-note':'no-note'}" title="${appLang==='jp'?'ノート':'Note'}">${_sortNoteExists?'📝':'📋'}</button></div>
    <div class="ark-progress"><div class="ark-progress-fill" style="width:${progress}%;"></div></div>
    ${hardcoreMode?`<div class="ark-lives">❤ ${appLang==='jp'?'ライフ':'LIVES'}: ${lives}</div>`:""}
    ${sortStatusBarHtml}
    <div style="text-align:center;padding:10px 0 4px;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;">${qLabel}</div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-top:4px;word-break:break-all;">${hint}</div>
      ${_daggerHint}
    </div>
    ${timerBar}
    <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-align:center;margin:10px 0 6px;">${hintLabel}</div>
    ${splitToggleHtml}

    <div id="sort-answer-area" style="min-height:64px;background:var(--bg-card);border:2px dashed var(--border);border-radius:0;padding:10px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;margin-bottom:12px;transition:border-color 0.2s;">
      <div id="sort-placeholder" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:2px;">${appLang==='jp'?'// ここに並べる //':'// ARRANGE HERE //'}</div>
    </div>

    <div id="sort-tile-area" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:12px;background:var(--bg-panel);border:1px solid var(--border);">
    </div>

    <button id="sort-submit-btn" style="justify-content:center;margin-top:10px;border-color:var(--green);color:var(--green);" disabled>⬛ ${appLang==='jp'?'確認':'CONFIRM'}</button>
    <button id="sort-clear-btn" style="justify-content:center;margin-top:4px;border-color:var(--border);color:var(--text-dim);">✕ ${appLang==='jp'?'クリア':'CLEAR'}</button>
    <div id="sort-info" style="font-family:'Share Tech Mono',monospace;font-size:13px;text-align:center;padding:8px;margin-top:4px;"></div>
  </div>`;

  if(hardcoreMode){
    setTimeout(()=>{let f=document.getElementById("timerFill");if(f)f.style.width="0%";},50);
    timerInterval=setTimeout(handleHardcoreFail,hardcoreTimer);
  }

  // Sort game note button
  let sortNoteBtn=document.getElementById("sort-note-btn");
  if(sortNoteBtn) sortNoteBtn.addEventListener("click",()=>{
    openNoteModal(currentWord.kanji,currentWord.hira,currentWord.arti,function(newNote){
      let btn=document.getElementById("sort-note-btn");
      if(btn){let has=!!(newNote&&newNote.trim());btn.className='note-btn '+(has?'has-note':'no-note');btn.textContent=has?'📝':'📋';}
    });
  });

  function renderTileArea(){
    let area=document.getElementById("sort-tile-area");
    if(!area)return;
    let fs=tileFontSize(_sortChunks);
    let mw=tileMinW(_sortChunks);
    area.innerHTML=_sortTiles.map((ch,i)=>`<button class="sort-tile" data-tile-idx="${i}" style="width:auto;min-width:${mw};padding:10px 14px;font-family:'Rajdhani',sans-serif;font-size:${fs};font-weight:700;letter-spacing:1px;justify-content:center;border-color:var(--accent-dim);color:var(--text-bright);background:var(--bg-card2);">${ch}</button>`).join('');
    // Re-wire tile click handlers
    area.querySelectorAll(".sort-tile").forEach(btn=>{
      btn.addEventListener("click",()=>{
        if(isLocked)return;
        let idx=parseInt(btn.getAttribute("data-tile-idx"));
        let ch=_sortTiles[idx];
        _sortPlaced.push({idx,ch});
        btn.style.display="none";
        renderPlaced();
        updateSubmit();
      });
    });
  }

  function renderPlaced(){
    let area=document.getElementById("sort-answer-area");
    let ph=document.getElementById("sort-placeholder");
    if(!area)return;
    let fs=tileFontSize(_sortChunks);
    let mw=tileMinW(_sortChunks);
    area.querySelectorAll(".sort-placed").forEach(e=>e.remove());
    if(_sortPlaced.length>0){
      if(ph)ph.style.display="none";
      _sortPlaced.forEach((item,p)=>{
        let btn=document.createElement("button");
        btn.className="sort-placed";
        btn.style.cssText=`width:auto;min-width:${mw};padding:10px 14px;font-family:'Rajdhani',sans-serif;font-size:${fs};font-weight:700;letter-spacing:1px;justify-content:center;border-color:var(--accent);color:var(--accent);background:rgba(232,168,56,0.1);margin:3px;`;
        btn.textContent=item.ch;
        btn.addEventListener("click",()=>{
          _sortPlaced.splice(p,1);
          let srcTile=document.querySelector(`.sort-tile[data-tile-idx="${item.idx}"]`);
          if(srcTile)srcTile.style.display="";
          renderPlaced();
          updateSubmit();
        });
        area.appendChild(btn);
      });
    } else {
      if(ph)ph.style.display="";
    }
  }

  function updateSubmit(){
    let btn=document.getElementById("sort-submit-btn");
    if(btn) btn.disabled=_sortPlaced.length<_sortChunks.length;
  }

  function applyMode(mode){
    if(_sortSplitMode===mode)return;
    _sortSplitMode=mode;
    // Reset placement and regenerate tiles with new split
    _sortPlaced=[];
    // Reset answer area
    let area=document.getElementById("sort-answer-area");
    if(area){area.style.borderColor="var(--border)";area.querySelectorAll(".sort-placed").forEach(e=>e.remove());}
    let ph=document.getElementById("sort-placeholder");
    if(ph)ph.style.display="";
    // Rebuild chunks & tiles
    let built=buildTiles(mode);
    _sortChunks=built.chunks;
    _sortTiles=built.tiles;
    // Update toggle button styles
    let lb=document.getElementById("split-letter-btn");
    let sb=document.getElementById("split-syllable-btn");
    let eb=document.getElementById("split-eng-syl-btn");
    if(lb){lb.style.borderColor=mode==='letter'?'var(--accent)':'var(--border)';lb.style.color=mode==='letter'?'var(--accent)':'var(--text-dim)';lb.style.background=mode==='letter'?'rgba(232,168,56,0.1)':'var(--bg-card)';}
    if(sb){sb.style.borderColor=mode==='chunks'?'var(--accent)':'var(--border)';sb.style.color=mode==='chunks'?'var(--accent)':'var(--text-dim)';sb.style.background=mode==='chunks'?'rgba(232,168,56,0.1)':'var(--bg-card)';}
    if(eb){eb.style.borderColor=mode==='syllable'?'var(--blue)':'var(--border)';eb.style.color=mode==='syllable'?'var(--blue)':'var(--text-dim)';eb.style.background=mode==='syllable'?'rgba(58,114,176,0.1)':'var(--bg-card)';}
    renderTileArea();
    updateSubmit();
  }

  // Wire split toggle buttons
  let lBtn=document.getElementById("split-letter-btn");
  let sBtn=document.getElementById("split-syllable-btn");
  let eBtn=document.getElementById("split-eng-syl-btn");
  if(lBtn) lBtn.addEventListener("click",()=>applyMode("letter"));
  if(sBtn) sBtn.addEventListener("click",()=>applyMode("chunks"));
  if(eBtn) eBtn.addEventListener("click",()=>applyMode("syllable"));

  // Wire clear & submit
  document.getElementById("sort-clear-btn").addEventListener("click",()=>{
    if(isLocked)return;
    _sortPlaced=[];
    document.querySelectorAll(".sort-tile").forEach(b=>b.style.display="");
    renderPlaced();
    updateSubmit();
  });

  document.getElementById("sort-submit-btn").addEventListener("click",()=>{
    if(isLocked)return;
    let answer=_sortPlaced.map(x=>x.ch).join('');
    checkSortAnswer(answer,_sortAnswer);
  });

  // Initial render
  renderTileArea();
  updateSubmit();
}

function checkSortAnswer(userAnswer, correct){
  if(isLocked)return;isLocked=true;
  if(hardcoreMode)clearTimeout(timerInterval);
  let info=document.getElementById("sort-info");
  let answerArea=document.getElementById("sort-answer-area");
  // Case-insensitive for Latin text; exact for CJK/kana
  let isCorrect=isKanaOrCJK(correct)?(userAnswer===correct):(userAnswer.toLowerCase()===correct.toLowerCase());
  if(isCorrect){
    if(answerArea)answerArea.style.borderColor="var(--green)";
    if(info)info.innerHTML=`<span style="color:#5ecf8a;">✅ ${appLang==='jp'?'正解！':'CORRECT!'} — ${correct}</span>`;
  } else {
    if(answerArea)answerArea.style.borderColor="var(--red)";
    if(info)info.innerHTML=`<span style="color:#e86060;">✗ ${appLang==='jp'?'不正解':'WRONG'} — ${appLang==='jp'?'正解:':'ANSWER:'} <b>${correct}</b></span>`;
  }
  document.querySelectorAll(".sort-tile,.sort-placed").forEach(b=>b.disabled=true);
  let submitBtn=document.getElementById("sort-submit-btn");
  if(submitBtn)submitBtn.disabled=true;
  processAnswer(isCorrect);
}

/* ══════════════════════════════════════════════════════════════
   BACK BUTTON / HARDWARE BACK NAVIGATION SYSTEM v4
   ─ Internal stack is the single source of truth for navigation
   ─ Browser history is FIXED at exactly 2 entries forever:
       [0] base  (replaceState, _kotoba:"base")
       [1] guard (pushState,    _kotoba:"guard")
   ─ Every popstate fires from guard→base, we immediately
     re-push guard so the 2-entry structure is always restored.
   ─ UI back buttons also pop the stack (same as hardware back)
     so pressing back always goes to the real previous screen.
   ─ No drift, no accumulation, works forever.
   ══════════════════════════════════════════════════════════════ */
(function(){

  /* ── Internal nav stack [{name, args}, …] last = current ── */
  let _navStack = [];
  let _inPopstate = false;
  let _inUIBack  = false;

  /* ── Store originals before wrapping ── */
  const _origFns = {};
  const _screenNames = [
    "renderMenu","renderGlobalProfile","renderProfile","renderStats",
    "renderAchievements","renderDailyMissions","renderProgressHub",
    "renderKotoba","renderHistory","renderShare","renderGroup",
    "renderManageGrub","renderManageKotoba","renderMode","renderCustomAmount",
    "renderCustomGroupPick","renderCustomBlock","renderCurrentStepKotoba",
    "renderShop","renderAdvStats","renderBenkyouAnalyst",
    "renderManageGrubFree","renderManageKotobaFree","renderBenkyouAnalystProfile"
  ];
  _screenNames.forEach(n => {
    if(typeof window[n] === "function") _origFns[n] = window[n];
  });

  /* ── Wrap: push to stack only when navigating FORWARD (not back) ── */
  _screenNames.forEach(n => {
    if(!_origFns[n]) return;
    window[n] = function(...a){
      if(!_inPopstate && !_inUIBack){
        // Same screen re-invoked (e.g. switching pills/tabs) updates args in place —
        // it should not grow the back-stack. Only a genuinely different screen pushes.
        let last = _navStack[_navStack.length - 1];
        if(!last || last.name !== n){
          _navStack.push({name:n, args:a.slice()});
        } else {
          last.args = a.slice();
        }
      }
      _origFns[n].apply(this, a);
    };
  });

  /* ── Fix browser history to exactly 2 entries ── */
  history.replaceState({_kotoba:"base"}, "");
  history.pushState({_kotoba:"guard"}, "");

  /* ── Seed stack with initial menu ── */
  _navStack.push({name:"renderMenu", args:[]});

  /* ── Shared go-back logic (used by both hardware back & UI back buttons) ── */
  function _goBack(){
    /* Pop current screen off our stack (this also pops game-session markers —
       see _kotobaPushGameMarker below — so returning from gameplay/summary
       always lands correctly on the screen that was active before it, i.e.
       the game config screen, without skipping past it or drifting into
       unrelated history entries.) */
    if(_navStack.length > 1) _navStack.pop();

    /* Render the screen now at the top of the stack */
    let target = _navStack[_navStack.length - 1] || {name:"renderMenu", args:[]};
    let fn = _origFns[target.name];
    if(fn){
      fn.apply(null, target.args || []);
    } else {
      _origFns["renderMenu"]();
      _navStack = [{name:"renderMenu", args:[]}];
    }
  }

  /* ── Game-session marker: pushed once when a game session starts, so that
     back navigation (hardware or UI) from any in-game/summary/game-over
     screen — none of which are part of the tracked screen list — pops
     exactly back to the config screen beneath it, instead of skipping past
     it into whatever was open before that. ── */
  window._kotobaPushGameMarker = function(){
    let last = _navStack[_navStack.length - 1];
    if(!last || last.name !== "__gameSession__"){
      _navStack.push({name:"__gameSession__", args:[]});
    }
  };

  /* ── popstate: fires whenever hardware back is pressed (guard→base) ── */
  window.addEventListener("popstate", function(e){
    /* If a modal is currently open and handling its own back, skip nav logic. */
    if(window._kotobaModalOpen){
      /* Modal's own _modalPopstate handles closing + re-pushing guard */
      return;
    }

    /* Always immediately re-push guard to restore the 2-entry structure. */
    history.pushState({_kotoba:"guard"}, "");

    /* While a game session is actively in progress (not yet finished),
       hardware back should show the same "abandon mission" confirmation
       as the on-screen EXIT button, rather than silently discarding
       progress. Once the session has ended (summary/game-over screen),
       it behaves like a normal back press. */
    if(window._gameActive && typeof window.exitGame === "function"){
      window.exitGame();
      return;
    }

    _inPopstate = true;
    _goBack();
    _inPopstate = false;
  });

  /* ── Expose goBack so UI back buttons can call it ── */
  window._kotobaGoBack = function(){
    _inUIBack = true;
    _goBack();
    _inUIBack = false;
  };

})();

/* ── GLOBAL ACTION DISPATCHER ── */
/* ── NAV COOLDOWN: prevents ghost-tap triggering the new screen's buttons ── */
let _navCooldown=false;
function _setNavCooldown(){ _navCooldown=true; setTimeout(()=>{ _navCooldown=false; },320); }

app.addEventListener("click", function(e){
  let btn=e.target.closest("[data-action]");
  if(!btn) return;
  if(_navCooldown) return; // ghost-tap guard
  _SFX.click(); // ── UI click sound ──
  let parts=btn.getAttribute("data-action").split(":");
  let action=parts[0], args=parts.slice(1);
  // Set cooldown for any action that causes a screen transition
  const navActions=new Set(["goBack","renderMenu","renderGlobalProfile","renderProfile","renderStats","renderAchievements","renderDailyMissions","renderProgressHub","renderKotoba","renderHistory","renderShare","renderGroup","renderMode","renderCustomAmount","renderCustomGroupPick","renderCustomBlock","renderCurrentStepKotoba","startAll","startCustomAmount","startCustomBlock","exitGame","deleteProfileMenu","chooseStep","chooseStepBack","selectMode","startGame","stepAmt","selectBlock","renderShop","renderManageGrub","renderManageKotoba"]);
  if(navActions.has(action)) _setNavCooldown();
  switch(action){
    case "goBack":
      if(typeof window._kotobaGoBack === "function") window._kotobaGoBack();
      break;
    case "advStartHiddenBoss":       advStartHiddenBoss(); break;    case "advPickProfile":          advPickProfile(args.slice(0).join(":")); break;
    case "advSelectChar":          advSelectChar(args[0]); break;
    case "advChangeProfile":       advChangeProfile(); break;
    case "advNewGame":             advNewGame(); break;
    case "advBuyChar":             advBuyChar(args[0]); break;
    case "advStartRun":            advStartRun(); break;    case "advCombatAction":        advCombatAction(args.join(":")); break;
    case "advSubmitAnswer":        advSubmitAnswer(); break;
    case "advContinueMap":         advContinueMap(); break;
    case "advOpenShop":            advOpenShop(); break;
    case "advBuyItem":             advBuyItem(args[0]); break;
    case "advCloseShop":           advCloseShop(); break;
    case "advCombatChoice":        advCombatChoice(args[0]); break;
    case "advSortSubmit":          advSortSubmit(); break;
    case "advSortTile":            advSortTile(args[0]+":"+args[1]); break;
    case "advUseInventory":        advUseInventory(parseInt(args[0])); break;    case "advOpenCustomizeMenu":   advOpenCustomizeMenu(args[0]||"stats"); break;
    case "advStatUpgrade":         advStatUpgrade(args[0]); break;
    case "advBuyWeapon":           advBuyWeapon(args[0]); break;
    case "advEquipWeapon":         advEquipWeapon(args[0]); break;
    case "advBuyArmor":            advBuyArmor(args[0]); break;
    case "advEquipArmor":          advEquipArmor(args[0]); break;
    case "advStoreBuy":            advStoreBuy(args[0]); break;
    case "advUpgradeGear":         advUpgradeGear(args[0]); break;
    case "advUpgradeGearPassive":  advUpgradeGearPassive(args[0]); break;
    case "advScreenCharSelect":    advScreenCharSelect(); break;
    case "advCharDetail":          advCharDetail(args[0]); break;
    case "advAlmanac":             advAlmanac(); break;
    case "renderAdvStats":         renderAdvStats(); break;
    case "advEnemyDetail":         advEnemyDetail(args[0]); break;
    case "renderShop":         renderShop(args[0]||"ui"); if((args[0]||"ui")==="weapon")setTimeout(_wireWeaponShopControls,0); break;
    case "buyUI":              buyUI(args[0]); break;
    case "equipUI":            equipUI(args[0]); break;
    case "buyEffect":          buyEffect(args[0]); break;
    case "equipEffect":        equipEffect(args[0]); break;
    case "buySpecialEffect":   buySpecialEffect(args[0]); break;
    case "toggleSpecialEffect":toggleSpecialEffect(args[0]); break;
    case "doUpgrade":          doUpgrade(args[0]); break;
    case "toggleWpnFx":        {let fid=args[0];if(!shopData.weaponFxEnabled)shopData.weaponFxEnabled={};shopData.weaponFxEnabled[fid]=(shopData.weaponFxEnabled[fid]===false)?true:false;saveAll();renderShop("weapon");setTimeout(_wireWeaponShopControls,0);} break;
    case "unlockDiamond":      unlockDiamond(); break;
    case "buyEmblem":          buyEmblem(args[0]); break;
    case "toggleEmblem":       toggleEmblem(args[0]); break;
    case "buyWeapon":          buyWeapon(args[0]); break;
    case "equipWeapon":        equipWeapon(args[0]); break;
    case "unequipWeapon":      unequipWeapon(); break;
    case "setCrystalSlot":     setCrystalSlot(parseInt(args[0]),args[1]||null); break;
    case "renderMenu":           renderMenu(); break;
    case "renderGlobalProfile":  renderGlobalProfile(); break;
    case "renderProfile":        renderProfile(); break;
    case "renderStats":          renderStats(); break;
    case "renderAchievements":   renderAchievements(); break;
    case "renderDailyMissions":  renderDailyMissions(); break;
    case "renderProgressHub":    renderProgressHub(); break;
    case "renderKotoba":         renderKotoba(); break;
    case "renderHistory":        renderHistory(); break;
    case "renderShare":          renderShare(); break;
    case "renderGroup":          renderGroup(); break;
    case "renderManageGrub":     (currentProfile&&profiles[currentProfile]&&profiles[currentProfile].freeMode)?renderManageGrubFree():renderManageGrub(); break;
    case "renderManageKotoba":   (currentProfile&&profiles[currentProfile]&&profiles[currentProfile].freeMode)?renderManageKotobaFree(parseInt(args[0]||0)):renderManageKotoba(parseInt(args[0]||0)); break;
    case "renderMode":           renderMode(); break;
    case "renderCustomAmount":   renderCustomAmount(); break;
    case "renderCustomGroupPick": renderCustomGroupPick(); break;
    case "renderCustomBlock":    renderCustomBlock(); break;
    case "renderCurrentStepKotoba": renderCurrentStepKotoba(); break;
    case "startAll":             startAll(); break;
    case "startCustomAmount":    startCustomAmount(); break;
    case "startCustomBlock":     startCustomBlock(); break;
    case "exitGame":             exitGame(); break;
    case "deleteProfileMenu":    deleteProfileMenu(); break;
    case "revealFurigana":       {let fg=document.getElementById("furigana");if(fg)fg.style.display="block";} break;
    case "chooseStep":           chooseStep(parseInt(args[0])); break;
    case "chooseStepBack":       chooseStep(stepSize); break;
    case "selectMode":           selectMode(args[0]); break;
    case "startGame":            startGame(args[0]); break;
    case "stepAmt":              stepAmt(parseInt(args[0])); break;
    case "selectBlock":          selectBlock(parseInt(args[0]),parseInt(args[1])); break;
    case "clearHistory":
      if(confirm(t('confirmClearHist'))){sessionHistory=[];saveAll();renderHistory();}
      break;
    case "resetAllProgress": resetAllProgress(); break;
  }
});

/* ── SKIP ANSWER DELAY ON ANY KEY / TAP ── */
document.addEventListener("keydown", function(e){
  // Skip on any key except Tab/Shift/Ctrl/Alt/Meta (modifiers)
  if(isLocked && _delayTimer !== null && !_skipCooldown){
    const skip=["Tab","Shift","Control","Alt","Meta","CapsLock","Escape"].indexOf(e.key)===-1;
    if(skip){ e.preventDefault(); skipDelay(); }
  }
});
/* ── Pointer tracking: always follow mouse/touch for weapon FX origin ── */
document.addEventListener("mousemove",function(e){
  _lastPX=e.clientX; _lastPY=e.clientY;
},{passive:true});

document.addEventListener("touchstart",function(e){
  if(e.touches&&e.touches.length>0){
    _lastPX=e.touches[0].clientX;
    _lastPY=e.touches[0].clientY;
  }
  let willSkip=isLocked&&_delayTimer!==null&&!_skipCooldown&&!e.target.closest("button[data-action]");
  // Fire weapon FX only when NOT skipping and NOT in skip cooldown
  if(!willSkip&&!_skipCooldown&&getActiveWeaponIds().length&&uiMode!=="simple"){
    showWeaponTouchAnim(_lastPX,_lastPY);
  }
  if(willSkip){skipDelay();}
},{passive:true});

document.addEventListener("click",function(e){
  _lastPX=e.clientX; _lastPY=e.clientY;
  // Fire weapon FX — but NOT during skip cooldown, not on answer buttons, not on skip-advance
  if(!_skipCooldown&&getActiveWeaponIds().length&&uiMode!=="simple"){
    let isAnswerBtn=e.target.closest(".choiceBtn")||e.target.closest("#btnTyping")||e.target.closest("#sort-submit-btn");
    let isSkip=isLocked&&_delayTimer!==null&&!e.target.closest("button[data-action]");
    if(!isAnswerBtn&&!isSkip){
      showWeaponTouchAnim(e.clientX,e.clientY);
    }
  }
},{passive:true});

/* ── SAFETY WATCHDOG: recover from frozen game state ── */
(function(){
  let _watchdogTimer=null;
  setInterval(function(){
    if(isLocked&&_delayTimer===null&&!document.querySelector(".levelup-overlay")&&!document.getElementById("exit-warning-overlay")){
      if(!_watchdogTimer){
        _watchdogTimer=setTimeout(function(){
          _watchdogTimer=null;
          if(!isLocked)return;
          if(_delayTimer!==null||document.querySelector(".levelup-overlay")||document.getElementById("exit-warning-overlay"))return;
          console.warn("[Kotoba] Watchdog: frozen game detected, forcing nextWord()");
          isLocked=false;_skipCooldown=false;
          // Sweep all stale FX
          document.querySelectorAll("div[style*='position:fixed']").forEach(el=>{
            if(el.style.pointerEvents==="none"&&!el.className&&!el.id&&Object.keys(el.dataset).length===0){
              try{el.remove();}catch(e){}
            }
          });
          if(sessionWords&&sessionWords.length>0){nextWord();}
          else if(typeof renderSummary==="function"){renderSummary();}
        },8000);
      }
    }else{
      if(_watchdogTimer){clearTimeout(_watchdogTimer);_watchdogTimer=null;}
    }
  },2000);
})();

renderMenu();
applyAppSettings();
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  }).catch(()=>{});
}
</script>
