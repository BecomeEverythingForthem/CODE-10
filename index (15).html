    let size=_missionSize,buttons='';
    for(let start=0;start<total;start+=size){
      let end=Math.min(start+size,total),key=currentProfile+"-"+start+"-"+end;
      let _bp2=getBlockProgress(start,end),pct=_bp2.pct,avg=_bp2.avg;
      let played=playedGroups[key]?"played":"",rank=getRankStyle(_bp2);
      let statusTag=pct>=100?"<div style='font-size:8px;letter-spacing:2px;color:#b060e8;font-weight:700;margin-bottom:2px;'>✦ ALL MASTERED</div>":avg>=38?"<div style='font-size:8px;letter-spacing:2px;color:#3a9a5c;font-weight:700;margin-bottom:2px;'>✦ SOLID</div>":"";

    }
    blockContent=`
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin:10px 0 8px;">⬡ ${isJP?`ブロックを選択 — ${size}問単位`:`SELECT BLOCK — ${size} UNITS`}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);margin-bottom:8px;letter-spacing:1px;">📊 ${isJP?'平均コアスコアで進捗表示 · 赤0-15 · 白16-27 · 青28-37 · 緑38-50':'Avg core score → 🔴 0-15 · ⬜ 16-27 · 🔵 28-37 · 🟢 38-50 · 👑 all mastered'}</div>
      <div class="block-grid">${buttons}</div>`;
  }

  app.innerHTML=`<div class="container">
    <div class="ark-header"><button class="back" data-action="goBack">${t('back')}</button><div class="ark-title">${isJP?'ミッション <span>選択</span>':'Mission <span>Select</span>'}</div></div>
    ${renderXpBar()}

    <div style="background:var(--bg-card);border:1px solid var(--border);padding:10px 12px;margin-bottom:10px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);">
      <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--text-dim);margin-bottom:8px;">${isJP?'モード':'LANGUAGE MODE'}</div>
      <div style="display:flex;gap:6px;">
        <button id="btn-jp-mode" style="flex:1;justify-content:center;padding:7px 6px;font-size:11px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;${!globalMode?'border-color:var(--accent);color:var(--accent);background:rgba(232,168,56,0.12);font-weight:700;':'border-color:var(--border);color:var(--text-dim);'}">🇯🇵 ${isJP?'日本語':'JAPANESE'}</button>
        <button id="btn-global-mode" style="flex:1;justify-content:center;padding:7px 6px;font-size:11px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;${globalMode?'border-color:var(--blue);color:var(--blue);background:rgba(58,114,176,0.12);font-weight:700;':'border-color:var(--border);color:var(--text-dim);'}">🌐 ${isJP?'グローバル':'GLOBAL'}</button>
      </div>
    </div>

    <div style="background:var(--bg-card);border:1px solid var(--border);padding:10px 12px;margin-bottom:10px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);">
      <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--text-dim);margin-bottom:8px;">${isJP?'出題数':'DEPLOYMENT SIZE'}</div>
      <div style="display:flex;gap:6px;">
        ${isFree ? `
        ${pill(isJP?'ノーマル':'NORMAL',-3)}
        ${pill(isJP?'全部':'ALL',0,'var(--green)')}
        ${pill(isJP?'グループ':'GROUP',-2,'var(--purple)')}
        ${pill(isJP?'カスタム':'CUSTOM',-1,'var(--accent)')}
        ` : `
        ${pill('25',25)}
        ${pill('50',50)}
        ${pill(isJP?'全部':'ALL',0,'var(--green)')}
        ${pill(isJP?'カスタム':'CUSTOM',-1,'var(--accent)')}
        ${pill(isJP?'グループ':'GROUP',-2,'var(--purple)')}
        `}
      </div>
    </div>

    ${blockContent}

    <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px;">
      <button data-action="renderManageGrub" style="border-color:rgba(201,64,64,0.35);color:var(--red);background:rgba(201,64,64,0.04);font-size:12px;">⚙ &nbsp;${isJP?'グループ・単語を管理':'Manage Groups &amp; Kotoba'}</button>
    </div>
  </div>`;

  document.getElementById("btn-jp-mode").addEventListener("click",()=>{globalMode=false;saveAll();renderGroup();});
  document.getElementById("btn-global-mode").addEventListener("click",()=>{globalMode=true;saveAll();renderGroup();});

  // Custom amount slider binding
  let slider=document.getElementById("amtSlider");
  if(slider) slider.addEventListener("input",function(){_customAmt=parseInt(this.value);window._customAmtInline=_customAmt;document.getElementById("amtDisplay").textContent=_customAmt;});

  // Group pick deploy button + toggle logic
  if(_missionSize===-2){
    window._cgpState={selected:new Set()};
    window.cgpToggle=function(gid,s,e){
      let sel=window._cgpState.selected;
      let card=document.getElementById(gid),chk=document.getElementById("chk-"+gid);
      if(sel.has(gid)){sel.delete(gid);card.style.borderColor='var(--border)';chk.textContent='';chk.style.borderColor='var(--border)';chk.style.background='';}
      else{sel.add(gid);card.style.borderColor='var(--purple)';chk.textContent='✓';chk.style.borderColor='var(--purple)';chk.style.color='var(--purple)';chk.style.background='rgba(156,85,208,0.15)';}
      let btn=document.getElementById("btn-cgp-deploy");
      if(btn){btn.disabled=sel.size===0;btn.style.opacity=sel.size>0?'1':'0.4';}
    };
    let deployBtn=document.getElementById("btn-cgp-deploy");
    if(deployBtn) deployBtn.addEventListener("click",function(){
      if(!window._cgpState.selected.size) return;
      isCustomMode=true;customPool=[];
      document.querySelectorAll(".cgp-card").forEach(card=>{
        if(window._cgpState.selected.has(card.id)){
          let s=parseInt(card.dataset.start),e=parseInt(card.dataset.end);
          customPool.push(...words.slice(s,e));
        }
      });
      sessionWords=shuffle([...customPool]);currentStepAmount=sessionWords.length;renderMode();
    });
  }
}

// (stepAmt handles both standalone and inline group custom amount)

function renderCustomAmount(){
  isCustomMode=false;let max=words.length;_customAmt=Math.min(10,max);
  app.innerHTML=`<div class="container">
    <div class="ark-header"><button class="back" data-action="goBack">BACK</button><div class="ark-title">Custom <span>Count</span></div></div>
    <div class="ark-section">SET DEPLOYMENT COUNT</div>
    <div style="background:var(--bg-card);border:1px solid var(--border);border-top:3px solid var(--accent);padding:24px 20px;clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,0 100%);margin-bottom:16px;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim);margin-bottom:12px;">UNIT COUNT (MAX: ${max})</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button data-action="stepAmt:-10" style="width:52px;min-width:52px;justify-content:center;padding:10px 6px;font-size:13px;">−10</button>
        <button data-action="stepAmt:-1"  style="width:44px;min-width:44px;justify-content:center;padding:10px 6px;font-size:13px;">−1</button>
        <div id="amtDisplay" style="flex:1;text-align:center;font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:700;color:var(--accent);text-shadow:0 0 20px rgba(232,168,56,0.4);line-height:1;">${_customAmt}</div>
        <button data-action="stepAmt:1"   style="width:44px;min-width:44px;justify-content:center;padding:10px 6px;font-size:13px;">+1</button>
        <button data-action="stepAmt:10"  style="width:52px;min-width:52px;justify-content:center;padding:10px 6px;font-size:13px;">+10</button>
      </div>
      <input id="amtSlider" type="range" min="1" max="${max}" value="${_customAmt}">
    </div>
    <button data-action="startCustomAmount" style="justify-content:center;font-size:16px;">⬛ &nbsp;DEPLOY</button>
  </div>`;
  document.getElementById("amtSlider").addEventListener("input",function(){syncSlider(this.value);});
}
function stepAmt(d){
  let max=words.length;
  if(!window._customAmtInline) window._customAmtInline=Math.min(10,max);
  window._customAmtInline=Math.max(1,Math.min(max,(window._customAmtInline||_customAmt)+d));
  _customAmt=window._customAmtInline;
  let disp=document.getElementById("amtDisplay"),sl=document.getElementById("amtSlider");
  if(disp) disp.textContent=_customAmt;
  if(sl) sl.value=_customAmt;
}
function syncSlider(v){_customAmt=parseInt(v);window._customAmtInline=_customAmt;document.getElementById("amtDisplay").textContent=_customAmt;}
function startCustomAmount(){
  if(window._customAmtInline) _customAmt=window._customAmtInline;
  currentStepAmount=_customAmt;isCustomMode=true;customPool=[...words];sessionWords=shuffle([...words]).slice(0,_customAmt);renderMode();
}

function chooseStep(size){
  stepSize=size;let total=words.length,buttons="";
  for(let start=0;start<total;start+=size){
    let end=Math.min(start+size,total),key=currentProfile+"-"+start+"-"+end;
    let _bp3=getBlockProgress(start,end),pct=_bp3.pct,avg=_bp3.avg;
    let played=playedGroups[key]?"played":"",rank=getRankStyle(_bp3);
    let stag2=pct>=100?"<div style='font-size:8px;letter-spacing:2px;color:#b060e8;font-weight:700;margin-bottom:2px;'>✦ ALL MASTERED</div>":avg>=38?"<div style='font-size:8px;letter-spacing:2px;color:#3a9a5c;font-weight:700;margin-bottom:2px;'>✦ SOLID</div>":"";
    buttons+=`<button class="${played}" data-action="selectBlock:${start}:${end}" style="position:relative;overflow:hidden;box-shadow:${rank.glow};flex-direction:column;align-items:flex-start;gap:3px;padding:10px 12px;">${stag2}<div style="font-size:14px;letter-spacing:1px;">${start+1}–${end}${rank.emoji}</div><div style="width:100%;height:3px;background:var(--border);overflow:hidden;margin-top:2px;"><div style="height:100%;width:${pct}%;background:${rank.color};box-shadow:0 0 4px ${rank.color};transition:width 0.4s;"></div></div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:${rank.color};letter-spacing:1px;margin-top:1px;">${pct}%</div></button>`;
  }
  app.innerHTML=`<div class="container">
    <div class="ark-header"><button class="back" data-action="goBack">BACK</button><div class="ark-title">Block <span>Select</span></div></div>
    <div class="ark-section">COMBAT ZONES — UNIT SIZE: ${size}</div>
    <div class="block-grid">${buttons}</div>
    <button data-action="renderCustomBlock" style="margin-top:10px;border-color:var(--accent-dim);color:var(--accent);">◈ &nbsp;Custom Formation</button>
  </div>`;
}

function selectBlock(start,end){
  isCustomMode=false;currentBlockStart=start;currentBlockEnd=end;
  let pool=words.slice(start,end);
  if(!pool.length){alert(appLang==='jp'?'このブロックに単語がありません。':'No words in this block.');renderGroup();return;}
  sessionWords=shuffle([...pool]);
  currentStepAmount=sessionWords.length;
  playedGroups[currentProfile+"-"+start+"-"+end]=true;saveAll();renderMode();
}
function renderCustomBlock(){
  let total=words.length,size=stepSize,checkboxes="";
  for(let s=0;s<total;s+=size){let e=Math.min(s+size,total);checkboxes+=`<label style="display:block;margin:8px 0;"><input type="checkbox" value="${s}-${e}"> ${s+1}–${e}</label>`;}
  app.innerHTML=`<div class="container"><div class="ark-header"><button class="back" data-action="goBack">BACK</button><div class="ark-title">Custom <span>Formation</span></div></div><div class="ark-section">SELECT ZONES</div>${checkboxes}<button data-action="startCustomBlock" style="justify-content:center;margin-top:12px;">⬛ DEPLOY FORMATION</button></div>`;
}
function startCustomBlock(){
  let sel=document.querySelectorAll("input[type=checkbox]:checked");
  if(!sel.length)return alert("Select at least 1 block");
  isCustomMode=true;customPool=[];
  sel.forEach(cb=>{let[s,e]=cb.value.split("-").map(Number);customPool.push(...words.slice(s,e));});
  sessionWords=shuffle([...customPool]);
  currentStepAmount=sessionWords.length;renderMode();
}
function startAll(){currentStepAmount=words.length;sessionWords=shuffle([...words]);renderMode();}

/* ── CUSTOM GROUP PICK ── */
function renderCustomGroupPick(){

  let isJP=appLang==='jp';
  let total=words.length;
  let size=25;

  let groupCards='';
  for(let s=0;s<total;s+=size){
    let e=Math.min(s+size,total);
    let _bp4=getBlockProgress(s,e),pct=_bp4.pct,rank=getRankStyle(_bp4);

    groupCards+=`<div class="cgp-card" id="${gid}" data-start="${s}" data-end="${e}" onclick="cgpToggle('${gid}',${s},${e})" style="background:var(--bg-card);border:2px solid var(--border);padding:10px 12px;cursor:pointer;user-select:none;position:relative;overflow:hidden;transition:all 0.15s;clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px);">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="cgp-check" id="chk-${gid}" style="width:18px;height:18px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.15s;"></div>

          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text-bright);letter-spacing:1px;">${s+1}–${e} <span style="font-size:10px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:1px;">(${count} ${isJP?'語':'words'})</span></div>
          <div style="height:3px;background:var(--border);margin-top:4px;overflow:hidden;border-radius:0;"><div style="height:100%;width:${pct}%;background:${rank.color};box-shadow:0 0 4px ${rank.color};transition:width 0.4s;"></div></div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:${rank.color};margin-top:2px;letter-spacing:1px;">${pct}% CLEARED ${rank.emoji}</div>
        </div>
      </div>
    </div>`;
  }

  app.innerHTML=`<div class="container">
    <div class="ark-header">
      <button class="back" data-action="goBack">${isJP?'戻る':'BACK'}</button>

      ${isJP
        ? '25問単位のグループを複数選択してください。<br>選択後、<span style="color:var(--accent);">1セッションの出題数</span>を設定できます。'

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;">
      ${groupCards}
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button onclick="cgpSelectAll()" style="flex:1;justify-content:center;font-size:11px;padding:7px;border-color:var(--border);color:var(--text-dim);">☑ ${isJP?'全選択':'SELECT ALL'}</button>
      <button onclick="cgpClearAll()" style="flex:1;justify-content:center;font-size:11px;padding:7px;border-color:var(--border);color:var(--text-dim);">☐ ${isJP?'全解除':'CLEAR ALL'}</button>
    </div>

    <div id="cgp-count-panel" style="display:none;background:var(--bg-card);border:1px solid var(--border);border-top:3px solid var(--blue);padding:18px 16px;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);margin-bottom:10px;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--blue);margin-bottom:12px;">
        ◈ ${isJP?'セッション出題数':'WORDS PER SESSION'} <span id="cgp-pool-label" style="color:var(--text-dim);"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <button id="cgp-minus10" style="width:52px;min-width:52px;justify-content:center;padding:8px 6px;font-size:13px;">−10</button>
        <button id="cgp-minus1"  style="width:44px;min-width:44px;justify-content:center;padding:8px 6px;font-size:13px;">−1</button>
        <div style="flex:1;text-align:center;">
          <div id="cgp-amt-display" style="font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:700;color:var(--blue);line-height:1;text-shadow:0 0 20px rgba(58,114,176,0.5);">25</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:2px;margin-top:2px;">${isJP?'問':'WORDS'}</div>

        <button id="cgp-plus10"  style="width:52px;min-width:52px;justify-content:center;padding:8px 6px;font-size:13px;">+10</button>
      </div>
      <input id="cgp-slider" type="range" min="1" max="25" value="25" style="margin-bottom:4px;">
      <div style="display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;">

    <button id="cgp-deploy" onclick="startCustomGroupPick()" style="justify-content:center;font-size:16px;letter-spacing:3px;border-color:var(--blue);color:var(--blue);background:rgba(58,114,176,0.08);">
      ⊞ &nbsp;${isJP?'デプロイ':'DEPLOY MISSION'}
    </button>
  </div>`;

  // State
  window._cgpSelected = new Set();
  window._cgpAmt = 25;
  window._cgpPoolSize = 0;

  function cgpRefreshCountPanel(){
    let total=0;
    window._cgpSelected.forEach(key=>{
      let [s,e]=key.split('-').map(Number);
      total+=Math.min(e,words.length)-s;
    });
    window._cgpPoolSize=total;
    let panel=document.getElementById('cgp-count-panel');
    let emptyMsg=document.getElementById('cgp-empty-msg');
    if(total===0){panel.style.display='none';emptyMsg.style.display='none';return;}
    emptyMsg.style.display='none';
    panel.style.display='';
    window._cgpAmt=Math.min(window._cgpAmt,total);
    if(window._cgpAmt<1)window._cgpAmt=Math.min(25,total);
    let slider=document.getElementById('cgp-slider');
    let display=document.getElementById('cgp-amt-display');
    let poolLabel=document.getElementById('cgp-pool-label');
    let sliderMax=document.getElementById('cgp-slider-max');
    slider.max=total;
    slider.value=window._cgpAmt;
    sliderMax.textContent=total;
    display.textContent=window._cgpAmt;
    poolLabel.textContent='('+(isJP?'プール:':'pool:')+' '+total+' '+(isJP?'語':'words')+ ')';
    // Build quick-pick toggles (multiples of 25 up to pool size)
    let toggleRow=document.getElementById('cgp-toggle-row');
    let toggles='';
    let steps=[25,50,75,100,125,150,200];
    steps.forEach(s=>{
      if(s<=total){
        let active=(window._cgpAmt===s);
        toggles+=`<button onclick="cgpSetAmt(${s})" style="flex:0 0 auto;padding:5px 10px;font-size:11px;width:auto;letter-spacing:1px;border-color:${active?'var(--blue)':'var(--border)'};color:${active?'var(--blue)':'var(--text-dim)'};background:${active?'rgba(58,114,176,0.15)':'transparent'};">${s}</button>`;
      }
    });
    // also add ALL option
    let allActive=(window._cgpAmt===total);
    toggles+=`<button onclick="cgpSetAmt(${total})" style="flex:0 0 auto;padding:5px 10px;font-size:11px;width:auto;letter-spacing:1px;border-color:${allActive?'var(--blue)':'var(--border)'};color:${allActive?'var(--blue)':'var(--text-dim)'};background:${allActive?'rgba(58,114,176,0.15)':'transparent'};">ALL</button>`;
    toggleRow.innerHTML=toggles;
  }

  window.cgpSetAmt=function(n){
    window._cgpAmt=Math.max(1,Math.min(window._cgpPoolSize,n));
    let slider=document.getElementById('cgp-slider');
    let display=document.getElementById('cgp-amt-display');
    if(slider)slider.value=window._cgpAmt;
    if(display)display.textContent=window._cgpAmt;
    cgpRefreshCountPanel();
  };

  window.cgpToggle=function(gid,s,e){
    let key=s+'-'+e;
    let card=document.getElementById(gid);
    let chk=document.getElementById('chk-'+gid);
    if(window._cgpSelected.has(key)){
      window._cgpSelected.delete(key);
      card.style.borderColor='var(--border)';
      card.style.background='var(--bg-card)';
      card.style.boxShadow='';
      if(chk){chk.style.borderColor='var(--border)';chk.style.background='';chk.style.color='';chk.textContent='';}
    } else {
      window._cgpSelected.add(key);
      card.style.borderColor='var(--blue)';
      card.style.background='rgba(58,114,176,0.08)';
      card.style.boxShadow='0 0 12px rgba(58,114,176,0.15)';
      if(chk){chk.style.borderColor='var(--blue)';chk.style.background='var(--blue)';chk.style.color='#fff';chk.textContent='✓';}
    }
    cgpRefreshCountPanel();
  };

  window.cgpSelectAll=function(){
    document.querySelectorAll('.cgp-card').forEach(card=>{
      let s=parseInt(card.dataset.start),e=parseInt(card.dataset.end);
      let key=s+'-'+e,gid=card.id;
      window._cgpSelected.add(key);
      card.style.borderColor='var(--blue)';
      card.style.background='rgba(58,114,176,0.08)';
      card.style.boxShadow='0 0 12px rgba(58,114,176,0.15)';
      let chk=document.getElementById('chk-'+gid);
      if(chk){chk.style.borderColor='var(--blue)';chk.style.background='var(--blue)';chk.style.color='#fff';chk.textContent='✓';}
    });
    cgpRefreshCountPanel();
  };

  window.cgpClearAll=function(){
    document.querySelectorAll('.cgp-card').forEach(card=>{
      let s=parseInt(card.dataset.start),e=parseInt(card.dataset.end);
      let key=s+'-'+e,gid=card.id;
      window._cgpSelected.delete(key);
      card.style.borderColor='var(--border)';
      card.style.background='var(--bg-card)';
      card.style.boxShadow='';
      let chk=document.getElementById('chk-'+gid);
      if(chk){chk.style.borderColor='var(--border)';chk.style.background='';chk.style.color='';chk.textContent='';}
    });
    cgpRefreshCountPanel();
  };

  // Slider + button listeners
  document.getElementById('cgp-slider').addEventListener('input',function(){
    window._cgpAmt=parseInt(this.value);
    document.getElementById('cgp-amt-display').textContent=window._cgpAmt;
    cgpRefreshCountPanel();
  });
  document.getElementById('cgp-minus10').addEventListener('click',()=>{window.cgpSetAmt(window._cgpAmt-10);});
  document.getElementById('cgp-minus1').addEventListener('click',()=>{window.cgpSetAmt(window._cgpAmt-1);});
  document.getElementById('cgp-plus1').addEventListener('click',()=>{window.cgpSetAmt(window._cgpAmt+1);});
  document.getElementById('cgp-plus10').addEventListener('click',()=>{window.cgpSetAmt(window._cgpAmt+10);});
}

function startCustomGroupPick(){
  let isJP=appLang==='jp';
  if(!window._cgpSelected||window._cgpSelected.size===0){
    let msg=document.getElementById('cgp-empty-msg');
    if(msg)msg.style.display='';
    return;
  }
  isCustomMode=true;
  customPool=[];
  // Build pool from selected groups in order
  let keys=[...window._cgpSelected].sort((a,b)=>parseInt(a)-parseInt(b));
  keys.forEach(key=>{
    let [s,e]=key.split('-').map(Number);
    customPool.push(...words.slice(s,e));
  });
  // Shuffle then slice to requested amount
  let shuffled=shuffle([...customPool]);
  let amt=window._cgpAmt||shuffled.length;
  sessionWords=shuffled.slice(0,amt);
  currentStepAmount=sessionWords.length;
  renderMode();
}

/* ── MODE / TYPE ── */
function renderMode(){
  let isJP=appLang==='jp';
  let maxWords=sessionWords.length||100;
  let limitDisplay=sessionWordLimit>0?sessionWordLimit:appLang==='jp'?'制限なし':'No limit';
  // Track active game mode tab (default: choice)
  if(!window._combatTab) window._combatTab='choice';

  function buildModeSection(){
    let tab=window._combatTab;
    // Tab accent colors
    let tabColors={choice:'var(--accent)',write:'#3ab8d8',sort:'var(--blue)',row:'var(--purple)'};
    let tabBg={choice:'rgba(232,168,56,0.12)',write:'rgba(58,184,216,0.12)',sort:'rgba(58,114,176,0.12)',row:'rgba(156,85,208,0.12)'};
    let tabBorder={choice:'var(--accent)',write:'#3ab8d8',sort:'var(--blue)',row:'var(--purple)'};
    let tabBorderRgba={choice:'rgba(232,168,56,0.4)',write:'rgba(58,184,216,0.4)',sort:'rgba(58,114,176,0.5)',row:'rgba(156,85,208,0.5)'};
    let tabs=[
      {id:'choice', icon:'◈', label: isJP?'四択':'CHOICE'},
      {id:'write',  icon:'✎', label: isJP?'入力':'WRITE'},
      {id:'sort',   icon:'🔤', label: isJP?'並替':'SORT'},
      {id:'row',    icon:'▤', label: isJP?'単語列':'ROW'},
    ];
    // Build tab bar
    let tabBar=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:12px;">
      ${tabs.map(tb=>{
        let active=tab===tb.id;
        let col=tabColors[tb.id]; let bg=active?tabBg[tb.id]:'var(--bg-card)'; let border=active?tabBorder[tb.id]:'var(--border)';
        return `<div data-modtab="${tb.id}" style="padding:10px 4px;text-align:center;background:${bg};border:1px solid ${border};${active?'border-top:2px solid '+col+';':''};cursor:pointer;transition:all 0.18s;position:relative;">
          <div style="font-size:14px;margin-bottom:2px;">${tb.icon}</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:${active?col:'var(--text-dim)'};">${tb.label}</div>
          ${active?`<div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:${col};"></div>`:''}
        </div>`;
      }).join('')}
    </div>`;

    // Global mode message
    let globalTag=globalMode?`<div style="background:rgba(58,114,176,0.06);border:1px solid rgba(58,114,176,0.3);border-left:3px solid var(--blue);padding:8px 12px;margin-bottom:10px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:1px;">🌐 ${isJP?'グローバルモード — ひらがな無効':'GLOBAL MODE — HIRAGANA DISABLED'}</div>`:'';

    // Game type buttons per tab
    let prefix=tab==='choice'?'choice-':(tab==='write'?'type-':(tab==='sort'?'sort-':'row-'));
    let col=tabColors[tab];
    let btnStyle=`font-size:12px;padding:12px 8px;letter-spacing:1px;border-color:${tabBorderRgba[tab]};color:${col};background:${tabBg[tab]};justify-content:center;text-align:center;`;

    let typeButtons='';
    if(globalMode){
      typeButtons=`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          <button data-action="startGame:${prefix}kanji-arti" style="${btnStyle}">📖 ${isJP?'単語→意味':'Vocab → Meaning'}</button>
          <button data-action="startGame:${prefix}arti-kanji" style="${btnStyle}">💬 ${isJP?'意味→単語':'Meaning → Vocab'}</button>
        </div>`;
    } else {
      let sortNote=tab==='sort'?`<div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);margin-bottom:8px;line-height:1.6;letter-spacing:1px;">🔤 ${isJP?'文字を並び替えて正解を作る':'Arrange shuffled characters in the correct order'}</div>`:'';
      let rowNote=tab==='row'?`<div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);margin-bottom:8px;line-height:1.6;letter-spacing:1px;">▤ ${isJP?'全ての単語が列で表示され、一つずつ回答する。緑=正解 赤=不正解 グレー=未回答':'All words show as a row up front — answer one at a time. Green=correct · Red=wrong · Gray=not yet answered'}</div>`:'';
      typeButtons=`${sortNote}${rowNote}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          <button data-action="startGame:${prefix}kanji-hira" style="${btnStyle}">漢 → ひ<div style="font-family:'Share Tech Mono',monospace;font-size:8px;opacity:0.7;margin-top:2px;">${isJP?'漢字→ひらがな':'Kanji → Hira'}</div></button>
          <button data-action="startGame:${prefix}kanji-arti" style="${btnStyle}">漢 → 意<div style="font-family:'Share Tech Mono',monospace;font-size:8px;opacity:0.7;margin-top:2px;">${isJP?'漢字→意味':'Kanji → Meaning'}</div></button>
          <button data-action="startGame:${prefix}hira-kanji" style="${btnStyle}">ひ → 漢<div style="font-family:'Share Tech Mono',monospace;font-size:8px;opacity:0.7;margin-top:2px;">${isJP?'ひらがな→漢字':'Hira → Kanji'}</div></button>
          <button data-action="startGame:${prefix}arti-kanji" style="${btnStyle}">意 → 漢<div style="font-family:'Share Tech Mono',monospace;font-size:8px;opacity:0.7;margin-top:2px;">${isJP?'意味→漢字':'Meaning → Kanji'}</div></button>
        </div>`;
    }
    return `<div id="mode-section-wrap">
      ${tabBar}
      <div id="mode-type-panel" style="background:var(--bg-card);border:1px solid var(--border);border-top:2px solid ${tabBorder[tab]};padding:14px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);margin-bottom:10px;">
        ${globalTag}${typeButtons}
      </div>
    </div>`;
  }

  app.innerHTML=`<div class="container">
    <div class="ark-header"><button class="back" data-action="goBack">${t('back')}</button><div class="ark-title">${isJP?'ゲーム <span>設定</span>':'Combat <span>Config</span>'}</div></div>

    <!-- GAME MODE -->
    <div class="ark-section">${isJP?'ゲームモード':'GAME MODE'}</div>
    <div id="combat-mode-root">${buildModeSection()}</div>

    <button data-action="renderCurrentStepKotoba" style="margin-bottom:12px;border-color:var(--accent-dim);color:var(--accent);background:rgba(232,168,56,0.04);">▣ &nbsp;${isJP?'単語リスト確認':'Intelligence Briefing'}</button>

    <!-- CHOICES & WORDS PER SESSION side by side -->
    <div class="ark-section">${isJP?'セッション設定':'SESSION SETUP'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">

      <!-- Answer choices -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-top:2px solid var(--accent-dim);padding:12px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);">
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);margin-bottom:8px;">${isJP?'選択肢数':'CHOICES'}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button id="choice-minus" style="width:34px;min-width:34px;padding:7px 0;justify-content:center;font-size:15px;">−</button>
          <div id="choice-display" style="flex:1;text-align:center;font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;color:var(--accent);line-height:1;">${choiceCount}</div>
          <button id="choice-plus" style="width:34px;min-width:34px;padding:7px 0;justify-content:center;font-size:15px;">+</button>
        </div>
        <input id="choice-slider" type="range" min="4" max="8" value="${choiceCount}" style="margin-top:8px;">
      </div>

      <!-- Words per session -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-top:2px solid var(--accent-dim);padding:12px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);">
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);margin-bottom:8px;">${isJP?'出題数':'WORDS / SESSION'} <span style="color:var(--accent-dim);">≤${maxWords}</span></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button id="limit-minus" style="width:34px;min-width:34px;padding:7px 0;justify-content:center;font-size:15px;">−</button>
          <div id="limit-display" style="flex:1;text-align:center;font-family:'Rajdhani',sans-serif;font-size:${sessionWordLimit>0?'36':'22'}px;font-weight:700;color:${sessionWordLimit>0?'var(--accent)':'var(--text-dim)'};line-height:1;">${limitDisplay}</div>
          <button id="limit-plus" style="width:34px;min-width:34px;padding:7px 0;justify-content:center;font-size:15px;">+</button>
        </div>
        <input id="limit-slider" type="range" min="0" max="${Math.min(maxWords,100)}" value="${Math.min(sessionWordLimit,100)}" style="margin-top:8px;">

    <!-- RESPONSE DELAY -->
    <div style="background:var(--bg-card);border:1px solid var(--border);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);">
      <div style="flex:1;">
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);margin-bottom:4px;">${isJP?'回答遅延':'RESPONSE DELAY'}</div>
        <input type="number" min="0.5" step="0.5" value="${answerDelay/1000}" id="inp-delay" style="max-width:100px;padding:6px 10px;font-size:13px;margin:0;">
      </div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);">${isJP?'秒':'SEC'}</div>
    </div>

    <!-- MODIFIERS section -->
    <div class="ark-section">${isJP?'モディファイア':'MODIFIERS'}</div>
    <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px;">

      <!-- Random distractors -->
      <label id="lbl-random" style="background:${randomOptions?'rgba(156,85,208,0.08)':'var(--bg-card)'};border:1px solid ${randomOptions?'rgba(156,85,208,0.45)':'var(--border)'};border-left:3px solid ${randomOptions?'var(--purple)':'var(--border)'};padding:10px 14px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:10px;">

          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;color:${randomOptions?'var(--purple)':'var(--text)'};">${isJP?'ランダム選択肢 🎲':'Random Distractors 🎲'}</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);margin-top:2px;">${isJP?'グループ外から選択肢を生成 · +10% XP':'Pull distractors from outside group · +10% XP'}</div>
        </div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 7px;border:1px solid ${randomOptions?'var(--purple)':'var(--border)'};color:${randomOptions?'var(--purple)':'var(--text-dim)'};">${randomOptions?'ON':'OFF'}</div>
      </label>

      <!-- Bamboozle -->
      <label id="lbl-bamboozle" style="background:${bamboozleMode?'rgba(232,100,56,0.08)':'var(--bg-card)'};border:1px solid ${bamboozleMode?'rgba(232,100,56,0.45)':'var(--border)'};border-left:3px solid ${bamboozleMode?'#e86438':'var(--border)'};padding:10px 14px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="inp-bamboozle" ${bamboozleMode?'checked':''} style="margin:0;">
        <div style="flex:1;">
          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;color:${bamboozleMode?'#e86438':'var(--text)'};">${isJP?'バンブーズル 🌀':'Bamboozle 🌀'}</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);margin-top:2px;">${isJP?'全選択肢を酷似した偽物に · +20% XP':'All choices mutated fakes · +20% XP'}</div>
        </div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 7px;border:1px solid ${bamboozleMode?'rgba(232,100,56,0.5)':'var(--border)'};color:${bamboozleMode?'#e86438':'var(--text-dim)'};">${bamboozleMode?'ON':'OFF'}</div>

      <!-- Second Chance -->
      <label id="lbl-secondchance" style="background:${secondChance>0?'rgba(58,154,92,0.08)':'var(--bg-card)'};border:1px solid ${secondChance>0?'rgba(58,154,92,0.45)':'var(--border)'};border-left:3px solid ${secondChance>0?'var(--green)':'var(--border)'};padding:10px 14px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="inp-secondchance" ${secondChance>0?'checked':''} style="margin:0;">
        <div style="flex:1;">
          <div id="sc-title" style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;color:${secondChance>0?'var(--green)':'var(--text)'};">${isJP?'セカンドチャンス 🔄':'Second Chance 🔄'}${secondChance>0?` <span style="font-size:12px;color:var(--accent);">${secondChance}%</span>`:''}</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);margin-top:2px;">${isJP?`不正解を${secondChance||50}%確率で再出題`:`Wrong answers re-queued at ${secondChance||50}% chance`}</div>
        </div>
        <div id="sc-slider-wrap" style="display:${secondChance>0?'flex':'none'};flex-direction:column;align-items:flex-end;gap:3px;min-width:64px;">
          <input id="sc-slider" type="range" min="0" max="100" step="5" value="${secondChance}" style="width:64px;margin:0;">
          <div id="sc-pct-display" style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--green);letter-spacing:1px;">${secondChance}%</div>
        </div>
        <div id="sc-off-badge" style="font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 7px;border:1px solid var(--border);color:var(--text-dim);${secondChance>0?'display:none;':''}">${secondChance>0?'':'OFF'}</div>
      </label>

      <!-- SRS -->
      <label id="lbl-srs" style="background:${srsEnabled?'rgba(58,184,216,0.06)':'var(--bg-card)'};border:1px solid ${srsEnabled?'rgba(58,184,216,0.4)':'var(--border)'};border-left:3px solid ${srsEnabled?'#3ab8d8':'var(--border)'};padding:10px 14px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="inp-srs" ${srsEnabled?'checked':''} style="margin:0;">
        <div style="flex:1;">
          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;color:${srsEnabled?'#3ab8d8':'var(--text)'};">${isJP?'間隔反復 (SRS) 🧠':'Spaced Repetition (SRS) 🧠'}</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);margin-top:2px;">${isJP?'SM-2アルゴリズムで復習タイミングを最適化':'SM-2 algorithm — optimizes review intervals'}</div>
        </div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;font-weight:700;padding:2px 7px;background:${srsEnabled?'#3ab8d8':'var(--border)'};color:${srsEnabled?'#000':'var(--text-dim)'};">${srsEnabled?'SM-2':'OFF'}</div>
      </label>

      <!-- Hard Focus -->
      <label id="lbl-hardfocus" style="background:${hardFocusMode?'rgba(255,96,64,0.08)':'var(--bg-card)'};border:1px solid ${hardFocusMode?'rgba(255,96,64,0.5)':'var(--border)'};border-left:3px solid ${hardFocusMode?'#ff6040':'var(--border)'};padding:10px 14px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="inp-hardfocus" ${hardFocusMode?'checked':''} style="margin:0;">

function selectMode(mode){gameMode=mode;renderMode();} // legacy compat — redirects to renderMode
function renderCurrentStepKotoba(){
  let pool=isCustomMode?customPool:words.slice(currentBlockStart,currentBlockEnd);
  let title=isCustomMode?"Custom Block":`${currentBlockStart+1}–${currentBlockEnd}`;
  let isJP=appLang==='jp';

  // ── sync coreScore from profile data (pool is a slice, not always same ref) ──
  function getProfileWord(w){
    if(!currentProfile||!profiles[currentProfile]) return w;
    return profiles[currentProfile].words.find(x=>x.kanji===w.kanji)||w;
  }

  // ── Build Intel Briefing list (with edit + note) ──
  function buildBriefList(editIdx=-1){
    return pool.map((w,i)=>{
      let pw=getProfileWord(w);
      let mastered=isMasteredKotoba(pw);
      let cs=getCoreScore(pw);
      let cl=getCoreLabel(cs);
      let borderColor=mastered?'var(--green)':cl.color;
      let hasNote=!!(pw.note&&pw.note.trim());

      if(i===editIdx){
        // ── EDIT MODE: kanji + hira + arti + note ──
        let safeNote=(pw.note||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<li id="brief-item-${i}" style="padding:10px 12px;margin:4px 0;font-family:'Share Tech Mono',monospace;font-size:11px;background:rgba(232,168,56,0.07);list-style:none;border:1px solid var(--accent-dim);border-left:3px solid var(--accent);">
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--accent);margin-bottom:8px;">✎ ${isJP?'単語を編集':'EDIT WORD'}</div>
          <div style="display:flex;gap:6px;align-items:stretch;flex-wrap:wrap;margin-bottom:6px;">
            <input id="edit-kanji-${i}" type="text" value="${w.kanji.replace(/"/g,'&quot;')}" placeholder="${isJP?'漢字 / 単語':'Kanji / Word'}" style="width:130px;font-size:18px;font-family:'Rajdhani',sans-serif;font-weight:700;padding:6px 10px;margin:0;border-left:3px solid var(--accent);">
            <input id="edit-hira-${i}" type="text" value="${(w.hira||'').replace(/"/g,'&quot;')}" placeholder="${isJP?'ひらがな':'Hiragana'}" style="width:140px;color:var(--accent);padding:6px 10px;margin:0;">
            <input id="edit-arti-${i}" type="text" value="${(w.arti||'').replace(/"/g,'&quot;')}" placeholder="${isJP?'意味':'Meaning'}" style="flex:1;min-width:120px;color:var(--text-dim);padding:6px 10px;margin:0;">
          </div>
          <div style="margin-bottom:8px;">
            <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#f0c060;margin-bottom:4px;">📝 ${isJP?'ノート (任意)':'NOTE (optional)'}</div>
            <textarea id="edit-note-${i}" style="width:100%;min-height:70px;max-height:50vh;background:var(--bg-panel);border:1px solid rgba(240,192,96,0.35);border-left:3px solid #f0c060;color:#f0c060;font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 10px;resize:vertical;outline:none;line-height:1.6;border-radius:0;" placeholder="${isJP?'// メモを入力 //':'// Add your note here //'}">${safeNote}</textarea>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button id="edit-save-${i}" style="width:auto;padding:6px 16px;font-size:11px;letter-spacing:1px;justify-content:center;border-color:var(--green);color:var(--green);background:rgba(58,154,92,0.08);">✓ ${isJP?'保存':'SAVE'}</button>
            <button id="edit-cancel-${i}" style="width:auto;padding:6px 14px;font-size:11px;letter-spacing:1px;justify-content:center;border-color:var(--border);color:var(--text-dim);">✕ ${isJP?'キャンセル':'CANCEL'}</button>
          </div>
        </li>`;
      }

      // ── NORMAL VIEW: word row + note preview ──
      let notePreviewHtml = hasNote
        ? `<div style="margin-top:4px;padding:5px 10px;background:rgba(240,192,96,0.07);border-left:2px solid rgba(240,192,96,0.5);font-family:'Share Tech Mono',monospace;font-size:9px;color:#f0c060;line-height:1.6;white-space:pre-wrap;word-break:break-word;">${pw.note.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
        : '';

      return `<li id="brief-item-${i}" style="padding:7px 12px;border-left:2px solid ${borderColor};margin:2px 0;font-family:'Share Tech Mono',monospace;font-size:11px;background:var(--bg-card);list-style:none;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="flex:1;min-width:0;">
            ${mastered?'<span style="color:var(--green);font-size:10px;">✓ </span>':''}<b style="font-size:15px;font-family:\'Rajdhani\',sans-serif;color:var(--text-bright);">${w.kanji}</b> <span style="color:var(--accent);">${w.hira||''}</span> <span style="color:var(--text-dim);">— ${w.arti||''}</span>
          </div>
          ${isCoreDataKotoba(pw)?`<span style="font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:1px;color:${cl.color};border:1px solid ${cl.color}44;padding:1px 5px;flex-shrink:0;">${cl.icon} ${cs}</span>`:'<span style="font-family:\'Share Tech Mono\',monospace;font-size:7px;color:var(--border);flex-shrink:0;">NEW</span>'}

  // ── Build Understanding Level section ──

    // Summary stats

    function miniCard(e){

          <div style="text-align:center;">
            <div style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--text-dim);">${unseen.length}</div>

      <!-- Weakness spotlight -->

      <!-- Easy spotlight -->
      ${solid.length?`
      <div style="background:rgba(58,154,92,0.06);border:1px solid rgba(58,154,92,0.25);border-left:3px solid #3a9a5c;padding:10px 12px;margin-bottom:10px;">

      <!-- Sort tabs -->
      <div style="display:flex;gap:4px;margin-bottom:8px;">

  // ── Active tab state ──
  let _activeTab='briefing'; // 'briefing' | 'understanding'
  let _ulSortMode='hardest';

  function render(editIdx=-1){
    let listHtml=buildBriefList(editIdx);
    let ulHtml=buildUnderstanding(_ulSortMode);
    let container=document.getElementById('brief-list');

    if(container&&editIdx>=0){
      container.innerHTML=listHtml;

    }

    app.innerHTML=`<div class="container">

        <div class="ark-section">ZONE: ${title}</div>

        <ul id="brief-list" style="padding:0;">${listHtml}</ul>

      <div id="tab-content-understanding" style="display:${_activeTab==='understanding'?'block':'none'};">

        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;margin-bottom:10px;">

      document.getElementById('tab-ul').classList.toggle('ul-active', tab==='understanding');
    };
    window._ulSort=function(mode){
      _ulSortMode=mode;
      let cont=document.getElementById('ul-container');
      if(cont) cont.innerHTML=buildUnderstanding(_ulSortMode);
    };

    wireEditEvents(editIdx);
  }

  function wireEditEvents(editIdx){
    pool.forEach((w,i)=>{
      if(i===editIdx){
        let saveBtn=document.getElementById(`edit-save-${i}`);
        let cancelBtn=document.getElementById(`edit-cancel-${i}`);
        if(saveBtn) saveBtn.addEventListener("click",()=>{
          let newKanji=(document.getElementById(`edit-kanji-${i}`)?.value||'').trim();
          let newHira=(document.getElementById(`edit-hira-${i}`)?.value||'').trim();
          let newArti=(document.getElementById(`edit-arti-${i}`)?.value||'').trim();
          let newNote=(document.getElementById(`edit-note-${i}`)?.value||'').trim();
          if(!newKanji){alert(isJP?'漢字/単語は必須です':'Kanji/Word field is required');return;}
          // Update pool word object
          w.kanji=newKanji; w.hira=newHira; w.arti=newArti; w.note=newNote;
          // Update profile word (find by reference first, then by original kanji)
          if(currentProfile&&profiles[currentProfile]){
            let pw=profiles[currentProfile].words.find(x=>x===w);
            if(!pw) pw=profiles[currentProfile].words.find(x=>x.kanji===w.kanji);
            if(pw){pw.kanji=newKanji;pw.hira=newHira;pw.arti=newArti;pw.note=newNote;}
          }
          saveAll();
          render(-1);
        });
        if(cancelBtn) cancelBtn.addEventListener("click",()=>render(-1));
        // Focus first input
        setTimeout(()=>document.getElementById(`edit-kanji-${i}`)?.focus(),40);
      } else {
        let editBtn=document.getElementById(`edit-btn-${i}`);
        if(editBtn) editBtn.addEventListener("click",()=>render(i));
      }
    });
  }

  render(-1);
}

/* ── GAME ── */
function startGame(type){
  // Parse combined mode+type strings from new Combat Config inline buttons
  // e.g. "type-kanji-hira" -> gameMode="typing", gameType="kanji-hira"
  // e.g. "sort-kanji-arti" -> gameMode="sort",   gameType="kanji-arti"
  // e.g. "kanji-hira"      -> gameMode="choice",  gameType="kanji-hira" (legacy multi-choice)
  if(type.startsWith("choice-")){
    gameMode="choice";
    type=type.slice(7);
  } else if(type.startsWith("type-")){
    gameMode="typing";
    type=type.slice(5);
  } else if(type.startsWith("sort-")){
    gameMode="sort";
    type=type.slice(5);
  } else if(type.startsWith("row-")){
    gameMode="row";
    type=type.slice(4);
  } else if(!gameMode||gameMode===""){
    gameMode="choice";
  } else {
    // gameMode already set (e.g. from old selectMode path) — keep it
  }
  gameType=type;sessionCorrect=0;sessionWrong=0;combo=0;sessionComboMax=0;coreStreak=0;
  // ── Remember exact config for "Play Again" (source word pool + mode/type) ──
  _lastStartConfig={rawType:(gameMode==="choice"?"choice-":gameMode==="typing"?"type-":gameMode==="sort"?"sort-":gameMode==="row"?"row-":"")+type, sourceWords:[...sessionWords]};
  // ── Mark that we've entered an active game session (for back-navigation & hardware-back handling) ──
  window._gameActive=true;
  if(typeof window._kotobaPushGameMarker==="function") window._kotobaPushGameMarker();
  ascendBar=0;ascendActive=false;if(ascendTimer)clearTimeout(ascendTimer);ascendTimer=null;removeAscendOverlay();
  critAscendBonus=0;
  glitchModeActive=false;
  luckyWordActive=false;luckyBonusWordActive=false;
  if(!sessionWords.length){alert(appLang==='jp'?'単語がありません！':'No words available!');renderGroup();return;}
  // Apply word limit if set
  if(sessionWordLimit>0 && sessionWords.length>sessionWordLimit){
    sessionWords=shuffle([...sessionWords]).slice(0,sessionWordLimit);
  }
  // ── HARD FOCUS: bias pool toward low-coreScore words ──
  if(hardFocusMode && currentProfile && profiles[currentProfile]){
    let profileWords=profiles[currentProfile].words;
    function getCs(w){
      let pw=profileWords.find(x=>x.kanji===w.kanji);
      return pw?getCoreScore(pw):20;
    }
    // Build weighted pool: words with lower scores get more copies
    // Weight formula: floor((37 - clamp(cs,0,37)) / 10) + 1  → score 0 = 4 copies, score 37+ = 1 copy
    let weighted=[];
    sessionWords.forEach(w=>{
      let cs=Math.min(37,Math.max(0,getCs(w)));
      let copies=Math.floor((37-cs)/10)+1; // 1–4 copies
      for(let i=0;i<copies;i++) weighted.push(w);
    });
    // Shuffle the weighted pool and take up to sessionTotal unique words (deduplicated but biased)
    let seen=new Set(), biased=[];
    shuffle(weighted).forEach(w=>{
      if(!seen.has(w.kanji)){ seen.add(w.kanji); biased.push(w); }
    });
    // Any words not picked yet get appended so nothing is skipped
    sessionWords.forEach(w=>{ if(!seen.has(w.kanji)){ seen.add(w.kanji); biased.push(w); } });
    sessionWords=biased;
  }
  sessionTotal=sessionWords.length;
  if(hardcoreMode){
    lives=4;
  }
  sessionXpStart=globalStats.xp;sessionLevelStart=globalStats.level;sessionXpGain=0;sessionCoinsStart=shopData.coins||0;
  // ── WEAPON session init ──
  resetWeaponSession();
  if(uiMode!=="simple") rollWeaponSessionStart();
  // Knife: +1 extra life in hardcore
  if(hardcoreMode&&uiMode!=="simple"&&hasWeapon("knife")) lives+=1;
  // Heart: +4 extra lives in Hardcore
  if(hardcoreMode&&uiMode!=="simple"&&hasWeapon("heart")) lives+=4;
  // Cutter: +1 second to hardcore timer (applied via extended timer)
  let _wpnCutterTimer=(uiMode!=="simple"&&hasWeapon("cutter"))?hardcoreTimer+1000:hardcoreTimer;

  // ── GLITCH MODE: mark session as glitch-enabled if special is on ──
  let _specialsOn=shopData.specialEffectsOn||{};
  let hasGlitchSpecial=shopData.ownedSpecialEffects&&shopData.ownedSpecialEffects.includes("glitchmode")
    &&!!_specialsOn["glitchmode"];
  glitchModeActive=hasGlitchSpecial; // active for whole session, triggers per-answer
  glitchWordActive=false;
  glitchOriginalMode="";glitchOriginalType="";

  // ── ROW MODE ("BARIS KOTOBA"): snapshot presentation order + reset all tile states ──
  if(gameMode==="row"){
    rowOriginalWords=[...sessionWords].reverse(); // sessionWords is consumed via pop() from the end, so reversing gives left-to-right presentation order
    rowStatuses=rowOriginalWords.map(()=>'neutral');
    rowIndex=-1;
  }

  nextWord();
}
function nextWord(){
  clearTimeout(timerInterval);
  // Always reset lock state when advancing — prevents freeze if anything above went wrong
  isLocked=false;_delayTimer=null;_skipCooldown=false;
  // Abort any in-flight rebellion FX (prevents delayed elements spawning after next word starts)
  if(window._currentRebToken){window._currentRebToken.active=false;window._currentRebToken=null;}
  // Clear any lingering stylish rank / sword decorations
  if(_stylishRankEl){
    clearTimeout(_stylishRankTimeout);_stylishRankTimeout=null;
    try{if(_stylishRankEl.parentNode)_stylishRankEl.parentNode.removeChild(_stylishRankEl);}catch(e){}
    _stylishRankEl=null;
  }
  _stylishSwords.forEach(s=>{try{if(s.parentNode)s.parentNode.removeChild(s);}catch(e){}});_stylishSwords=[];
  // Clean up any stale FX overlays — only pure anonymous FX elements (no dataset attrs, no class, no id)
  document.querySelectorAll("div[style*='position:fixed']").forEach(el=>{
    if(el.style.pointerEvents==="none"&&!el.className&&!el.id){
      try{el.remove();}catch(e){}
    }
  });
  if(!sessionWords||!sessionWords.length){renderSummary();return;}
  currentWord=sessionWords.pop();
  // ── ROW MODE: mark this word's tile as the active one ──
  if(gameMode==="row"){
    rowIndex=rowOriginalWords.length-sessionWords.length-1;
    if(rowIndex>=0&&rowIndex<rowStatuses.length) rowStatuses[rowIndex]='active';
  }
  // If a glitch word is queued, fire a quick glitch flash before rendering
  if(glitchWordActive){
    _fx_glitchFlash(()=>renderGame());
  } else if(uiMode!=="simple"&&luckyWordActive){
    _fx_luckyFlash(()=>renderGame());
  } else {
    renderGame();
  }
}
function skipDelay(){
  if(!isLocked)return;
  if(_delayTimer===null){
    // _delayTimer can be null during the level-up overlay (it's cleared before showLevelUp).
    // In that case let the overlay's own click handler proceed; don't force-skip here.
    return;
  }
  clearTimeout(_delayTimer);
  _delayTimer=null;
  _skipCooldown=true;
  nextWord();
  // Release cooldown after a brief window so the input that triggered skip
  // doesn't accidentally interact with the next word
  setTimeout(()=>{ _skipCooldown=false; }, 350);
}

const MIN_ANSWER_MS = 300; // minimum ms before an answer registers

function flashTooFast(){
  // Flash a caution message in the info div (or near the card) without locking in a wrong answer
  let info=document.getElementById("info");
  let card=document.querySelector(".card");
  if(!info&&!card)return;
  let target=info||card;
  let prev=target.innerHTML;
  let isJP=appLang==='jp';
  target.innerHTML=`<span style="color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;animation:pulse 0.3s ease infinite alternate;">⚠ ${isJP?'早すぎます — もう一度':'TOO FAST — TRY AGAIN'}</span>`;
  // Shake the card briefly
  if(card){card.style.transition='transform 0.08s';card.style.transform='translateX(-6px)';setTimeout(()=>{card.style.transform='translateX(6px)';setTimeout(()=>{card.style.transform='';},80);},80);}
  setTimeout(()=>{ target.innerHTML=prev; },700);
}

function checkTyping(correct){
  if(isLocked)return;
  if(Date.now()-_wordShownAt < MIN_ANSWER_MS){ flashTooFast(); return; }
  isLocked=true;
  if(hardcoreMode)clearTimeout(timerInterval);
  let input=document.getElementById("ans"),val=input.value.trim(),info=document.getElementById("info");
  // Case-insensitive comparison: only wrong if letters actually differ
  let isCorrect=val.toLowerCase()===correct.toLowerCase();
  if(isCorrect){input.style.borderColor="#3a9a5c";info.innerHTML=`<span style="color:#5ecf8a;">✅ CORRECT</span>`;}
  else{input.style.borderColor="#c94040";info.innerHTML=`<span style="color:#e86060;">✗ WRONG — ANSWER: <b>${correct}</b></span>`;}
  processAnswer(isCorrect);
}
function checkChoice(sel,correct,options){
  if(isLocked)return;
  if(Date.now()-_wordShownAt < MIN_ANSWER_MS){ flashTooFast(); return; }
  isLocked=true;
  document.querySelectorAll(".choiceBtn").forEach(b=>{
    b.disabled=true;
    let idx=parseInt(b.getAttribute("data-idx"));
    let val=options[idx];
    if(val===correct)b.classList.add("correct");
    else if(val===sel&&sel!==correct)b.classList.add("wrong");
  });
  processAnswer(sel===correct);
}
function handleHardcoreFail(){
  if(isLocked)return;isLocked=true;combo=0;sessionWrong++;lives--;
  if(gameMode==="row"&&rowIndex>=0&&rowIndex<rowStatuses.length) rowStatuses[rowIndex]='wrong';
  // Clear stylish rank on wrong
  if(_stylishRankEl){
    clearTimeout(_stylishRankTimeout);_stylishRankTimeout=null;
    try{if(_stylishRankEl.parentNode)_stylishRankEl.parentNode.removeChild(_stylishRankEl);}catch(e){}
    _stylishRankEl=null;
  }
  _stylishSwords.forEach(s=>{try{if(s.parentNode)s.parentNode.removeChild(s);}catch(e){}});_stylishSwords=[];
  globalStats.xp=Math.max(0,globalStats.xp-15);
  if(lives<=0){showGameOver();return;}
  nextWord();
}
function showGameOver(){

/* ── PLAY AGAIN: restart the exact same session config (mode/type + word pool) ── */

/* ── Weapon FX pointer tracking ── */
let _lastPX=window.innerWidth*0.5, _lastPY=window.innerHeight*0.38;

let _wpnFxLastTime=0;
const _WPN_FX_THROTTLE=80; // ms minimum between FX fires (prevents spam)
function _isInGame(){
  // Returns true only when an active game session is running
  return !!(
    document.getElementById("timerFill")||
    document.getElementById("btnTyping")||
    document.querySelector(".choiceBtn")||
    document.getElementById("sort-submit-btn")||
    document.getElementById("ascend-bar-wrap")
  );
}

function showWeaponTouchAnim(px,py){
  if(uiMode==="simple")return; // effects disabled in Simple mode
  _ensureWeaponKeyframes();
  _ensureEffectKeyframes();
  let ids=getActiveWeaponIds(); // for crystal: returns slot weapon ids
  if(!ids.length)return;
  let now=performance.now();
  if(now-_wpnFxLastTime<_WPN_FX_THROTTLE)return; // throttle
  _wpnFxLastTime=now;
  let cx=(px!=null)?px:_lastPX;
  let cy=(py!=null)?py:_lastPY;
  let fxOp=shopData.weaponFxOpacity!=null?Number(shopData.weaponFxOpacity):1.0;
  document.documentElement.style.setProperty("--wpn-fx-opacity",fxOp);
  // Fire each slot weapon staggered — respects per-weapon FX toggle
  let fxEnabled=shopData.weaponFxEnabled||{};
  let visibleIds=ids.filter(id=>fxEnabled[id]!==false);
  if(!visibleIds.length)return;
  visibleIds.forEach((id,i)=>{
    if(i===0) _wpnTouchFx(id,cx,cy);
    else setTimeout(()=>_wpnTouchFx(id,cx,cy),i*140);
  });
}

function _wpnOpacityChange(val){
  let pct=Math.max(10,Math.min(100,parseInt(val)));
  shopData.weaponFxOpacity=pct/100;
  document.documentElement.style.setProperty("--wpn-fx-opacity",pct/100);
  let display=document.getElementById("wpn-opacity-val");
  if(display)display.textContent=pct+"%";
  let slider=document.getElementById("wpn-opacity-slider");
  if(slider)slider.style.background=`linear-gradient(90deg,#ffc83c ${pct}%,#2a3344 ${pct}%)`;
  saveAll();
}
function _wpnPreview(){
  let ids=getActiveWeaponIds();
  if(!ids.length){showShopToast("⚠ No weapon equipped","#cc4444");return;}
  let cx=window.innerWidth*0.5,cy=window.innerHeight*0.42;

  });
}

/* ── Safe FX append: applies opacity/size to an FX element without monkey-patching ── */
function _wpnFxAppend(el){
  if(el&&el.style){
    let op=shopData.weaponFxOpacity!=null?Number(shopData.weaponFxOpacity):1.0;
    let sz=shopData.weaponFxSize!=null?Number(shopData.weaponFxSize):1.0;
    if(op!==1.0) el.style.filter=(el.style.filter?el.style.filter+" ":"")+"opacity("+op+")";
    if(sz!==1.0){
      var fs=el.style.fontSize;
      if(fs&&fs.endsWith("px")){el.style.fontSize=(parseFloat(fs)*sz)+"px";}
      var w=el.style.width,h=el.style.height;
      if(w&&w.endsWith("px")){el.style.width=(parseFloat(w)*sz)+"px";}
      if(h&&h.endsWith("px")){el.style.height=(parseFloat(h)*sz)+"px";}
    }
  }
  document.body.appendChild(el);
  return el;
}

function showSlashEffect(){
  if(uiMode==="simple")return; // effects disabled in Simple mode
  _ensureEffectKeyframes();
  let eff=shopData.activeEffect||"none";
  if(eff==="none")return; // No effect
  const dispatch={
    slash:     _fx_slash,
    explosion: _fx_explosion,
    stars:     _fx_stars,
    sakura:    _fx_sakura,
    lightning: _fx_lightning,
    matrix:    _fx_matrix,
    confetti:  _fx_confetti,
    shockwave: _fx_shockwave,
    fire:      _fx_fire,
    ice:       _fx_ice,
    crack:     _fx_crack,
    blackhole: _fx_blackhole,
    dragon:    _fx_dragon,

  // Run normal effect
  (dispatch[eff]||_fx_slash)();
  // ALSO run ascend hit effect on top if ascend is active
  if(ascendActive&&isAscendMode()){ _fx_ascendHit(); }
}

function hasCritEffect(){
  let sp=shopData.specialEffectsOn||{};
  return shopData.ownedSpecialEffects&&shopData.ownedSpecialEffects.includes("crit")&&!!sp["crit"];
}
function getCritChance(){
  // Base pool: 1% + 0.1% per level, hard cap 31% (special effect pool only)
  let lv=globalStats.level||0;
  let base=Math.min(0.31, 0.01+lv*0.001);
  // Devil Hunter emblem: +10% as a SEPARATE pool (not capped by base 31%)
  let devilBonus=hasEmblem("devilhunter")?0.10:0;
  // Ascend bonus: +8% while Ascend is active (third separate pool)
  let ascendBoost=(ascendActive&&isAscendMode()&&hasCritEffect())?0.08:0;
  // Lucky Session: +5% CRIT while active
  let luckySpOn=shopData.specialEffectsOn||{};
  let luckyBonus=(shopData.ownedSpecialEffects&&shopData.ownedSpecialEffects.includes("luckysession")&&!!luckySpOn["luckysession"])?0.05:0;
  // Glitch question: +5% CRIT on this word only
  let glitchBonus=glitchWordActive?0.05:0;
  // Rebellion weapon: +5% CRIT while equipped
  let rebellionBonus=hasWeapon("rebellion")?0.05:0;
  return base+devilBonus+ascendBoost+luckyBonus+glitchBonus+rebellionBonus+_wpnChainsawCritBonus+getCritUpgradeBonus();
}

/* ── helper: spawn a fixed DOM particle ── */
/* ── Perf-optimised FX element pool ── */
const _fxPool=[];
const _FX_POOL_MAX=80;
function _fxEl(cssText,removeAfterMs){
  // Reuse a pooled div if available to avoid GC churn
  let e=_fxPool.length?_fxPool.pop():document.createElement("div");
  e.style.cssText="position:fixed;pointer-events:none;z-index:20000;"+cssText;
  document.body.appendChild(e);
  setTimeout(()=>{
    if(e.parentNode)e.parentNode.removeChild(e);
    e.style.cssText=""; // reset
    if(_fxPool.length<_FX_POOL_MAX)_fxPool.push(e);
  },removeAfterMs);
  return e;
}

/* ────── CRACK ────── */
function _fx_crack(){
  let vw=window.innerWidth,vh=window.innerHeight;
  // Make sure crack keyframes exist
  if(!document.getElementById("crack-kf")){
    let s=document.createElement("style");s.id="crack-kf";
    s.textContent=`
      @keyframes crackAppear{0%{opacity:0;stroke-dashoffset:var(--len);}10%{opacity:1;}60%{opacity:1;stroke-dashoffset:0;}100%{opacity:0;stroke-dashoffset:0;}}
      @keyframes crackGlow{0%,100%{filter:drop-shadow(0 0 2px #d0c0a0);}50%{filter:drop-shadow(0 0 8px #fff) drop-shadow(0 0 16px #d0c0a0);}}
      @keyframes crackChip{0%{opacity:1;transform:translate(0,0) rotate(0deg);}100%{opacity:0;transform:translate(var(--cx),var(--cy)) rotate(var(--cr,90deg));}}
    `;
    document.head.appendChild(s);
  }
  // SVG crack overlay
  let svg=document.createElement("div");
  svg.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:20000;";
  // Origin near center
  let ox=vw*0.4+Math.random()*vw*0.2, oy=vh*0.3+Math.random()*vh*0.2;
  // Generate branching crack paths
  function crackPath(sx,sy,angle,depth,len){
    if(depth<=0||len<20)return"";
    let ex=sx+Math.cos(angle)*len, ey=sy+Math.sin(angle)*len;
    let pathLen=Math.hypot(ex-sx,ey-sy);
    let color=depth===3?"#ffffff":"#d0c0a0";
    let width=depth===3?2.5:depth===2?1.5:0.8;
    let str=`<path d="M${sx},${sy} L${ex},${ey}" stroke="${color}" stroke-width="${width}" fill="none" stroke-linecap="round" style="stroke-dasharray:${pathLen};stroke-dashoffset:${pathLen};--len:${pathLen};animation:crackAppear ${0.35+depth*0.06}s ease-out forwards,crackGlow 0.4s ease-in-out ${0.1*depth}s forwards;" opacity="0"/>`;
    // Branch off
    let branches=depth===3?3:depth===2?2:1;
    for(let b=0;b<branches;b++){
      let bAngle=angle+(Math.random()-0.5)*(Math.PI*0.6)*(1.2-depth*0.2);
      let bLen=len*(0.5+Math.random()*0.3);
      str+=crackPath(ex,ey,bAngle,depth-1,bLen);
    }
    return str;
  }
  // 3-5 main crack arms from origin
  let arms=3+Math.floor(Math.random()*3);
  let paths="";
  for(let a=0;a<arms;a++){
    let ang=(a/arms)*Math.PI*2+Math.random()*0.4;
    paths+=crackPath(ox,oy,ang,3,60+Math.random()*80);
  }
  svg.innerHTML=`<svg width="100%" height="100%" style="position:absolute;inset:0;overflow:visible;">${paths}</svg>`;
  document.body.appendChild(svg);
  setTimeout(()=>svg.remove(),900);
  // Screen flash at impact
  _fxEl(`inset:0;background:rgba(255,248,240,0.2);animation:effectFlash 0.18s ease-out forwards;`,250);
  // Debris chips fly from origin
  for(let i=0;i<14;i++){
    let ang=Math.random()*Math.PI*2;
    let dist=30+Math.random()*80;
    _fxEl(`left:${ox}px;top:${oy}px;width:${3+Math.random()*5}px;height:${2+Math.random()*4}px;
      background:#c0b090;opacity:0.9;transform-origin:center;
      --cx:${Math.cos(ang)*dist}px;--cy:${Math.sin(ang)*dist}px;--cr:${(Math.random()-0.5)*240}deg;
      animation:crackChip ${0.3+Math.random()*0.3}s ease-out ${i*0.015}s forwards;`,700);
  }
  // Dust cloud
  _fxEl(`left:${ox-40}px;top:${oy-40}px;width:80px;height:80px;border-radius:50%;
    background:radial-gradient(circle,rgba(200,180,140,0.3),transparent 70%);
    animation:effectShock 0.5s ease-out forwards;`,600);
}

        background:${col};box-shadow:0 0 6px ${col};

      document.body.appendChild(el);
      setTimeout(()=>el.remove(),950);
    },i*20);
  }

  // Screen fire glow sweep
  _fxEl(`inset:0;background:linear-gradient(90deg,transparent,rgba(255,80,0,0.2) 40%,rgba(255,160,0,0.15) 60%,transparent);
    animation:effectFlash 0.7s ease-out forwards;`,800);
