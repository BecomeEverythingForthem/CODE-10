<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kotoba">
<meta name="theme-color" content="#0a0c10">
<title>Kotoba Trainer Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap">
<style>
:root{
  --bg-deep:#0a0c10;--bg-panel:#10141c;--bg-card:#161b26;--bg-card2:#1c2333;
  --accent:#e8a838;--accent2:#f0c060;--accent-dim:#8a6020;
  --red:#c94040;--green:#3a9a5c;--blue:#3a72b0;--purple:#9c55d0;
  --text:#d4cfc4;--text-dim:#6e7a8a;--text-bright:#f0ebe0;
  --border:#2a3344;--scan:rgba(232,168,56,0.03);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);pointer-events:none;z-index:9999;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.18;pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;min-height:100vh;}
.container{max-width:680px;margin:0 auto;padding:12px 12px 60px;animation:screenIn 0.22s ease;}
@keyframes screenIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{from{opacity:1;}to{opacity:0.3;}}
@keyframes chargeGlow{0%{box-shadow:0 0 4px rgba(200,60,255,0.3);}100%{box-shadow:0 0 12px rgba(200,60,255,0.8);}}

.ark-header{display:flex;align-items:center;gap:10px;padding:8px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px;position:relative;}
.ark-header::after{content:'';position:absolute;bottom:-1px;left:0;width:80px;height:2px;background:var(--accent);}
.ark-title{font-family:'Rajdhani','Arial Narrow',Arial,sans-serif;font-size:18px;font-weight:700;color:var(--text-bright);letter-spacing:3px;text-transform:uppercase;}
.ark-title span{color:var(--accent);}
.ark-badge{font-family:'Share Tech Mono','Courier New',monospace;font-size:10px;color:var(--accent);border:1px solid var(--accent-dim);padding:2px 6px;background:rgba(232,168,56,0.07);letter-spacing:2px;}

.back{position:static!important;width:auto!important;padding:6px 14px!important;background:transparent!important;color:var(--text-dim)!important;border:1px solid var(--border)!important;border-radius:0!important;font-family:'Share Tech Mono',monospace!important;font-size:11px!important;letter-spacing:2px!important;touch-action:manipulation!important;-webkit-tap-highlight-color:transparent!important;cursor:pointer;transition:all 0.2s;margin-right:12px;justify-content:center!important;}
.back:hover{color:var(--accent)!important;border-color:var(--accent-dim)!important;background:rgba(232,168,56,0.05)!important;}
.back::before{content:'◄ ';}
.back::after{display:none!important;}

button{width:100%;padding:10px 14px;margin:3px 0;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;position:relative;overflow:visible;transition:all 0.18s ease;text-align:left;display:flex;align-items:center;gap:8px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;border-radius:0;outline:none;word-break:break-word;overflow-wrap:break-word;word-wrap:break-word;white-space:normal;}
button::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.2s;}
button:hover{background:var(--bg-card2);color:var(--accent);border-color:var(--accent-dim);}
button:hover::before{opacity:1;}
button::after{content:'';position:absolute;bottom:-1px;right:-1px;width:13px;height:13px;background:var(--bg-deep);transform:translate(50%,50%) rotate(45deg);pointer-events:none;transition:background 0.18s;}
button:hover::after{background:var(--bg-card2);}
button.correct::after{background:rgba(58,154,92,0.15)!important;}
button.wrong::after{background:rgba(201,64,64,0.15)!important;}
button.played::after{background:var(--bg-panel)!important;}
button.choiceBtn{text-align:center;justify-content:center;}
button.choiceBtn::after{display:none;}
button.correct{background:rgba(58,154,92,0.15)!important;border-color:#3a9a5c!important;color:#5ecf8a!important;}
button.correct::before{background:#3a9a5c;opacity:1;}
button.wrong{background:rgba(201,64,64,0.15)!important;border-color:#c94040!important;color:#e86060!important;}
button.wrong::before{background:#c94040;opacity:1;}
button.played{background:var(--bg-panel)!important;border-color:var(--border)!important;color:var(--text-dim)!important;opacity:0.65;}
button:disabled{opacity:0.4;cursor:not-allowed;}
button:disabled:hover{background:var(--bg-card);color:var(--text);border-color:var(--border);}
button:disabled:hover::before,button:disabled:hover::after{opacity:0;}

.ark-stat-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.ark-stat{flex:1;min-width:80px;background:var(--bg-card);border:1px solid var(--border);padding:7px 10px;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.ark-stat-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.ark-stat-value{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);line-height:1.1;}

.ark-section{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin:10px 0 6px;display:flex;align-items:center;gap:8px;}
.ark-section::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--accent-dim),transparent);}

.xp-bar-wrap{background:var(--bg-card);border:1px solid var(--border);padding:12px 14px;margin-bottom:14px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);}
.xp-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.xp-rank{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;}
.xp-nums{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);}
.xp-bar-bg{height:6px;background:var(--border);position:relative;overflow:hidden;}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));box-shadow:0 0 8px var(--accent);transition:width 0.6s ease;}
.xp-bar-shine{position:absolute;top:0;left:-60px;width:40px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);animation:xpShine 2s infinite;}
@keyframes xpShine{0%{left:-60px;}100%{left:110%}}

.ark-progress{height:3px;background:var(--border);margin:6px 0;}
.ark-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));transition:width 0.4s ease;box-shadow:0 0 6px var(--accent);}

.card{font-family:'Rajdhani','Arial Narrow',Arial,sans-serif;font-size:52px;font-weight:700;color:var(--text-bright);margin:16px 0;padding:28px 20px;background:var(--bg-card);border:1px solid var(--border);border-top:3px solid var(--accent);position:relative;clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,0 100%);text-shadow:0 0 30px rgba(232,168,56,0.2);letter-spacing:4px;text-align:center;word-break:break-word;overflow-wrap:break-word;word-wrap:break-word;hyphens:auto;}
.card::before{content:'OPERATOR DATA';position:absolute;top:8px;left:12px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--accent);opacity:0.6;}

.combo-display{text-align:center;padding:6px 0;font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--accent2);letter-spacing:3px;text-shadow:0 0 16px rgba(240,192,96,0.5);animation:comboPop 0.3s ease;}
@keyframes comboPop{from{transform:scale(1.3);}to{transform:scale(1);}}

.ark-lives{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--red);letter-spacing:2px;padding:8px 14px;background:rgba(201,64,64,0.08);border:1px solid rgba(201,64,64,0.25);border-left:3px solid var(--red);margin-bottom:10px;display:inline-block;}

input[type=text],input[type=number],textarea{width:100%;padding:11px 14px;margin:6px 0;background:var(--bg-panel);border:1px solid var(--border);border-left:3px solid var(--accent-dim);color:var(--text-bright);font-family:'Share Tech Mono','Courier New',monospace;font-size:13px;outline:none;transition:border-color 0.2s;border-radius:0;}
input[type=text]:focus,input[type=number]:focus,textarea:focus{border-color:var(--accent);border-left-color:var(--accent);box-shadow:0 0 0 1px rgba(232,168,56,0.15);}
input[type=file]{color:var(--text-dim);font-size:12px;margin:6px 0;display:block;}
input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;vertical-align:middle;}
input[type=range]{accent-color:var(--accent);cursor:pointer;background:transparent;border:none;border-left:none;padding:0;width:100%;margin-top:16px;}
label{font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;padding:6px 0;letter-spacing:1px;}
textarea{resize:vertical;min-height:100px;line-height:1.5;}
hr{border:none;border-top:1px solid var(--border);margin:16px 0;}
#info{font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:1px;padding:10px;margin-top:8px;text-align:center;}

.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.ach-card{background:var(--bg-card);border:1px solid var(--border);padding:12px;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);position:relative;overflow:hidden;}
.ach-card.unlocked{border-color:var(--accent-dim);}
.ach-card.unlocked::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-dim),var(--accent));}
.ach-card.locked{opacity:0.42;filter:grayscale(0.5);}
.ach-icon{font-size:24px;margin-bottom:4px;}
.ach-name{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--text-bright);letter-spacing:1px;}
.ach-desc{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-top:2px;line-height:1.4;}
.ach-reward{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);margin-top:4px;}

.daily-card{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--blue);padding:12px 14px;margin:6px 0;display:flex;align-items:center;gap:12px;}
.daily-card.done{border-left-color:var(--green);opacity:0.7;}
.daily-check{font-size:18px;min-width:24px;}
.daily-info{flex:1;}
.daily-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text-bright);letter-spacing:1px;}
.daily-prog{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:2px;}
.daily-reward{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);}

.levelup-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);animation:fadeOvIn 0.3s ease;}
@keyframes fadeOvIn{from{opacity:0;}to{opacity:1;}}
.levelup-box{text-align:center;padding:40px 48px;background:var(--bg-card);border:1px solid var(--accent);clip-path:polygon(20px 0%,100% 0%,100% calc(100% - 20px),calc(100% - 20px) 100%,0% 100%,0% 20px);position:relative;animation:levelupPop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes levelupPop{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes timingPerfect{0%{opacity:1;transform:scale(1);}50%{transform:scale(1.4);}100%{opacity:0;transform:scale(1.1) translateY(-20px);}}
@keyframes screenShake{0%,100%{transform:translate(0,0);}20%{transform:translate(-4px,2px);}40%{transform:translate(4px,-2px);}60%{transform:translate(-3px,1px);}80%{transform:translate(2px,-3px);}}
.levelup-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(232,168,56,0.08) 0%,transparent 70%);pointer-events:none;}
.levelup-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--accent);margin-bottom:8px;}
.levelup-num{font-family:'Rajdhani',sans-serif;font-size:80px;font-weight:700;color:var(--accent);line-height:1;text-shadow:0 0 40px rgba(232,168,56,0.6);}
.levelup-rank{font-family:'Rajdhani',sans-serif;font-size:20px;color:var(--text-bright);letter-spacing:4px;margin-top:6px;}

.ach-toast{position:fixed;top:16px;right:16px;z-index:10001;background:var(--bg-card);border:1px solid var(--accent-dim);border-left:3px solid var(--accent);padding:12px 16px;max-width:280px;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);animation:toastIn 0.3s ease;}
@keyframes toastIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.ach-toast-title{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--accent);}
.ach-toast-name{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--text-bright);letter-spacing:1px;}

.streak-fire{font-size:22px;animation:flicker 1.2s infinite alternate;}
@keyframes flicker{from{text-shadow:0 0 4px #e87000;}to{text-shadow:0 0 16px #ffb000,0 0 32px #ff6000;}}

.block-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.corner-deco{position:fixed;pointer-events:none;z-index:2;}
.corner-deco.tl{top:0;left:0;width:80px;height:80px;border-top:2px solid var(--accent-dim);border-left:2px solid var(--accent-dim);}
.corner-deco.br{bottom:0;right:0;width:80px;height:80px;border-bottom:2px solid var(--accent-dim);border-right:2px solid var(--accent-dim);}
.ark-ticker{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent-dim);letter-spacing:2px;border-top:1px solid var(--border);padding:6px 0;margin-top:12px;}
.ark-summary-big{font-family:'Rajdhani',sans-serif;font-size:60px;font-weight:700;color:var(--accent);line-height:1;text-shadow:0 0 40px rgba(232,168,56,0.4);text-align:center;}
#furigana{font-family:'Share Tech Mono',monospace!important;font-size:15px!important;color:var(--accent)!important;letter-spacing:2px;padding:10px 14px;background:rgba(232,168,56,0.05);border:1px solid var(--accent-dim);margin-top:8px;text-align:center;line-height:1.6;word-break:break-word;}
.shop-item{background:var(--bg-card);border:1px solid var(--border);padding:14px;position:relative;cursor:pointer;transition:all 0.2s;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.shop-item:hover{border-color:var(--accent-dim);background:var(--bg-card2);}
.shop-item.owned{border-color:var(--accent-dim);}
.shop-item.owned::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-dim),var(--accent));}
.shop-item.active-ui{border-color:var(--green)!important;}
.shop-item.active-ui::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#3a9a5c,#5ecf8a)!important;}
.shop-item-preview{width:100%;height:54px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.07);border-radius:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:1px;font-weight:700;position:relative;}
.shop-item-name{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--text-bright);letter-spacing:1px;}
.shop-item-price{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);margin-top:3px;}
.shop-item-tag{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;padding:2px 5px;border:1px solid;display:inline-block;margin-top:3px;}
.shop-tab{flex:1;padding:8px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);cursor:pointer;transition:all 0.2s;width:auto;margin:0;}
.shop-tab.active-tab{background:rgba(232,168,56,0.1);color:var(--accent);border-color:var(--accent-dim);}
.coin-display{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#f0c060;letter-spacing:2px;background:rgba(240,192,96,0.08);border:1px solid rgba(240,192,96,0.25);padding:6px 14px;display:inline-flex;align-items:center;gap:6px;}

/* ── CLEAN STATS UI ── */
.stat-panel{background:var(--bg-card);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;}
.stat-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-dim),var(--accent),transparent);}
.stat-panel-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;}

/* Progress Bars */
.prog-track{height:6px;background:rgba(255,255,255,0.06);border-radius:0;position:relative;overflow:hidden;margin:4px 0;}
.prog-fill{height:100%;border-radius:0;transition:width 0.8s cubic-bezier(0.22,1,0.36,1);position:relative;}
.prog-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;background:rgba(255,255,255,0.6);filter:blur(1px);}
.prog-shimmer{position:absolute;top:0;left:-60px;width:40px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);animation:xpShine 2.5s infinite;}

/* Thick accent bar */
.prog-track-thick{height:10px;background:rgba(255,255,255,0.05);position:relative;overflow:hidden;}
.prog-fill-thick{height:100%;transition:width 0.9s cubic-bezier(0.22,1,0.36,1);}

/* Stat grid — cleaner layout */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.stat-cell{background:var(--bg-panel);border:1px solid var(--border);padding:10px 10px 8px;position:relative;}
.stat-cell-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.stat-cell-value{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;line-height:1.1;color:var(--accent);}
.stat-cell-sub{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-dim);margin-top:2px;}

/* Buff pill — compact, non-dominant */
.buff-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:0;border:1px solid;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;}
.buff-row-compact{display:flex;align-items:center;padding:4px 8px;gap:8px;border-left:2px solid;margin:1px 0;}
.buff-row-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;flex:1;}
.buff-row-val{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;}

/* Section divider — slimmer */
.stat-section{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin:12px 0 6px;display:flex;align-items:center;gap:8px;}
.stat-section span{color:var(--accent);letter-spacing:2px;}
.stat-section::after{content:'';flex:1;height:1px;background:var(--border);}

/* Collapsible buff section */
.buff-collapse-header{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;user-select:none;transition:background 0.15s;}
.buff-collapse-header:hover{background:var(--bg-card2);}
.buff-collapse-body{border:1px solid var(--border);border-top:none;padding:6px 8px;display:none;}
.buff-collapse-body.open{display:block;}
.buff-total-chip{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;margin-left:auto;}

/* ── NOTE SYSTEM ── */
.note-btn{position:relative;width:auto!important;min-width:0!important;padding:4px 8px!important;font-size:11px!important;letter-spacing:1px!important;justify-content:center!important;border-radius:0!important;line-height:1!important;touch-action:manipulation!important;-webkit-tap-highlight-color:transparent!important;}
.note-btn.has-note{border-color:rgba(240,192,96,0.6)!important;color:#f0c060!important;background:rgba(240,192,96,0.1)!important;}
.note-btn.has-note::before{opacity:1!important;background:#f0c060!important;}
.note-btn.no-note{border-color:var(--border)!important;color:var(--text-dim)!important;background:transparent!important;}
.note-modal-overlay{position:fixed;inset:0;z-index:30000;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;animation:screenIn 0.18s ease;}

/* ══════════════════════════════════════════════════════════════
   SOUND SYSTEM — Web Audio API (no external files needed)
   ══════════════════════════════════════════════════════════════ */
const _SFX = (function(){
  let _ctx = null;
  function _getCtx(){
    if(!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
  }

  /* ── Generic tone player ── */
  function _play(type, freq, gainVal, duration, decayTime, pitchSlide){
    try{
      let vol=typeof sfxVolume!=='undefined'?sfxVolume:0.8;
      let ctx = _getCtx();
      let osc = ctx.createOscillator();
      let gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if(pitchSlide) osc.frequency.linearRampToValueAtTime(pitchSlide, ctx.currentTime + duration);
      gain.gain.setValueAtTime(gainVal*vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + decayTime);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + decayTime);
    }catch(e){}
  }

  /* ── Noise burst (for wrong answer) ── */
  function _noise(gainVal, duration){
    try{
      let vol=typeof sfxVolume!=='undefined'?sfxVolume:0.8;
      let ctx = _getCtx();
      let bufSize = ctx.sampleRate * duration;
      let buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      let data = buf.getChannelData(0);
      for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
      let src = ctx.createBufferSource();
      src.buffer = buf;
      let filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 400;
      filter.Q.value = 0.5;
      let gain = ctx.createGain();
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(gainVal*vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      src.start(); src.stop(ctx.currentTime + duration);
    }catch(e){}
  }

  return {
    /* UI click — short crisp tick */
    click: function(){
      _play('square', 880, 0.08, 0.06, 0.07, 660);
    },

    /* Correct answer — bright upward chime */
    correct: function(){
      _play('sine', 523, 0.18, 0.12, 0.28, 784);   // C5 → G5
      setTimeout(()=> _play('sine', 784, 0.14, 0.08, 0.22), 80);  // G5 accent
      setTimeout(()=> _play('triangle', 1047, 0.10, 0.06, 0.30), 160); // C6 sparkle
    },

    /* Wrong answer — low dull thud + noise */
    wrong: function(){
      _play('sawtooth', 120, 0.15, 0.12, 0.30, 80);
      _noise(0.10, 0.20);
    }
  };
})();

// ── Sanitize profiles: remove null/corrupt entries, repair missing fields ──
(function sanitizeProfiles(){
  if(!profiles || typeof profiles !== 'object'){profiles={};return;}
  Object.keys(profiles).forEach(name=>{
    let p=profiles[name];
    if(!p || typeof p !== 'object'){
      delete profiles[name]; // Remove corrupt entry
    } else {
      if(!Array.isArray(p.words)) p.words=[];
      if(typeof p.xp !== 'number') p.xp=0;
      // Repair any corrupt word entries
      p.words=p.words.filter(w=>w && typeof w==='object' && w.kanji);
      p.words.forEach(w=>{
        if(typeof w.correct !== 'number') w.correct=0;
        if(typeof w.wrong   !== 'number') w.wrong=0;
        if(!w.hira) w.hira='';
        if(!w.arti) w.arti='';
        // ── Core Score migration: assign starting value for existing words ──
        if(typeof w.coreScore !== 'number'){
          // Existing words: estimate from correct/wrong history
          let c=w.correct||0, ww=w.wrong||0;
          if(c+ww===0){ w.coreScore=20; } // never seen
          else {
            // Reconstruct estimated score: start 20, apply history (matches current +3/-1 gain/penalty)
            let est=Math.max(0,Math.min(50, 20 + c*3 - ww));
            w.coreScore=est;
          }
        }
      });
    }
  });
})();

/* ── LEVENSHTEIN DISTANCE (for typo tolerance in type mode) ── */
function levenshtein(a,b){
  let m=a.length,n=b.length;
  let dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
/* Returns: "correct" | "close1" | "close2" | "close3" | "wrong"
   close1=1 typo, close2=2 typos, close3=3 typos */
function checkTypoTolerance(given, correct){
  let g=given.trim().toLowerCase(), c=correct.trim().toLowerCase();
  if(g===c) return "correct";
  let dist=levenshtein(g,c);
  if(dist===1) return "close1";
  if(dist===2) return "close2";
  if(dist===3) return "close3";
  return "wrong";
}

   Use for XP / coin display when numbers get large.
   Exact format preserved below ~1000 so small numbers stay crisp. */
function fmtNum(n){
  n=Number(n)||0;
  if(n<1000) return String(n);
  if(n<1e6){let v=n/1e3;return (v%1===0?v.toFixed(0):v.toFixed(v<10?2:1))+'K';}
  if(n<1e9){let v=n/1e6;return (v%1===0?v.toFixed(0):v.toFixed(v<10?2:1))+'M';}
  let v=n/1e9;return (v%1===0?v.toFixed(0):v.toFixed(2))+'B';
}

/* ── ENCODE / DECODE (Kotoba-specific, not human-readable) ── */
// XOR cipher with a rotating key seeded to this app's identity
const _ENC_KEY="KotobaRhodesIslandProtocol_v3";
function _encodeData(obj){
  try{
    // Use encodeURIComponent to safely convert Unicode/Japanese to Latin-1 safe bytes
    let raw=encodeURIComponent(JSON.stringify(obj));
    let bytes=[];
    for(let i=0;i<raw.length;i++){bytes.push(raw.charCodeAt(i));}
    let k=[..._ENC_KEY].map(c=>c.charCodeAt(0));
    let out=[];
    for(let i=0;i<bytes.length;i++){out.push((bytes[i]^k[i%k.length]^((i*7+13)&0xFF))&0xFF);}
    // Build base64 in chunks to avoid call stack overflow on large arrays
    let str='';
    const CHUNK=8192;
    for(let i=0;i<out.length;i+=CHUNK){str+=String.fromCharCode(...out.slice(i,i+CHUNK));}
    return btoa(str);
  }catch(e){return null;}
}
function _decodeData(encoded){
  try{
    let raw=atob(encoded);
    let bytes=[];
    for(let i=0;i<raw.length;i++){bytes.push(raw.charCodeAt(i));}
    let k=[..._ENC_KEY].map(c=>c.charCodeAt(0));
    let out=[];
    for(let i=0;i<bytes.length;i++){out.push((bytes[i]^k[i%k.length]^((i*7+13)&0xFF))&0xFF);}
    // Try old format FIRST: treat XOR output bytes as raw UTF-8 via TextDecoder
    // (old saves stored raw UTF-8 bytes; decodeURIComponent silently passes them through garbled)
    try{
      let utf8=new TextDecoder('utf-8').decode(new Uint8Array(out));
      let parsed=JSON.parse(utf8);
      if(parsed&&typeof parsed==='object') return parsed;
    }catch(_){}
    // Fall back to new format (encodeURIComponent-wrapped ASCII)
    try{
      let str='';
      const CHUNK=8192;
      for(let i=0;i<out.length;i+=CHUNK){str+=String.fromCharCode(...out.slice(i,i+CHUNK));}
      return JSON.parse(decodeURIComponent(str));
    }catch(_){}
    return null;
  }catch(e){return null;}
}

function upgradePrice(base, level){ return Math.round(base * Math.pow(2, level)); }
function getUpgradeLevel(id){ return (shopData.upgrades&&shopData.upgrades[id])||0; }

function doUpgrade(type){
  if(!shopData.upgrades) shopData.upgrades={coin:0,xp:0,crit:0,critDmg:0};
  const cfg={coin:{base:300,max:20},xp:{base:300,max:20},crit:{base:2500,max:10},critDmg:{base:3000,max:10}};
  let c=cfg[type]; if(!c) return;
  let cur=shopData.upgrades[type]||0;
  if(cur>=c.max){ showShopToast("⚠ MAX LEVEL REACHED","#cc4444"); return; }
  let price=upgradePrice(c.base, cur);
  if(shopData.coins<price){ showShopToast("⚠ NOT ENOUGH COINS","#cc4444"); return; }
  shopData.coins-=price;
  shopData.upgrades[type]=cur+1;
  saveAll();
  renderShop("upgrade");
}

/* ── XP / LEVEL SYSTEM ──
   Total 100,000 XP = Level 300 (hard cap).
   Curve: totalXpForLevel(lvl) = 100000*(lvl/300)^1.5
   Early levels are fast (~19 XP for lv1), later levels slow (~500 XP for lv300).
*/
/* ── XP / LEVEL SYSTEM ──
   Stable linear growth lv1-500, with 10× spike cost every 50 levels.
   Total 150,000,000 XP = Level 500.
   Past lv500: each additional level costs 150,000,000 XP.
   Normal step at lv1≈1,100 XP, lv499≈499,000 XP.
   Spike at lv50≈500,800, lv100≈1,000,610, lv500≈4,999,030.
*/
function xpForLevel(lvl){
  if(lvl<=0)return 0;
  if(lvl>500)return 150000000; // past cap: 150M per level
  var base=Math.round(100+lvl*999.6067);
  return (lvl%50===0)?base*10:base;
}
function _totalXpForLevel(lvl){
  if(lvl<=0)return 0;
  if(lvl>500)return 150000000+(lvl-500)*150000000;
  var t=0;
  for(var i=1;i<=lvl;i++)t+=xpForLevel(i);
  return t;
}
// Precomputed cumulative XP table for lv0-500 for O(1) lookups
var _xpTable=(function(){
  var t=[0];
  for(var i=1;i<=500;i++)t.push(t[i-1]+xpForLevel(i));
  return t;
})();
function calcLevel(totalXp){
  if(totalXp<=0)return 0;
  if(totalXp>=150000000){
    return 500+Math.floor((totalXp-150000000)/150000000);
  }
  // Binary search in precomputed table
  var lo=0,hi=500;
  while(lo<hi){var mid=(lo+hi+1)>>1;if(_xpTable[mid]<=totalXp)lo=mid;else hi=mid-1;}
  return lo;
}
function xpInCurrentLevel(totalXp){
  var lvl=Math.min(calcLevel(totalXp),500);
  return totalXp-_xpTable[lvl];
}

// Build RESETABLE achievements dynamically — thresholds scale with hardness
function buildAchievements(){
  let hm=getHardnessMult();
  let lang=T[appLang]||T.en;
  return ACH_BASE.map(a=>{
    let threshold=Math.ceil(a.base*hm);
    let rawDesc=(lang.achDescs&&lang.achDescs[a.id])||a.baseDesc;
    let desc=rawDesc.replace(/\{(\d+)\}/,()=>threshold);
    let name=(lang.achNames&&lang.achNames[a.id])||a.name;
    return {...a, name, threshold, desc,
      check:(g,p)=>{
        if(a.type==='_perfect')     return !!g._perfect;
        if(a.type==='_combo')       return (g._combo||0)>=threshold;
        if(a.type==='masteredWords') return p&&p.words&&p.words.filter(w=>isMasteredKotoba(w)).length>=threshold;
        return (g[a.type]||0)>=threshold;
      }
    };
  });
}
function getAchievements(){return buildAchievements();}

function allNonResetUnlocked(){
  let achs=getAchievements();
  return achs.every(a=>achievements[a.id]);
}

function checkAchievements(extra={}){
  let profile=currentProfile?profiles[currentProfile]:null;
  let g={...globalStats,...extra};
  let achs=getAchievements();
  let unlocked=[];
  achs.forEach(a=>{
    if(!achievements[a.id]&&a.check(g,profile)){
      achievements[a.id]={unlockedAt:Date.now()};
      globalStats.xp+=a.reward;
      globalStats.level=calcLevel(globalStats.xp);
      unlocked.push(a);
    }
  });
  // Check fixed achievements
  FIXED_ACHIEVEMENTS.forEach(a=>{
    if(!achievements[a.id]&&a.check(g)){
      achievements[a.id]={unlockedAt:Date.now()};
      globalStats.xp+=a.reward;
      globalStats.level=calcLevel(globalStats.xp);
      unlocked.push(a);
    }
  });
  if(unlocked.length)saveAll();
  return unlocked;
}

function ensureDailyMissions(){
  let today=new Date().toDateString();
  if(dailyMissions.date!==today){
    dailyMissions={date:today,missions:shuffle([...MISSION_POOL]).slice(0,3),done:[],progress:{}};
    dailyProgress={correct:0,sessions:0,combo:0,noerror:0};
    saveAll();
  } else {
    dailyProgress=dailyMissions.progress||{correct:0,sessions:0,combo:0,noerror:0};
  }
}

function updateDailyProgress(type,val){
  dailyProgress[type]=(dailyProgress[type]||0)+val;
  dailyMissions.progress=dailyProgress;
  dailyMissions.missions.forEach(m=>{
    if(!dailyMissions.done.includes(m.id)&&(dailyProgress[m.type]||0)>=m.target){
      dailyMissions.done.push(m.id);
      globalStats.xp+=m.reward;
      globalStats.level=calcLevel(globalStats.xp);
      showMissionToast(m);
    }
  });
  saveAll();
}

function showMissionToast(m){
  let lang=T[appLang]||T.en;
  let title=(lang.missionTitles&&lang.missionTitles[m.id])||m.title;
  let toastEl=document.createElement("div");
  toastEl.className="ach-toast";
  toastEl.style.borderLeftColor="var(--blue)";
  toastEl.innerHTML=`<div class="ach-toast-title" style="color:var(--blue);">◈ ${appLang==='jp'?'ミッション完了':'MISSION COMPLETE'}</div><div class="ach-toast-name">${title}</div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);margin-top:4px;">+${m.reward} XP</div>`;
  document.body.appendChild(toastEl);
  setTimeout(()=>{toastEl.style.transition="opacity 0.3s";toastEl.style.opacity="0";setTimeout(()=>toastEl.remove(),300);},3500);
}

/* ── STREAK ── */
function updateDailyStreak(){
  let today=new Date().toDateString();
  let yesterday=new Date(Date.now()-86400000).toDateString();
  if(globalStats.lastDay===today)return;
  globalStats.grindDays=(globalStats.lastDay===yesterday)?(globalStats.grindDays||0)+1:1;
  globalStats.lastDay=today;
  saveAll();
}

/* ── LEVEL UP OVERLAY ── */
function showLevelUp(newLevel,cb){
  let rank=getRankTitle(newLevel);
  let ov=document.createElement("div");
  ov.className="levelup-overlay";
  ov.innerHTML=`<div class="levelup-box" style="box-shadow:${rank.glow};"><div class="levelup-label">LEVEL UP</div><div class="levelup-num" style="color:${rank.color};">${newLevel}</div><div class="levelup-rank" style="color:${rank.color};">${rank.title}</div><div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:16px;letter-spacing:2px;">TAP TO CONTINUE</div></div>`;
  document.body.appendChild(ov);
  let done=false;
  function proceed(){if(done)return;done=true;try{if(ov.parentNode)ov.remove();}catch(e){}if(cb)cb();}
  // Only allow tap-to-dismiss after a brief moment (prevents instant accidental dismiss)
  setTimeout(()=>{ ov.addEventListener("click",proceed); }, 600);
  setTimeout(proceed,4000);
}

/* ── XP BAR WIDGET ── */
function renderXpBar(){
  let lvl=globalStats.level,rank=getRankTitle(lvl);
  let cur=xpInCurrentLevel(globalStats.xp),need=xpForLevel(lvl);
  let pct=Math.min(100,Math.floor((cur/need)*100));
  return `<div class="xp-bar-wrap"><div class="xp-bar-header"><div><span class="xp-rank" style="color:${rank.color};">LV ${lvl}</span><span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-left:8px;letter-spacing:1px;">${rank.title}</span></div><div class="xp-nums">${fmtNum(cur)} / ${fmtNum(need)} XP</div></div><div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${pct}%;"></div><div class="xp-bar-shine"></div></div></div>`;
}

}

function _simpleThemeCard(item,owned,isActive,action,sh){
  sh=sh||(SHOP_SHELLS[shopData.activeUI||'arknight']||SHOP_SHELLS.arknight);
  let p=item.preview;
  let borderCol=isActive?p.accent:owned?p.accent+'66':sh.border;
  let statusBadge=isActive
    ?`<span style="background:${p.accent}22;color:${p.accent};border:1px solid ${p.accent}55;font-family:${sh.monoFont};font-size:8px;letter-spacing:1px;padding:2px 7px;">✓ ACTIVE</span>`
    :owned
    ?`<span style="color:${sh.textDim};font-family:${sh.monoFont};font-size:8px;letter-spacing:1px;">OWNED</span>`
    :`<span style="color:${sh.accent};font-family:${sh.monoFont};font-size:8px;letter-spacing:1px;">🪙 ${item.price}</span>`;
  let qLine=item.preview.sampleQ||'学校';
  let aLine=item.preview.sampleA||'がっこう · school';
  let preview2=`
    <div style="border:1px solid ${p.border};background:${p.bg};padding:8px 10px;margin-bottom:8px;overflow:hidden;position:relative;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${p.accent},transparent);"></div>
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;">
        <div style="font-size:7px;letter-spacing:2px;color:${p.accent};font-family:${sh.monoFont};opacity:0.7;">QUESTION</div>
      </div>
      <div style="font-size:15px;font-weight:700;color:${p.text};font-family:${sh.titleFont};letter-spacing:1px;line-height:1.1;margin-bottom:6px;">${qLine}</div>
      <div style="background:${p.accent}1a;border:1px solid ${p.accent}44;border-left:2px solid ${p.accent};padding:3px 8px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:10px;font-weight:700;color:${p.accent};font-family:${sh.titleFont};letter-spacing:1px;">${aLine}</span>
        <span style="font-size:7px;color:${p.accent}88;font-family:${sh.monoFont};">✓</span>
      </div>
    </div>`;
  return `<div ${action} style="background:${sh.bg};border:1px solid ${borderCol};padding:10px;cursor:${isActive?'default':'pointer'};transition:all 0.15s;${isActive?'box-shadow:0 0 12px '+p.accent+'22;':''}" onmouseenter="if(this.style.cursor!=='default')this.style.borderColor='${p.accent}88'" onmouseleave="if(this.style.cursor!=='default')this.style.borderColor='${borderCol}'">

    </div>
  </div>`;
}

// ── Core helpers ──
function getEquippedWeaponId(){
  // Crystal: active weapon ids are the crystalSlots
  if(shopData.equippedWeapon==="crystal" && shopData.ownedWeapons.includes("crystal"))
    return "crystal";
  return shopData.equippedWeapon||null;
}
function getActiveWeaponIds(){
  let eq=getEquippedWeaponId();
  if(!eq)return [];
  if(eq==="crystal") return (shopData.crystalSlots||[]).filter(id=>id&&shopData.ownedWeapons.includes(id));
  return [eq];
}
function hasWeapon(id){return getActiveWeaponIds().includes(id);}
function anyWeapon(...ids){return ids.some(id=>hasWeapon(id));}

// Per-session weapon state (reset in startGame)
let _wpnBombCount=0;
let _wpnSaberPct=0;
let _wpnSaberActive=false;
let _wpnShotgunRolled=false,_wpnShotgunBonus=0;
let _wpnSwordRolled=false,_wpnSwordBonus=0;
let _wpnDualRolled=false,_wpnDualBonus=0;
let _wpnChainsawCritBonus=0; // extra CRIT % from chainsaw super crits
let _wpnLaserSuperActive=false; // current question is laser super Q

function resetWeaponSession(){
  _wpnBombCount=0;_wpnSaberPct=0;_wpnSaberActive=false;
  _wpnShotgunRolled=false;_wpnShotgunBonus=0;
  _wpnSwordRolled=false;_wpnSwordBonus=0;
  _wpnDualRolled=false;_wpnDualBonus=0;
  _wpnLaserSuperActive=false;
}

// ── Session-start rolls (shotgun / sword / dualsword) ──
function rollWeaponSessionStart(){
  if(anyWeapon("shotgun")&&!_wpnShotgunRolled){
    _wpnShotgunRolled=true;
    if(Math.random()<0.30)_wpnShotgunBonus=0.30; // 30%
  }
  if(anyWeapon("sword")&&!_wpnSwordRolled){
    _wpnSwordRolled=true;
    if(Math.random()<0.20)_wpnSwordBonus=1.00; // 100%
  }
  if(anyWeapon("dualsword")&&!_wpnDualRolled){
    _wpnDualRolled=true;
    if(Math.random()<0.30)_wpnDualBonus=1.50; // 150%
  }
}

// ── Per-correct-answer weapon effects ──
// Returns {xpMult, extraCoins} additions
function applyWeaponOnCorrect(baseXp, currentCombo){
  let extraCoins=0;
  let xpAdd=0;

  // C: Bonk — +1 coin
  if(hasWeapon("bonk")) extraCoins+=1;

  // C: Keyboard — +2% XP
  if(hasWeapon("keyboard")) xpAdd+=baseXp*0.02;

  // C: Cutter — +1% XP
  if(hasWeapon("cutter")) xpAdd+=baseXp*0.01;

  // C: Pistol — every 3 combo: +5 coins
  if(hasWeapon("pistol")&&currentCombo>0&&currentCombo%3===0) extraCoins+=5;

  // C: Hammer — 20% chance +30% XP
  if(hasWeapon("hammer")&&Math.random()<0.20) xpAdd+=baseXp*0.30;

  // B: Punch — +10% of coin grant (applied separately in processAnswer)

  // B: Katana — 30% chance +15 coins
  if(hasWeapon("katana")&&Math.random()<0.30) extraCoins+=15;

  // B: AK-47 — every 10 combo: +30 coins
  if(hasWeapon("ak47")&&currentCombo>0&&currentCombo%10===0) extraCoins+=30;

  // A: Bomb — 40% chance collect bomb
  if(hasWeapon("bomb")&&Math.random()<0.40){
    _wpnBombCount=Math.min(3,_wpnBombCount+1);
    _showWeaponBadge(`💣 BOMB ×${_wpnBombCount}`,_wpnBombCount>=3?"#ff4060":"#c060ff");
  }

  // A: Saber — 45% chance charge bar
  if(hasWeapon("lightsaber")&&!_wpnSaberActive){
    if(Math.random()<0.45){
      let inc=3+Math.floor(Math.random()*5); // 3–7
      _wpnSaberPct=Math.min(100,_wpnSaberPct+inc);
      _showWeaponBadge(`⚡ SABER ${_wpnSaberPct}%`,"#c060ff");
      if(_wpnSaberPct>=100){
        _wpnSaberActive=true;
        _showWeaponBadge("⚡ SABER FULL — ×2 ALL!","#ff4060",2000);
      }
    }
  }

  return {xpAdd:Math.round(xpAdd),extraCoins};
}

// ── Chainsaw super-crit (called when normal CRIT fires) ──
function applyWeaponCrit(baseXpGained){
  if(!hasWeapon("chainsaw"))return{superCrit:false,coins:0,xp:0};
  if(Math.random()<0.50){
    _wpnChainsawCritBonus+=0.06;
    let c=Math.round(baseXpGained*10*0.1);
    let x=Math.round(baseXpGained*0.5);
    _fx_superCrit();
    return{superCrit:true,coins:c,xp:x};
  }
  return{superCrit:false,coins:0,xp:0};
}

// ── Laser super-question (called in renderGame for choice mode) ──
function rollLaserSuperQ(){
  _wpnLaserSuperActive=false;
  if(hasWeapon("laser")&&gameMode==="choice"&&Math.random()<0.15){
    _wpnLaserSuperActive=true;
  }
}

// ── End-game weapon bonuses (called in renderSummary) ──
function applyWeaponEndGame(){
  let xpBonus=0, coinMult=1;
  // Shotgun / Sword / Dual Sword end-game XP
  xpBonus+=Math.round(sessionXpGain*_wpnShotgunBonus);
  xpBonus+=Math.round(sessionXpGain*_wpnSwordBonus);
  xpBonus+=Math.round(sessionXpGain*_wpnDualBonus);
  // Bomb: if 3 bombs collected → XP ×3 coins ×5
  let bombTriggered=hasWeapon("bomb")&&_wpnBombCount>=3;
  if(bombTriggered){
    xpBonus+=sessionXpGain*2; // total becomes ×3
    coinMult=5;
  }
  // Saber active: XP already ×2 per-answer — nothing extra at end
  return{xpBonus,coinMult,bombTriggered,

/* ── UPGRADE SYSTEM (canonical functions used by processAnswer) ── */
/* ══════════════════════════════════════════════════════════════
   SHOP ECONOMY NOTES — long-term pricing methodology (fixed-price catalog)
   ──────────────────────────────────────────────────────────────
   Goal: buying every purchasable item in the shop (all WEAPON_ITEMS,
   EFFECT_ITEMS, EMBLEM_ITEMS, UI_THEMES, and the diamond unlock) should
   take roughly up to 1,000 hours of blended playtime — i.e. items are
   deliberately NOT cheap; getting the whole collection is a long-term,
   aggressive-progress goal, not something done in a few sessions.

   Assumptions used to derive the 1,000-hour coin budget:
   - ~240 answers/hour sustained play, ~80% accuracy → ~192 correct/hour
   - Baseline coin grant is ~1 coin/correct with no items/levels owned
     (per the coinsGranted formula below), so a totally fresh account
     earns roughly ~200 coins/hour.
   - Owned weapons/emblems/upgrade levels compound over time (levels,
     % XP/coin bonuses, combo/crit systems all stack), so realistic
     income accelerates a lot over the course of a long playthrough.
     A blended average of ~500 coins/hour across the full 1,000-hour
     journey was assumed (conservative — actual late-game income is
     much higher, early-game income is lower).
   - Total budget ≈ 500 coins/hr × 1,000 hr = 500,000 coins.

   That 500,000-coin budget was split across every fixed-price item by
   a benefit score (0–100) reflecting each item's expected XP/coin value
   per answer or per session, weighted by how often its effect actually
   triggers (always-on % bonuses score lower than their number implies
   once amortized per-answer; session-gated burst effects like Bomb/
   Light Saber/Dual Sword score higher because their payout lands all
   at once). Cosmetic-only items (effects, themes) were scored low and
   priced as accessible early/mid goals rather than grind walls.

   This does NOT apply to UPGRADES_DEF below — those already use
   exponential pricing (basePrice × 2^level) and are intentionally
   uncapped, so they don't need a separate "1,000 hour" target; a
   fully-maxed upgrade set alone already costs several hundred million
   coins, i.e. effectively endless. If the assumptions above change
   (different answer rate, different target hour count), rescale every
   fixed-price item proportionally rather than adjusting them by hand
   one at a time, to keep the relative tier balance intact.
   ══════════════════════════════════════════════════════════════ */
const UPGRADES_DEF={
  coin:   {maxLevel:20,basePrice:300,  icon:'🪙',color:'#f0c060',label:'COIN BONUS',  desc:'Each level adds +25% coin gain (max +500%). Price doubles each upgrade.',  perLevel:25},
  xp:     {maxLevel:20,basePrice:300,  icon:'⬡', color:'#60b8ff',label:'XP BONUS',    desc:'Each level adds +25% XP gain (max +500%). Price doubles each upgrade.',    perLevel:25},
  crit:   {maxLevel:10,basePrice:2500, icon:'💥',color:'#ff4060',label:'CRIT CHANCE', desc:'Each level adds +2% CRIT hit chance (separate bonus pool).',     perLevel:2},
  critDmg:{maxLevel:10,basePrice:3000, icon:'⚡',color:'#ff6060',label:'CRIT DAMAGE', desc:'CRIT: +200% XP & coins per level. lv1=×2, lv2=×4…lv10=×20. Super CRIT escalates on top.',perLevel:200},
};
function getUpgradeTotalBonus(id){let d=UPGRADES_DEF[id];if(!d)return 0;return getUpgradeLevel(id)*d.perLevel;}
function getUpgradePrice(id){let d=UPGRADES_DEF[id];if(!d)return 0;let lv=getUpgradeLevel(id);return Math.floor(d.basePrice*Math.pow(2,lv));}
function getCoinUpgradeMult(){return 1+(getUpgradeTotalBonus('coin')/100);}
function getXpUpgradeMult(){return 1+(getUpgradeTotalBonus('xp')/100);}
function getCritUpgradeBonus(){return getUpgradeTotalBonus('crit')/100;}
function getCritDmgMult(){
  // lv0 = ×1 (no upgrade), lv1 = ×2 (+200%), lv2 = ×4 (+400%), lv10 = ×20 (+2000%)
  // "200% bonus" means the bonus portion is lv×2, so total multiplier is max(1, lv*2)
  let lv=getUpgradeLevel('critDmg');
  return lv===0?1:lv*2;
}
function getCritCoinMult(){
  // Same scale as XP: lv0=×1, lv1=×2, lv2=×4 ... lv10=×20
  let lv=getUpgradeLevel('critDmg');
  return lv===0?1:lv*2;
}

function getWordNote(kanji){
  // Search all profiles for this word and return its note
  for(let pn of Object.keys(profiles)){
    let p=profiles[pn];
    let w=(p.words||[]).find(x=>x.kanji===kanji);
    if(w&&w.note!==undefined&&w.note!=='') return w.note;
  }
  return '';
}

function setWordNote(kanji, note){
  // Update note on all matching words across all profiles
  let changed=false;
  for(let pn of Object.keys(profiles)){
    let p=profiles[pn];
    let w=(p.words||[]).find(x=>x.kanji===kanji);
    if(w){ w.note=note; changed=true; }
  }
  // Also update currentWord if it matches
  if(currentWord&&currentWord.kanji===kanji) currentWord.note=note;
  if(changed) saveAll();
}

      <a id="note-mazii-btn" href="https://mazii.net/id-ID/search/word/jaid/${encodeURIComponent(kanji)}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin:10px 0 0;padding:9px 14px;background:rgba(58,114,176,0.10);border:1px solid rgba(58,114,176,0.45);border-left:3px solid #3a72b0;color:#6aaee8;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;text-decoration:none;text-transform:uppercase;transition:background 0.18s,border-color 0.18s;cursor:pointer;" onmouseover="this.style.background='rgba(58,114,176,0.22)';this.style.borderColor='#3a72b0';" onmouseout="this.style.background='rgba(58,114,176,0.10)';this.style.borderColor='rgba(58,114,176,0.45)';">
        <span style="font-size:14px;">🔍</span> ${isJP?'Mazii で検索':'SEARCH ON MAZII'} <span style="opacity:0.6;font-size:9px;">↗</span>
      </a>
      <div class="note-modal-actions">
        <button class="note-modal-save" id="note-save-btn">💾 ${isJP?'保存':'SAVE'}</button>
        <button class="note-modal-clear" id="note-clear-btn">✕ ${isJP?'削除':'CLEAR'}</button>
        <button class="note-modal-cancel" id="note-cancel-btn">${isJP?'閉じる':'CLOSE'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  // Push a history entry so hardware back closes the modal, not navigates away
  history.pushState({_kotoba:"modal", _modal:"note"}, "");
  // Signal to nav system that a modal is open — hardware back must close modal only
  window._kotobaModalOpen = true;

  // Focus textarea
  setTimeout(()=>document.getElementById('note-modal-ta')?.focus(),60);

  let _modalClosed = false;

  // Hardware back: popstate fires — close modal and restore guard
  function _modalPopstate(e){
    if(!document.getElementById('note-modal-overlay')) return;
    window.removeEventListener("popstate", _modalPopstate);
    window._kotobaModalOpen = false;
    _modalClosed = true;
    overlay.remove();
    // Re-push the nav guard so the back system stays intact
    history.pushState({_kotoba:"guard"}, "");
  }
  window.addEventListener("popstate", _modalPopstate);

  // When modal closes via buttons: remove modal history entry WITHOUT triggering popstate
  function _closeAndClean(){
    if(_modalClosed) return;
    _modalClosed = true;
    window.removeEventListener("popstate", _modalPopstate);
    window._kotobaModalOpen = false;
    overlay.remove();
    // Replace current modal entry back to guard — no history.back(), no popstate fired
    history.replaceState({_kotoba:"guard"}, "");
  }

  document.getElementById('note-save-btn').addEventListener('click',()=>{
    let val=(document.getElementById('note-modal-ta')?.value||'').trim();
    setWordNote(kanji, val);
    if(onSave) onSave(val);
    _closeAndClean();
    // Show save toast
    _showNoteToast(isJP?'📝 ノートを保存しました':'📝 Note saved','var(--accent)');
  });
  document.getElementById('note-clear-btn').addEventListener('click',()=>{
    if(confirm(isJP?'このノートを削除しますか？':'Clear this note?')){
      setWordNote(kanji,'');
      if(onSave) onSave('');
      _closeAndClean();
      _showNoteToast(isJP?'📝 ノートを削除しました':'📝 Note cleared','var(--red)');
    }
  });
  document.getElementById('note-cancel-btn').addEventListener('click', _closeAndClean);
  // Click outside to close
  overlay.addEventListener('click',e=>{ if(e.target===overlay) _closeAndClean(); });
  // Ctrl+Enter or Escape shortcuts
  document.getElementById('note-modal-ta').addEventListener('keydown',e=>{
    if(e.key==='Escape'){ _closeAndClean(); }
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){document.getElementById('note-save-btn').click();}
  });
}

function _showNoteToast(msg, color){
  let t=document.createElement("div");
  t.style.cssText=`position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid ${color};border-left:3px solid ${color};padding:7px 18px;font-family:'Share Tech Mono',monospace;font-size:11px;color:${color};letter-spacing:2px;z-index:30001;pointer-events:none;white-space:nowrap;`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.transition="opacity 0.4s";t.style.opacity="0";setTimeout(()=>t.remove(),400);},1800);
}

/* Helper: per-grub stats for a profile (works for both classic 25/50 groups and Free Mode grubs) */
function computeGrubStats(profName){
  let p=profiles[profName];
  if(!p) return [];
  let groups=getProfileGroups(profName);
  let titles=p.groupTitles||[];
  return groups.map((g,idx)=>{
    let c=g.reduce((s,w)=>s+(w.correct||0),0);
    let wr=g.reduce((s,w)=>s+(w.wrong||0),0);
    let practiced=(c+wr)>0;
    let acc=practiced?Math.round(c/(c+wr)*100):null;
    let mastered=g.filter(w=>isMasteredKotoba(w)).length;
    let total=g.length;
    let pct=total>0?Math.floor(mastered/total*100):0;
    let leeches=g.filter(w=>w.isLeech).length;
    let label=p.freeMode?((titles[idx])||((appLang==='jp'?'グループ ':'Grub ')+(idx+1))):((idx*25+1)+'\u2013'+(idx*25+25));
    return {idx,label,total,mastered,pct,acc,practiced,leeches};
  });
}


function renderBenkyouAnalystProfile(profName){
  let isJP=appLang==='jp';
  if(!profName||!profiles[profName]){ renderBenkyouAnalyst(); return; }
  let p=profiles[profName];
  let pw=p.words||[];

  // ── 1) PROGRESS PROFIL ──
  let totalW=pw.length;
  let masteredW=pw.filter(w=>isMasteredKotoba(w)).length;
  let corr=pw.reduce((s,w)=>s+(w.correct||0),0);
  let wrong=pw.reduce((s,w)=>s+(w.wrong||0),0);
  let overallAcc=corr+wrong>0?Math.round(corr/(corr+wrong)*100):0;
  let lv=calcLevel(p.xp||0);
  let overallPct=totalW>0?Math.floor(masteredW/totalW*100):0;
  let progColor=overallPct>=80?'#3ac8a0':overallPct>=50?'var(--accent)':'var(--red)';
  let leechCount=pw.filter(w=>w.isLeech).length;

  // ── 2) MINUS DI GRUB APA (weakest grubs first) ──
  let grubStats=computeGrubStats(profName);
  let rankedGrubs=[...grubStats].sort((a,b)=>{
    if(a.practiced&&b.practiced) return a.acc-b.acc;
    if(a.practiced&&!b.practiced) return -1;
    if(!a.practiced&&b.practiced) return 1;
    return a.pct-b.pct;
  });
  let allGrubGroups=getProfileGroups(profName);

  // Renders a single focus-kotoba card (used inside each grub's toggle body)
  function _focusCardHtml(w,ratio){
    let pctW=Math.round(ratio*100);

    let leechTag=w.isLeech?`<span style="font-family:'Share Tech Mono',monospace;font-size:6px;color:#ff2060;letter-spacing:1px;border:1px solid #ff206040;padding:1px 3px;">⛓LEECH</span>`:'';

        <div style="height:100%;width:${pctW}%;background:${sev};transition:width 0.6s;"></div>
      </div>
    </div>`;
  }

  let grubHtml=rankedGrubs.length?rankedGrubs.map(g=>{
    let color=!g.practiced?'var(--text-dim)':g.acc<50?'var(--red)':g.acc<75?'var(--accent)':'#3ac8a0';

    let gWords=allGrubGroups[g.idx]||[];
    let gFocus=gWords
      .filter(w=>(w.wrong||0)>(w.correct||0))
      .map(w=>({w,ratio:(w.wrong||0)/Math.max(1,(w.correct||0)+(w.wrong||0))}))
      .sort((a,b)=>(b.w.isLeech-a.w.isLeech)||(b.ratio-a.ratio)||(b.w.wrong-a.w.wrong))
      .slice(0,12);
    let focusBodyHtml=gFocus.length
      ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;">${gFocus.map(({w,ratio})=>_focusCardHtml(w,ratio)).join('')}</div>`

/* helper: detect categories for a word (mirrors recordCategoryResult logic) */
function detectCategories(w){
  if(!w||!w.kanji)return[];
  let cats=[];
  let k=w.kanji||'';let h=w.hira||'';
  // Verb
  if(/[うくすつぬふむゆる]$/.test(h)||/[うくすつぬふむゆる]$/.test(k))cats.push('verb');
  // i-adj
  if(/い$/.test(h)||(/い$/.test(k)&&!/[あ-ん]/.test(k.slice(-2,-1))))cats.push('i-adj');
  // na-adj
  if(w.arti&&/(な|な-|na-adj|na adj)/i.test(w.arti||''))cats.push('na-adj');
  // noun (default if no other)
  if(!cats.length)cats.push('noun');
  // Short / long
  if(k.length<=2)cats.push('short');
  else if(k.length>=5)cats.push('long');
  // Kanji / kana
  if(/[一-龯]/.test(k))cats.push('kanji');
  else if(/^[ぁ-ゔァ-ヴ]+$/.test(k))cats.push('kana-only');
  return cats;
}

    let confirmMsg=isJP
      ?`プレステージリセット #${resetCount+1}?\n\nリセット可能実績がクリアされます。\n（固定実績は保持されます）\n難易度: ${currentMult}× → ${nextReset.mult}×\n\nXP・レベル・単語・セッションは保持されます。`
      :`PRESTIGE RESET #${resetCount+1}?\n\nResetable achievement unlocks CLEAR.\n(Fixed achievements are kept!)\nHardness: ${currentMult}× → ${nextReset.mult}×\n\nXP, level, words and sessions are preserved.`;
    if(!confirm(confirmMsg))return;
    let fixedIds=new Set(FIXED_ACHIEVEMENTS.map(a=>a.id));
    Object.keys(achievements).forEach(k=>{if(!fixedIds.has(k))delete achievements[k];});
    resetCount++;saveAll();
    let toastEl=document.createElement("div");toastEl.className="ach-toast";toastEl.style.borderLeftColor="var(--purple)";
    let resetToastMsg=isJP?`リセット可能実績をリセット — 再度獲得しよう！`:`RESETABLE ACHIEVEMENTS CLEARED — RE-EARN THEM!`;
    toastEl.innerHTML=`<div class="ach-toast-title" style="color:var(--purple);">🔁 ${isJP?'プレステージ':'PRESTIGE'} #${resetCount}</div><div class="ach-toast-name">${isJP?'難易度':'Hardness'} ${getHardnessMult()}×</div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--red);margin-top:4px;">${resetToastMsg}</div>`;
    document.body.appendChild(toastEl);setTimeout(()=>{toastEl.style.transition="opacity 0.3s";toastEl.style.opacity="0";setTimeout(()=>toastEl.remove(),300);},4000);
    renderProgressHub();
  });
}

      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim);">${t('dayStreak')}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:8px;">${t('keepStreak')}</div>

/* ── ACHIEVEMENTS ── */
function renderAchievements(){
  let achs=getAchievements();
  let hm=getHardnessMult();
  let unlockedReset=achs.filter(a=>achievements[a.id]).length;
  let unlockedFixed=FIXED_ACHIEVEMENTS.filter(a=>achievements[a.id]).length;
  let allDone=unlockedReset===achs.length;
  let profile=currentProfile?profiles[currentProfile]:null;
  let masteredCount=profile&&profile.words?profile.words.filter(w=>isMasteredKotoba(w)).length:0;

  function getCurrentVal(a){
    if(a.type==="totalCorrect") return globalStats.totalCorrect||0;
    if(a.type==="level") return globalStats.level||0;
    if(a.type==="totalSessions") return globalStats.totalSessions||0;
    if(a.type==="grindDays") return globalStats.grindDays||0;
    if(a.type==="masteredWords") return masteredCount;
    return achievements[a.id]?1:0;
  }

  function makeResetCard(a){
    let done=!!achievements[a.id];
    let cur=getCurrentVal(a);
    let req=a.threshold||a.base||1;
    let pct=a.base>0?Math.min(100,Math.floor((Math.min(cur,req)/req)*100)):done?100:0;
    let hardTag=(hm>1&&a.base>0)?`<span style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--red);letter-spacing:1px;"> ×${hm}</span>`:'';
    let prog=done?'':a.base>0?`<div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);margin-top:4px;">${Math.min(cur,req)} / ${req}</div><div class="ark-progress" style="margin-top:2px;"><div class="ark-progress-fill" style="width:${pct}%;"></div></div>`:'';
    return `<div class="ach-card ${done?'unlocked':'locked'}">
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}${hardTag}</div>
      <div class="ach-desc">${a.desc}</div>
      <div class="ach-reward">+${a.reward} XP${done?' ✓':''}</div>
      ${prog}
    </div>`;
  }

  function makeFixedCard(a){
    let done=!!achievements[a.id];
    return `<div class="ach-card ${done?'unlocked':'locked'}" style="${done?'border-color:var(--blue);':''}">
      ${done?`<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#3a72b0,#60a0e0);"></div>`:''}
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name" style="${done?'color:var(--accent2);':''}">${a.name} <span style="font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--blue);letter-spacing:1px;">FIXED</span></div>
      <div class="ach-desc">${a.desc}</div>
      <div class="ach-reward" style="color:var(--blue);">+${a.reward} XP${done?' ✓':''}</div>
    </div>`;
  }

  let resetCards=achs.map(makeResetCard).join('');
  let fixedCards=FIXED_ACHIEVEMENTS.map(makeFixedCard).join('');

  let hardBanner=hm>1?`<div style="background:rgba(201,64,64,0.08);border:1px solid rgba(201,64,64,0.3);border-left:3px solid var(--red);padding:10px 14px;margin-bottom:12px;">
    <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--red);letter-spacing:2px;">${(t('hardnessBanner')).replace('{N}',resetCount).replace('{M}',hm)}</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:3px;">${appLang==='jp'?`例: "100問正解" → "${Math.round(100*hm)}問正解" · "10コンボ" → "${Math.round(10*hm)}コンボ"`:`e.g. "100 correct" → "${Math.round(100*hm)} correct" · "10 combo" → "${Math.round(10*hm)} combo"`}</div>
  </div>`:'';

  let currentMult=1.0,nextReset=null;
  RESET_ACHIEVEMENTS.forEach(r=>{if(resetCount>=r.resets)currentMult=r.mult;else if(!nextReset)nextReset=r;});

  let resetSection='';
  if(allDone){
    if(nextReset){
      let allCompleteText=t('allComplete').replace('{N}',achs.length);
      let prestigeBtnText=t('prestigeBtn').replace('{M}',nextReset.mult);
      let resetInfoEN=`Reset ×${resetCount} · Hardness ${currentMult}× → Next: ${nextReset.mult}×`;
      let resetInfoJP=`リセット ×${resetCount} · 難易度 ${currentMult}× → 次: ${nextReset.mult}×`;
      let threshInfoEN=`Clears resetable achievements & multiplies all thresholds by ${nextReset.mult}×`;
      let threshInfoJP=`リセット可能実績をクリアし、全閾値を${nextReset.mult}×に乗算`;
      resetSection=`<div class="ark-section" style="color:var(--purple);">${t('prestigeReset')}</div>
      <div style="background:rgba(156,85,208,0.08);border:1px solid rgba(156,85,208,0.35);border-left:3px solid var(--purple);padding:12px 14px;margin-bottom:10px;">
        <div style="font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--purple);">${allCompleteText}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:4px;">${appLang==='jp'?resetInfoJP:resetInfoEN}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:2px;">${appLang==='jp'?threshInfoJP:threshInfoEN}</div>
        <button id="btn-do-reset" style="margin-top:10px;border-color:rgba(156,85,208,0.5);color:var(--purple);justify-content:center;">${prestigeBtnText}</button>
      </div>`;
    } else {
      resetSection=`<div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);text-align:center;padding:16px;border:1px solid var(--accent-dim);">${t('trueMax')}</div>`;
    }
  } else {
    let rem=achs.filter(a=>!achievements[a.id]).length;
    let remText=t('prestigeRemaining').replace('{R}',rem).replace('{C}',resetCount);
    resetSection=`<div style="background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--border);padding:10px 14px;margin-top:10px;opacity:0.5;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);">${t('prestigeLocked')}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:4px;">${remText}</div>
    </div>`;
  }

  app.innerHTML=`<div class="container">
    <div class="ark-header"><button class="back" data-action="goBack">${t('back')}</button><div class="ark-title">${appLang==='jp'?'実績 <span>ギャラリー</span>':'Achievement <span>Gallery</span>'}</div><div class="ark-badge" style="margin-left:auto;">${unlockedReset+unlockedFixed}/${achs.length+FIXED_ACHIEVEMENTS.length}</div></div>
    <div class="ark-progress" style="margin-bottom:14px;"><div class="ark-progress-fill" style="width:${(achs.length+FIXED_ACHIEVEMENTS.length)?Math.floor((unlockedReset+unlockedFixed)/(achs.length+FIXED_ACHIEVEMENTS.length)*100):0}%;"></div></div>
    ${hardBanner}
    <div class="ark-section" style="color:var(--blue);">🔒 FIXED ACHIEVEMENTS <span style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;"> — never reset · ${unlockedFixed}/${FIXED_ACHIEVEMENTS.length}</span></div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin:-4px 0 8px;letter-spacing:1px;">${appLang==='jp'?'// 一度解除すると永久に保持されます //':'// Once unlocked, kept forever — even after prestige reset //'}</div>
    <div class="ach-grid">${fixedCards}</div>
    <div class="ark-section" style="margin-top:16px;">🔁 RESETABLE ACHIEVEMENTS <span style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;"> — ${unlockedReset}/${achs.length}</span></div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin:-4px 0 8px;letter-spacing:1px;">${appLang==='jp'?'// プレステージリセット後に再獲得が必要 //':'// Must be re-earned after prestige reset //'}</div>
    <div class="ach-grid">${resetCards}</div>
    ${resetSection}
  </div>`;

  let rb=document.getElementById("btn-do-reset");
  if(rb) rb.addEventListener("click",()=>{
    if(!nextReset)return;
    let confirmMsg=appLang==='jp'
      ?`プレステージリセット #${resetCount+1}?\n\nリセット可能実績がクリアされます。\n（固定実績は保持されます）\n難易度: ${currentMult}× → ${nextReset.mult}×\n全閾値 ×${nextReset.mult}（例: 10コンボ → ${Math.ceil(10*nextReset.mult)}コンボ）\n\nXP・レベル・単語・セッションは保持されます。`
      :`PRESTIGE RESET #${resetCount+1}?\n\nResetable achievement unlocks CLEAR.\n(Fixed achievements are kept!)\nHardness: ${currentMult}× → ${nextReset.mult}×\nAll thresholds ×${nextReset.mult} (e.g. 10 combo → ${Math.ceil(10*nextReset.mult)} combo)\n\nXP, level, words and sessions are preserved.`;
    if(!confirm(confirmMsg))return;
    // Only clear resetable achievements, keep fixed ones
    let fixedIds=new Set(FIXED_ACHIEVEMENTS.map(a=>a.id));
    Object.keys(achievements).forEach(k=>{if(!fixedIds.has(k))delete achievements[k];});
    resetCount++;saveAll();
    let toastEl=document.createElement("div");toastEl.className="ach-toast";toastEl.style.borderLeftColor="var(--purple)";
    let resetToastMsg=appLang==='jp'?`リセット可能実績をリセット — 再度獲得しよう！`:`RESETABLE ACHIEVEMENTS CLEARED — RE-EARN THEM!`;
    toastEl.innerHTML=`<div class="ach-toast-title" style="color:var(--purple);">🔁 ${appLang==='jp'?'プレステージ':'PRESTIGE'} #${resetCount}</div><div class="ach-toast-name">${appLang==='jp'?'難易度':'Hardness'} ${getHardnessMult()}×</div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--red);margin-top:4px;">${resetToastMsg}</div>`;
    document.body.appendChild(toastEl);setTimeout(()=>{toastEl.style.transition="opacity 0.3s";toastEl.style.opacity="0";setTimeout(()=>toastEl.remove(),300);},4000);
    renderAchievements();
  });
}

    ? profileNames.map((name,i)=>{
        let p=profiles[name];
        let lv=calcLevel((p&&typeof p.xp==='number'?p.xp:0));
        let totalC=(p&&p.words?(p.words).reduce((s,w)=>s+(w.correct||0),0):0);
        let freeBadge=(p&&p.freeMode)?'<span style="font-size:8px;color:var(--purple);border:1px solid var(--purple);padding:1px 5px;margin-left:8px;letter-spacing:1px;">⬡ FREE</span>':'';

    <div id="csvFilename" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent-dim);padding:4px 0;letter-spacing:1px;">${appLang==='jp'?'// ファイル未選択 //':'// NO FILE SELECTED //'}</div>

    <textarea id="txtImport" placeholder="Kanji,Hiragana,Arti — one entry per line" style="height:110px;"></textarea>
    <button id="btn-import-text">⊕ &nbsp;${appLang==='jp'?'テキストからインポート':'Import from Text'}</button>

      ${appLang==='jp'
        ? 'グループごとに単語数を自由に設定できるオペレーターを作成します。上限なし・グループ名も自由に設定可能。作成後、貼り付けテキストでグループを追加します。'
        : 'Create an operator where each grub can hold any number of kotoba — no fixed limit — and every grub gets its own custom title. After creating, add grubs one at a time via paste text.'}
    </div>
    <input id="pnameFree" placeholder="${appLang==='jp'?'オペレーター名（フリーモード）':'Operator name (Free Mode)'}" type="text">
    <button id="btn-create-free" style="border-color:var(--purple);color:var(--purple);background:rgba(156,85,208,0.07);">⬡ &nbsp;${appLang==='jp'?'フリーモード・オペレーターを作成':'Create Free Mode Operator'}</button>
    <hr>
    <button id="btn-delete-profile" style="border-color:rgba(201,64,64,0.4);color:var(--text-dim);">✕ &nbsp;${appLang==='jp'?'オペレーターを削除':'Remove Operator'}</button>
  </div>`;

  // Wire up events after render (avoids all quoting issues & PWA restrictions)
  document.getElementById("btn-back-profile").addEventListener("click", function(){ if(typeof window._kotobaGoBack==="function") window._kotobaGoBack(); else renderMenu(); });
  document.getElementById("btn-import-csv").addEventListener("click", createProfileCSV);
  document.getElementById("btn-import-text").addEventListener("click", createProfileText);
  document.getElementById("btn-create-free").addEventListener("click", createFreeModeProfile);
  document.getElementById("btn-delete-profile").addEventListener("click", deleteProfileMenu);

  // File input — direct user-gesture click forwarding (works in PWA)
  let csvInput=document.getElementById("csvfile");
  csvInput.addEventListener("change", handleCsvFileSelected);
  document.getElementById("btn-choose-csv").addEventListener("click", function(){
    csvInput.value="";

  profileNames.forEach((name,i)=>{

  });

function makeWordObj(kanji,hira,arti){return{kanji:kanji.trim(),hira:hira.trim(),arti:arti.trim(),correct:0,wrong:0,mastered:false,interval:1,nextReview:Date.now(),coreScore:20,totalResponseMs:0,responseCount:0,fastestResponseMs:0,slowestResponseMs:0,lastSeenAt:0,leechCount:0,isLeech:false,studyDates:[],note:''};}

/* ── LEECH / PROBLEM WORD SYSTEM ──
   A word becomes a Leech when wrong >= LEECH_THRESHOLD and accuracy < 40%.
   leechCount tracks consecutive wrong streaks. */
const LEECH_THRESHOLD=8;
function updateLeechStatus(word){
  if((word.wrong||0)>=LEECH_THRESHOLD){
    let total=(word.correct||0)+(word.wrong||0);
    let acc=total>0?(word.correct||0)/total:0;
    if(acc<0.4){ word.isLeech=true; }
  }
  if((word.correct||0)>=(word.wrong||0)*2&&(word.correct||0)>=5){ word.isLeech=false; }
}
function getLeechWords(words){ return words.filter(w=>w.isLeech); }
function getLeechSeverity(word){
  let w=word.wrong||0;
  if(w>=20) return {label:'SEVERE',color:'#ff2040',icon:'☠'};
  if(w>=14) return {label:'HIGH',color:'#c94040',icon:'⚠'};
  return {label:'LEECH',color:'#e87040',icon:'⛓'};
}

/* ── INTELLIGENCE ANALYTICS HELPERS ── */
function recordResponseTime(word, ms){
  if(ms<=0||ms>120000)return; // ignore <0 or >2min (skip/auto-advance)
  word.totalResponseMs=(word.totalResponseMs||0)+ms;
  word.responseCount=(word.responseCount||0)+1;
  if(!word.fastestResponseMs||ms<word.fastestResponseMs) word.fastestResponseMs=ms;
  if(!word.slowestResponseMs||ms>word.slowestResponseMs) word.slowestResponseMs=ms;
  word.lastSeenAt=Date.now();
}
function getWordAvgResponseMs(word){
  if(!word||!(word.responseCount||0)) return null;
  return Math.round((word.totalResponseMs||0)/(word.responseCount||1));
}
/* Ebbinghaus-style forgetting curve.
   Returns 0–100 probability of forgetting (higher = more likely forgotten).
   P_forget = 1 - e^(-t / S) where:
     t = hours since last seen
     S = stability (hours) estimated from coreScore + SRS interval */
function computeForgetProbability(word){
  if(!word||(word.lastSeenAt||0)===0) return null;
  let hoursElapsed=(Date.now()-(word.lastSeenAt||0))/(1000*3600);
  if(hoursElapsed<0) return 0;
  let cs=getCoreScore(word)||20;
  // Stability: coreScore range 0-50, interval adds more stability
  // coreScore=20 (baseline) → ~24h stable; coreScore=50 → ~168h (7d); interval multiplies
  let sBase=Math.max(2, (cs/50)*168); // 2h to 168h
  let interval=Math.max(1,(word.interval||1));
  let stability=sBase*Math.sqrt(interval);
  let retainProb=Math.exp(-hoursElapsed/stability);
  return Math.round((1-retainProb)*100);
}
function computeMemoryStrength(word){
  // 0-100 score: combines coreScore, recency, and response speed
  let cs=getCoreScore(word)||0;
  let csPct=(cs/50)*60; // up to 60 pts from mastery
  let recencyPts=0;
  if((word.lastSeenAt||0)>0){
    let hoursAgo=(Date.now()-(word.lastSeenAt||0))/(1000*3600);
    recencyPts=Math.max(0,20*(1-hoursAgo/168)); // up to 20 pts, decays over 7d
  }
  let speedPts=0;
  let avgMs=getWordAvgResponseMs(word);
  if(avgMs!==null){
    // Fast (<2s) = 20 pts; 10s+ = 0 pts
    speedPts=Math.max(0,20*(1-Math.max(0,avgMs-500)/9500));
  }
  return Math.round(Math.min(100,csPct+recencyPts+speedPts));
}

/* ── ADAPTIVE DIFFICULTY SCORE ──
   Returns 0–100. Higher = harder for this user.
   Formula: wrongRate(40%) + slowResponseRate(30%) + forgetRate(30%) */
function computeAdaptiveDifficulty(word){
  let total=(word.correct||0)+(word.wrong||0);
  // Wrong rate component (0-40)
  let wrongRate=total>0?((word.wrong||0)/total):0.5; // default 50% if unseen
  let wrongPts=wrongRate*40;
  // Slow response component (0-30)
  let speedPts=0;
  let avgMs=getWordAvgResponseMs(word);
  if(avgMs!==null){
    // <1s=0, 5s=15, 10s+=30
    speedPts=Math.min(30,(avgMs/10000)*30);
  } else {
    speedPts=15; // unknown = medium difficulty
  }
  // Forget probability component (0-30)
  let fp=computeForgetProbability(word);
  let forgetPts=fp!==null?(fp/100)*30:10; // unknown = mild risk
  return Math.round(Math.min(100,wrongPts+speedPts+forgetPts));
}

/* ── PER-MODE ANALYTICS ──
   Track correct/wrong per gameMode per word.
   word.modeStats = { choice:{c:0,w:0}, typing:{c:0,w:0}, sort:{c:0,w:0} } */
function recordModeResult(word, mode, isCorrect){
  if(!word.modeStats) word.modeStats={};
  if(!word.modeStats[mode]) word.modeStats[mode]={c:0,w:0};
  if(isCorrect) word.modeStats[mode].c++;
  else word.modeStats[mode].w++;
}
function getModeAccuracy(words, mode){
  let correct=0,total=0;
  words.forEach(w=>{
    let ms=w.modeStats&&w.modeStats[mode];
    if(ms){correct+=(ms.c||0);total+=(ms.c||0)+(ms.w||0);}
  });
  return total>0?{acc:Math.round((correct/total)*100),correct,total}:null;
}
function getWeakestMode(words){
  let modes=['choice','typing','sort'];
  let results=modes.map(m=>({mode:m,...(getModeAccuracy(words,m)||{acc:null,correct:0,total:0})}));
  let tested=results.filter(r=>r.total>=3);
  if(!tested.length)return null;
  return tested.reduce((min,r)=>r.acc<min.acc?r:min, tested[0]);
}

/* ── WEAKNESS CATEGORY ANALYTICS ──
   Auto-detect word categories from kanji/hira/arti patterns.
   word.catStats = {verb:{c,w}, adj:{c,w}, noun:{c,w}, short:{c,w}, long:{c,w}, kanji:{c,w}, kana:{c,w}} */

// Detect grammatical / structural category of a word
function detectWordCategory(word){
  let cats=[];
  let k=word.kanji||'', h=word.hira||'', a=(word.arti||'').toLowerCase();
  // ── Grammar category from hira ending ──
  let verbEndings=['る','う','く','ぐ','す','つ','ぬ','ぶ','む','くる','する'];
  let isVerb=verbEndings.some(e=>h.endsWith(e))||a.includes('to ')||a.match(/\b(do|go|come|eat|drink|see|hear|say|speak|write|read|run|walk|make|take|give|get|put|know|think|feel|want)\b/);
  let isIAdj=h.endsWith('い')&&!h.endsWith('きい')&&k.length>0;
  let isNaAdj=a.includes('na-adj')||a.includes('な adj')||a.endsWith('な');
  if(isVerb) cats.push('verb');
  else if(isIAdj) cats.push('i-adj');
  else if(isNaAdj) cats.push('na-adj');
  else cats.push('noun');
  // ── Length category ──
  let len=k.length||h.length;
  if(len<=2) cats.push('short');
  else if(len>=5) cats.push('long');
  // ── Script category ──
  let hasKanji=/[\u4e00-\u9faf\u3400-\u4dbf]/.test(k);
  if(hasKanji) cats.push('kanji');
  else cats.push('kana-only');
  return cats;
}

function recordCategoryResult(word, isCorrect){
  if(!word.catStats) word.catStats={};
  let cats=detectWordCategory(word);
  cats.forEach(cat=>{
    if(!word.catStats[cat]) word.catStats[cat]={c:0,w:0};
    if(isCorrect) word.catStats[cat].c++; else word.catStats[cat].w++;
  });
}

function getCategoryStats(words){
  // Aggregate catStats across all words
  let agg={};
  words.forEach(w=>{
    if(!w.catStats)return;
    Object.entries(w.catStats).forEach(([cat,stat])=>{
      if(!agg[cat])agg[cat]={c:0,w:0};
      agg[cat].c+=(stat.c||0);
      agg[cat].w+=(stat.w||0);
    });
  });
  return agg;
}

/* ── CONFIDENCE SCORE ──
   Measures HOW SURE the user actually is — detects "setengah hafal".
   Range 0–100. Low confidence = hesitant or inconsistent despite being "correct".
   Formula:
     - Speed score (40pts): fast = confident
     - Consistency score (40pts): low variance in response times = consistent
     - Accuracy score (20pts): recent correct rate
   "Half-memorized" = high accuracy but low speed/consistency */
function computeConfidenceScore(word){
  let correct=word.correct||0, wrong=word.wrong||0;
  let total=correct+wrong;
  if(total===0) return null;
  // Accuracy component (0-20)
  let accPts=(correct/total)*20;
  // Speed component (0-40): avg response time
  let avgMs=getWordAvgResponseMs(word);
  let speedPts=0;
  if(avgMs!==null){
    // <800ms=40, 2s=20, 5s=5, 8s+=0
    speedPts=Math.max(0, 40-Math.max(0,(avgMs-800)/180));
  } else {
    speedPts=20; // no data = neutral
  }
  // Consistency component (0-40): based on fastest vs slowest spread
  let consistencyPts=20; // default neutral
  if((word.responseCount||0)>=3&&word.fastestResponseMs&&word.slowestResponseMs){
    let spread=word.slowestResponseMs-word.fastestResponseMs;
    let avgSpread=avgMs||1000;
    let varianceRatio=spread/Math.max(avgSpread,1);
    // Low variance (ratio<1) = consistent = more pts; high variance = erratic
    consistencyPts=Math.max(0, 40*(1-Math.min(1,varianceRatio/4)));
  }
  return Math.round(Math.min(100,accPts+speedPts+consistencyPts));
}

function getConfidenceLabel(score){
  if(score===null) return {label:'NO DATA',color:'var(--text-dim)',icon:'—'};
  if(score>=80) return {label:'CONFIDENT',color:'var(--green)',icon:'✦'};
  if(score>=60) return {label:'SOLID',color:'var(--blue)',icon:'◈'};
  if(score>=40) return {label:'UNSURE',color:'var(--accent)',icon:'◇'};
  return {label:'HESITANT',color:'var(--red)',icon:'⚠'};
}

// Detect "setengah hafal": correct rate OK (>50%) but confidence low (<40)
function isHalfMemorized(word){
  let total=(word.correct||0)+(word.wrong||0);
  if(total<3) return false;
  let accRate=(word.correct||0)/total;
  let conf=computeConfidenceScore(word);
  return accRate>=0.5&&conf!==null&&conf<45;
}

/* ── CORE SCORE SYSTEM ──
   Range 0–50, starts at 20 (neutral).
   Correct answer → +1, Wrong answer → -2 (min 0, max 50).
   Score ≥ 37 = "Core Mastered" (kotoba mastered via Core Data), ≤ 10 = "Critical Weakness".
   A word is called "Core Data Kotoba" once it has been seen (coreScore !== 20 initial or has correct/wrong).
   Point multiplier: streak of 3+ correct = ×2; streak of 6+ = ×3. Resets on wrong.
*/
function getCoreScore(w){ return typeof w.coreScore==='number'?w.coreScore:20; }
function isCoreDataKotoba(w){ return (w.correct||0)+(w.wrong||0)>0; }
/* A word is "Mastered" when coreScore reaches 37–50 (Core Data Mastery threshold) */
function isMasteredKotoba(w){ return getCoreScore(w)>=37; }
function getCoreLabel(score){
  if(score>=37) return {label:'MASTERED', color:'#3a9a5c',  icon:'◆'}; // green
  if(score>=25) return {label:'SOLID',    color:'#3a72b0',  icon:'◈'}; // blue
  if(score>=15) return {label:'LEARNING', color:'var(--text)', icon:'◇'}; // default
  return              {label:'CRITICAL',  color:'#c94040',  icon:'▼'}; // red
}

  } else if(_missionSize===0){
    // ALL — no block needed, just a deploy button
    blockContent=`
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin:10px 0 8px;">⬛ ${isJP?`全 ${total} 単語をシャッフル`:`ALL ${total} WORDS — SHUFFLED`}</div>
      <button data-action="startAll" style="justify-content:center;font-size:15px;border-color:var(--green);color:var(--green);background:rgba(58,154,92,0.07);">⬛ &nbsp;${isJP?'フルデプロイ':'FULL DEPLOY'}</button>`;
  } else {
