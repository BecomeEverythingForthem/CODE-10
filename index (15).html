  roar.textContent="ROAR";
  document.body.appendChild(roar);
  setTimeout(()=>roar.remove(),750);
}

/* ── STYLISH RANK EFFECT (DMC / Picayune) ── */
let _stylishRankEl=null;
let _stylishRankTimeout=null;
let _stylishSwords=[]; // track sword decoration elements for cleanup
function showStylishRank(comboCount){
  if(uiMode==="simple")return;
  let themeId=shopData.activeUI||"arknight";
  let rebellionActive=hasWeapon("rebellion");
  if(themeId!=="dmc"&&!rebellionActive)return;

  // ── Rank table ──
  let ranks=[
    {min:0,  rank:"D",   color:"#888888", glow:"rgba(136,136,136,0.5)", size:64},
    {min:3,  rank:"C",   color:"#44aaff", glow:"rgba(68,170,255,0.6)",  size:68},
    {min:5,  rank:"B",   color:"#44ffaa", glow:"rgba(68,255,170,0.65)", size:72},
    {min:8,  rank:"A",   color:"#ffcc00", glow:"rgba(255,204,0,0.7)",   size:80},
    {min:12, rank:"S",   color:"#ff6600", glow:"rgba(255,102,0,0.8)",   size:90},
    {min:18, rank:"SS",  color:"#ff2200", glow:"rgba(255,34,0,0.9)",    size:100},
    {min:25, rank:"SSS", color:"#ff0044", glow:"rgba(255,0,68,1.0)",    size:112},
  ];
  let cfg=ranks[0];
  for(let r of ranks){if(comboCount>=r.min)cfg=r;}

  // Picayune: monochrome

  // Rebellion: pure DMC crimson — no gold, pure red escalation
  let isRebMode=rebellionActive;
  if(isRebMode){
    const rC={D:"#661010",C:"#991515",B:"#bb1a1a",A:"#cc1010",S:"#e30018",SS:"#ff0020",SSS:"#ff0030"};
    const rG={D:"rgba(102,16,16,0.6)",C:"rgba(153,21,21,0.7)",B:"rgba(187,26,26,0.75)",A:"rgba(204,16,16,0.82)",S:"rgba(227,0,24,0.9)",SS:"rgba(255,0,32,0.95)",SSS:"rgba(255,0,48,1)"};
    const rSz={D:72,C:78,B:84,A:92,S:104,SS:118,SSS:136};
    cfg={...cfg,color:rC[cfg.rank]||"#e30018",glow:rG[cfg.rank]||"rgba(227,0,24,0.9)",size:rSz[cfg.rank]||90};
  }

  let rankFont=isRebMode||themeId==="dmc"
    ?"'DMC5','Rajdhani',sans-serif"
    :"'Share Tech Mono',monospace";

  // ── Flash — Rebellion gets a deep crimson vignette, not a full-white flash ──
  let flash=document.createElement("div");
  if(isRebMode){
    flash.style.cssText=`position:fixed;inset:0;pointer-events:none;z-index:19998;
      background:radial-gradient(ellipse at center,transparent 25%,${cfg.color}44 60%,${cfg.color}99 100%);
      animation:stylishFlash 0.28s ease-out forwards;`;
  } else {
    flash.style.cssText=`position:fixed;inset:0;background:${cfg.color};pointer-events:none;z-index:19998;animation:stylishFlash 0.18s ease-out forwards;`;
  }
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),320);

  // ── Screen shake ──
  let shakeThreshold=isRebMode?5:12;
  if(comboCount>=shakeThreshold){
    let appEl=document.getElementById("app");
    if(appEl){appEl.style.animation="none";requestAnimationFrame(()=>{
      appEl.style.animation=`stylishShake ${comboCount>=18?'0.45':'0.32'}s ease`;
      setTimeout(()=>{appEl.style.animation="";},460);
    });}
  }

  // ── Kill old rank el + sword decorations ──
  if(_stylishRankEl){
    clearTimeout(_stylishRankTimeout);_stylishRankTimeout=null;
    try{if(_stylishRankEl.parentNode)_stylishRankEl.parentNode.removeChild(_stylishRankEl);}catch(e){}
    _stylishRankEl=null;
  }
  _stylishSwords.forEach(s=>{try{if(s.parentNode)s.parentNode.removeChild(s);}catch(e){}});_stylishSwords=[];

  // ── Main rank letter ──
  let el=document.createElement("div");
  let enterAnim=isRebMode?"rebRankSlam":"stylishRankChange";
  let enterDur=isRebMode?"0.32s":"0.28s";
  el.style.cssText=`
    position:fixed;left:50%;top:${isRebMode?'37':'38'}%;
    font-family:${rankFont};
    font-size:${cfg.size}px;
    font-weight:900;
    color:${cfg.color};
    text-shadow:0 0 24px ${cfg.glow},0 0 50px ${cfg.glow},0 0 90px ${cfg.glow}${isRebMode?`,0 0 140px ${cfg.color}55`:''};
    pointer-events:none;
    z-index:20000;
    letter-spacing:${cfg.rank.length>1?2:10}px;
    line-height:1;
    transform:translate(-50%,-50%);
    animation:${enterAnim} ${enterDur} cubic-bezier(0.18,1.25,0.35,1) forwards;
    -webkit-text-stroke:${comboCount>=8?(isRebMode?'3':'2')+'px '+cfg.color:'1px '+cfg.color};
  `;
  el.textContent=cfg.rank;
  // Note: _stylishRankEl is cleaned up explicitly in nextWord() — no dataset marker needed

  // ── Sub-label ──
  let label=document.createElement("div");
  if(isRebMode){
    // DMC-style STYLISH label with rank-appropriate text
    let labelText=cfg.rank==="SSS"?"✦  S T Y L I S H ! !  ✦"
      :cfg.rank==="SS"?"— SMOKIN' SEXY STYLE —"
      :cfg.rank==="S"?"— SUPER HOT —"
      :cfg.rank==="A"?"— AWESOME —"
      :cfg.rank==="B"?"— BINGO —"
      :cfg.rank==="C"?"— CRAZY —"
      :"— DEADLY —";
    label.style.cssText=`
      text-align:center;
      font-family:'DMC5','Rajdhani',sans-serif;
      font-size:${cfg.rank==="SSS"?14:cfg.rank==="SS"?11:10}px;
      color:${cfg.color};
      letter-spacing:${cfg.rank==="SSS"?5:3}px;
      margin-top:6px;
      opacity:0.9;
      text-shadow:0 0 10px ${cfg.glow};
      animation:rebStyleLabel 0.22s ease-out 0.1s both;
    `;
    label.textContent=labelText;
  } else {
    label.style.cssText=`
      text-align:center;
      font-family:'Share Tech Mono',monospace;
      font-size:11px;
      color:${cfg.color};letter-spacing:3px;margin-top:4px;opacity:0.85;
      text-shadow:0 0 8px ${cfg.glow};
    `;
    label.textContent=cfg.rank==="SSS"?"✦ STYLISH!! ✦":`×${comboCount} COMBO`;
  }
  el.appendChild(label);
  document.body.appendChild(el);
  _stylishRankEl=el;

  let holdMs=cfg.rank==="SSS"?1400:cfg.rank==="SS"?1100:cfg.rank==="S"?950:isRebMode?800:700;

  // ── Rebellion: decorative sword icon flanking rank ──
  if(isRebMode&&comboCount>=5){
    ["left","right"].forEach((side,si)=>{
      let sword=document.createElement("div");
      // sword tracked in _stylishSwords, cleaned by nextWord()
      sword.style.cssText=`position:fixed;
        ${side==="left"?"right":"left"}:calc(50% + ${cfg.size*0.55}px);
        top:37%;transform:translateY(-50%) ${side==="left"?"scaleX(-1)":""};
        font-size:${cfg.size*0.28}px;
        pointer-events:none;z-index:19999;
        filter:drop-shadow(0 0 12px ${cfg.color});
        animation:rebStyleLabel 0.2s ease-out ${0.05+si*0.04}s both;`;
      sword.textContent="🗡️";
      document.body.appendChild(sword);
      _stylishSwords.push(sword);
      setTimeout(()=>{try{sword.remove();}catch(e){}},holdMs+500);
    });
  }
  _stylishRankTimeout=setTimeout(()=>{
    _stylishRankTimeout=null;
    if(el.parentNode){
      el.style.animation=isRebMode?"rebRankOut 0.38s ease forwards":"stylishOut 0.4s ease forwards";
      setTimeout(()=>{
        try{if(el.parentNode)el.parentNode.removeChild(el);}catch(e){}
        if(_stylishRankEl===el)_stylishRankEl=null;
        _stylishSwords.forEach(s=>{try{if(s.parentNode)s.parentNode.removeChild(s);}catch(e){}});
        _stylishSwords=[];
      },420);
    } else {
      if(_stylishRankEl===el)_stylishRankEl=null;
      _stylishSwords.forEach(s=>{try{if(s.parentNode)s.parentNode.removeChild(s);}catch(e){}});
      _stylishSwords=[];
    }
  },holdMs);
}

function processAnswer(isCorrect){
  let _responseMs=(_wordShownAt>0)?(Date.now()-_wordShownAt):0;
  let prof=profiles[currentProfile];
  if(!prof){renderMenu();return;}
  let word=prof.words.find(w=>w.kanji===currentWord.kanji);
  if(!word){word={kanji:currentWord.kanji,hira:currentWord.hira||'',arti:currentWord.arti||'',correct:0,wrong:0,totalResponseMs:0,responseCount:0,fastestResponseMs:0,slowestResponseMs:0,lastSeenAt:0};prof.words.push(word);}
  recordResponseTime(word, _responseMs);
  if(hardcoreMode)clearTimeout(timerInterval);
  let isMastered=isMasteredKotoba(word);
  let xpBase=isMastered?6:10,flags={}; // mastered words give 60% base XP

  if(isCorrect){
    _SFX.correct(); // ── correct answer sound ──
    // Crystal weapon: skip normal slash effect (crystal starfall plays alone)
    let _crystalWpnOn=(shopData.equippedWeapon==="crystal"&&shopData.ownedWeapons.includes("crystal"));
    if(!_crystalWpnOn) showSlashEffect();
    showWeaponTouchAnim(_lastPX,_lastPY);
    combo++;if(combo>sessionComboMax)sessionComboMax=combo;
    showStylishRank(combo);
    // Combo Master: every 10 combo milestone → +25 XP +25 coins (advanced only)
    if(uiMode!=="simple"&&hasEmblem("combomaster")&&combo>0&&combo%10===0){
      let cmXp=25,cmCoins=25;
      prof.xp=(prof.xp||0)+cmXp;
      globalStats.xp+=cmXp;sessionXpGain+=cmXp;
      shopData.coins=(shopData.coins||0)+cmCoins;
      let badge=document.createElement("div");
      badge.style.cssText=`position:fixed;top:50px;left:50%;transform:translateX(-50%);
        background:rgba(10,16,0,0.95);border:1px solid #ff8c30;border-left:3px solid #ff8c30;
        padding:6px 16px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#ff8c30;
        letter-spacing:2px;z-index:20010;pointer-events:none;white-space:nowrap;
        box-shadow:0 0 12px rgba(255,140,48,0.4);`;
      badge.textContent=`🔥 ${combo} COMBO! +${cmXp} XP · +${cmCoins} 🪙`;
      document.body.appendChild(badge);
      setTimeout(()=>{badge.style.transition="opacity 0.4s";badge.style.opacity="0";setTimeout(()=>badge.remove(),400);},1600);
    }
    let mult=comboMultiplier(combo);
    let _adv=uiMode!=="simple"; // passives/buffs only in advanced mode

    // ── CORE DATA STREAK MULTIPLIER ──
    coreStreak++; // increment before calculating (starts at 1 for first correct)
    let coreStreakMult=getCoreStreakMult();

    // ── STEP 1: Gather ALL XP multipliers into one total ──
    let randomBonus=_adv&&bamboozleMode?1.2:_adv&&randomOptions?1.1:1.0;
    let intenseBenkyouBonus=_adv&&intenseBenkyouMode?1.3:1.0;
    let ascendBonus=_adv&&ascendActive&&isAscendMode()?1.3:1.0;
    let luckyBonus=_adv&&luckyWordActive?2.0:1.0;
    let veteranBonus=_adv&&hasEmblem("veteran")?1.3:1.0;
    let keyboardBonus=_adv&&hasWeapon("keyboard")?1.02:1.0;
    let cutterBonus=_adv&&hasWeapon("cutter")?1.01:1.0;
    let saberBonus=_adv&&_wpnSaberActive?2.0:1.0;
    let heartHcMult=(_adv&&hardcoreMode&&hasWeapon("heart"))?2.2:1.0;
    let upgradeXpMult=getXpUpgradeMult(); // +100% per XP upgrade level
    let rowModeBonus=gameMode==="row"?1.6:1.0; // Baris Kotoba: answering a whole row deserves a bigger point payout
    let xpGained=Math.round(xpBase*mult*coreStreakMult*(hardcoreMode?1.5:1)*randomBonus*intenseBenkyouBonus*ascendBonus*luckyBonus*veteranBonus*keyboardBonus*cutterBonus*saberBonus*heartHcMult*upgradeXpMult*rowModeBonus);

    // ── Show core streak badge when tier changes (at streak 3 and 6) ──
    if(coreStreak===3||coreStreak===6){
      let cLabel=getCoreStreakLabel();
      if(cLabel){
        let cBadge=document.createElement("div");
        cBadge.style.cssText=`position:fixed;top:50px;left:50%;transform:translateX(-50%);
          background:rgba(8,10,20,0.97);border:1px solid #e8a838;border-left:3px solid #e8a838;
          padding:5px 16px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#e8a838;
          letter-spacing:3px;z-index:20012;pointer-events:none;white-space:nowrap;
          box-shadow:0 0 12px rgba(232,168,56,0.5);`;
        cBadge.textContent=cLabel+' MULTIPLIER!';
        document.body.appendChild(cBadge);
        setTimeout(()=>{cBadge.style.transition="opacity 0.4s";cBadge.style.opacity="0";setTimeout(()=>cBadge.remove(),400);},1500);
      }
    }

    // ── STEP 2: Gather ALL coin multipliers — compute base coin grant with all % bonuses stacked ──
    let coinMultTotal=getCoinUpgradeMult(); // +100% per Coin upgrade level
    if(_adv&&hardcoreMode&&hasWeapon("heart")) coinMultTotal+=1.2; // +120%
    if(_adv&&hasEmblem("workaholic"))           coinMultTotal+=0.5; // +50%
    if(_adv&&hasWeapon("punch"))                coinMultTotal+=0.3; // +30%
    if(_adv&&_wpnSaberActive)                   coinMultTotal+=1.0; // +100%
    let baseCoinsGranted=Math.floor(xpGained/10*(1+(((globalStats.level||0)*0.02)+Math.floor((globalStats.level||0)/5)*0.05+Math.floor((globalStats.level||0)/10)*0.15)));
    let coinsGranted=Math.ceil(baseCoinsGranted*coinMultTotal);
    if(coinsGranted>0) shopData.coins=(shopData.coins||0)+coinsGranted;

    // ── Commit XP ──
    word.correct++;sessionCorrect++;
    if(gameMode==="row"&&rowIndex>=0&&rowIndex<rowStatuses.length) rowStatuses[rowIndex]='correct';
    recordModeResult(word, gameMode, true);
    recordCategoryResult(word, true);
    // Core Score: +3 per correct, cap 50 (raised so mastery isn't a slow grind)
    if(typeof word.coreScore!=='number') word.coreScore=20;
    word.coreScore=Math.min(50, word.coreScore+3);
    prof.xp=(prof.xp||0)+xpGained;
    globalStats.xp+=xpGained;sessionXpGain+=xpGained;

    // ── STEP 3: Weapon skill flat/bonus adds ON TOP of total ──
    if(_adv){
      let wpnResult=applyWeaponOnCorrect(xpBase,combo);
      if(wpnResult.extraCoins>0) shopData.coins=(shopData.coins||0)+wpnResult.extraCoins;
      if(wpnResult.xpAdd>0){prof.xp=(prof.xp||0)+wpnResult.xpAdd;globalStats.xp+=wpnResult.xpAdd;sessionXpGain+=wpnResult.xpAdd;}
    }
    // Laser super-question reward
    if(_adv&&_wpnLaserSuperActive&&gameMode==="choice"){
      shopData.coins=(shopData.coins||0)+100;
      _showWeaponBadge("🔆 SUPER Q! +100🪙","#c060ff",1600);
      _wpnLaserSuperActive=false;
    }
    // Rebellion: stylish rank XP+coin bonus (flat +5 coins removed)
    if(_adv&&hasWeapon("rebellion")){
      if(combo>=3){
        let rb=getStylishRankBonus(combo);
        if(rb.xpPct>0){
          let rbXp=Math.round(xpGained*rb.xpPct);
          let rbCoins=Math.round(xpGained*0.1*rb.coinPct+1);
          prof.xp=(prof.xp||0)+rbXp;
          globalStats.xp+=rbXp;sessionXpGain+=rbXp;
          shopData.coins=(shopData.coins||0)+rbCoins;
          let ascendChance=combo>=25?0.30:combo>=18?0.20:combo>=12?0.10:0;
          if(ascendChance>0&&Math.random()<ascendChance){
            _wpnChainsawCritBonus+=0.01;
            let ascendRankName=combo>=25?"SSS":combo>=18?"SS":"S";
            let ascPow=document.createElement("div");
            ascPow.style.cssText="position:fixed;bottom:90px;right:16px;background:rgba(6,0,0,0.97);border:1px solid #e30018;border-left:3px solid #ff0030;padding:4px 12px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:#ff0030;letter-spacing:2px;z-index:20015;pointer-events:none;white-space:nowrap;box-shadow:0 0 10px #ff003066;";
            ascPow.textContent="🗡️ "+ascendRankName+" ASCEND POWER ↑";
            document.body.appendChild(ascPow);
            setTimeout(()=>{ascPow.style.transition="opacity 0.4s";ascPow.style.opacity="0";setTimeout(()=>ascPow.remove(),400);},1200);
          }
          let rbRankName=combo>=25?"SSS":combo>=18?"SS":combo>=12?"S":combo>=8?"A":combo>=5?"B":"C";
          let rbColor=combo>=25?"#ff0066":combo>=18?"#ff2040":combo>=12?"#ff4422":combo>=8?"#ff8820":combo>=5?"#ddbb44":"#cc9944";
          let rb2=document.createElement("div");
          rb2.style.cssText="position:fixed;bottom:70px;right:16px;background:rgba(6,2,0,0.97);border:1px solid "+rbColor+";border-left:3px solid "+rbColor+";padding:4px 12px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:"+rbColor+";letter-spacing:2px;z-index:20015;pointer-events:none;white-space:nowrap;box-shadow:0 0 10px "+rbColor+"66;";
          rb2.textContent="🗡️ "+rbRankName+" +"+rbXp+"XP +"+rbCoins+"🪙";
          document.body.appendChild(rb2);
          setTimeout(()=>{rb2.style.transition="opacity 0.4s";rb2.style.opacity="0";setTimeout(()=>rb2.remove(),400);},1200);
        }
      }
    }
    // Lucky question bonus coins
    if(_adv&&luckyWordActive){
      shopData.coins=(shopData.coins||0)+10;
      _showLuckyXPToast(xpGained);
    }
    // ── CRIT CHECK ──
    // Flow: CRIT fires → CRIT DMG adds bonus on top → Super CRIT (chainsaw) adds (base+critDmg) again
    let _upgCritBonus=getCritUpgradeBonus(); // crit chance upgrade: level * 0.02
    let _critEligible=_adv&&(hasCritEffect()||_upgCritBonus>0);
    let _critChance=hasCritEffect()?getCritChance():_upgCritBonus;
    if(_critEligible&&Math.random()<_critChance){

      // ── Step 2: CRIT DMG buff adds on top of the base answer rewards ──
      let _critDmgMult=getCritDmgMult();   // lv0=×1, lv1=×2, lv2=×4 … lv10=×20
      let _critCoinMult=getCritCoinMult();
      // Glitch question: CRIT coins ×2 on top of everything
      let _glitchCritCoinBonus=glitchWordActive?2:1;
      let critDmgXp   =Math.round(xpGained*_critDmgMult);
      let critDmgCoins=Math.round(coinsGranted*_critCoinMult*_glitchCritCoinBonus);
      prof.xp=(prof.xp||0)+critDmgXp;
      globalStats.xp+=critDmgXp; sessionXpGain+=critDmgXp;
      shopData.coins=(shopData.coins||0)+critDmgCoins;

      // ── Step 3: Super CRIT (chainsaw, 50% chance) ──
      // Takes the TOTAL of base answer + CRIT DMG bonus and adds it all again
      let cwRes=applyWeaponCrit(xpGained+critDmgXp);
      if(cwRes.superCrit){
        // Super CRIT: only show super CRIT effect, skip normal CRIT effect
        _fx_superCrit();
        let superXp   =Math.round((xpGained+critDmgXp)*_critDmgMult);
        let superCoins=Math.round((coinsGranted+critDmgCoins)*_critCoinMult);
        prof.xp=(prof.xp||0)+superXp;
        globalStats.xp+=superXp; sessionXpGain+=superXp;
        shopData.coins=(shopData.coins||0)+superCoins+cwRes.coins;
        _showSuperCritDmgToast(superXp, superCoins+cwRes.coins, _critDmgMult);
      } else {
        // Normal CRIT only — show CRIT effect
        _fx_critHit();
      }

      _showCritToast(critDmgXp, critDmgCoins, _critDmgMult, cwRes.superCrit);
      saveAll();
    }
    globalStats.totalCorrect=(globalStats.totalCorrect||0)+1;
    flags._combo=sessionComboMax;
    if(sessionWrong===0&&sessionCorrect>=10)flags._perfect=true;
    updateDailyProgress("correct",1);
    if(combo>(dailyProgress.combo||0)){updateDailyProgress("combo",combo-(dailyProgress.combo||0));}
    if(sessionWrong===0)updateDailyProgress("noerror",1);
    // Ascend bar fill: base 8 per correct, combo gives more (advanced only)
    if(uiMode!=="simple"&&isAscendMode()&&!ascendActive){
      let barFill=8+(combo>=3?(combo>=6?10:5):0);
      fillAscendBar(barFill);
    }
    // Glitch mode chance build-up: moved to post-answer section below

  } else {
    _SFX.wrong(); // ── wrong answer sound ──
    combo=0;sessionWrong++;word.wrong++;
    if(gameMode==="row"&&rowIndex>=0&&rowIndex<rowStatuses.length) rowStatuses[rowIndex]='wrong';
    recordModeResult(word, gameMode, false);
    recordCategoryResult(word, false);
    coreStreak=0; // reset core data streak on wrong answer
    // Core Score: -1 per wrong, floor 0 (lighter penalty so one slip doesn't undo several correct answers)
    if(typeof word.coreScore!=='number') word.coreScore=20;
    word.coreScore=Math.max(0, word.coreScore-1);
    // Ascend bar does NOT reset on wrong, only loses a small amount
    if(isAscendMode()&&!ascendActive){ ascendBar=Math.max(0,ascendBar-5); updateAscendBarUI(); }
    // Second Chance: re-queue this word later in the session
    // (disabled in row mode — the tile row tracks a fixed 1:1 index into the session pool)
    if(gameMode!=="row" && secondChance>0 && Math.random()*100 < secondChance){
      // Insert a fresh copy of currentWord at a random position in remaining sessionWords (not at the very end to avoid immediate repeat)
      let insertPos=sessionWords.length>1?Math.floor(Math.random()*(sessionWords.length-1)+1):0;
      let requeueWord={...currentWord,_requeued:true};
      sessionWords.splice(insertPos,0,requeueWord);
      // Show a brief re-queue toast indicator
      let badge=document.createElement("div");
      badge.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(58,154,92,0.18);border:1px solid var(--green);padding:6px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green);letter-spacing:2px;z-index:10002;pointer-events:none;";
      badge.textContent="🔄 "+(appLang==='jp'?'再出題キュー':'RE-QUEUED');
      document.body.appendChild(badge);
      setTimeout(()=>{badge.style.transition="opacity 0.4s";badge.style.opacity="0";setTimeout(()=>badge.remove(),400);},1200);
    }
    if(hardcoreMode){
      lives--;
      globalStats.xp=Math.max(0,globalStats.xp-10);
      prof.xp=Math.max(0,(prof.xp||0)-10);
      if(lives<=0){updateSRS(word,false);globalStats.level=calcLevel(globalStats.xp);saveAllNow();showGameOver();return;}
    }
  }

  // ── LEECH SYSTEM: update after every answer ──
  updateLeechStatus(word);
  // ── STUDY DATE TRACKING (for heatmap): record today's study ──
  let _todayStr=new Date().toISOString().slice(0,10);
  if(!Array.isArray(word.studyDates)) word.studyDates=[];
  if(word.studyDates[word.studyDates.length-1]!==_todayStr) word.studyDates.push(_todayStr);
  if(word.studyDates.length>180) word.studyDates=word.studyDates.slice(-180);

  updateSRS(word,isCorrect);
  let oldLevel=globalStats.level;
  globalStats.level=calcLevel(globalStats.xp);
  saveAll();

  // ── GLITCH MODE: restore original mode after a glitch word, or maybe trigger new glitch ──
  if(glitchWordActive){
    // Just finished a glitch word — restore original mode
    gameMode=glitchOriginalMode;
    gameType=glitchOriginalType;
    glitchWordActive=false;
    glitchOriginalMode="";glitchOriginalType="";
  } else if(uiMode!=="simple"&&glitchModeActive&&gameMode!=="row"&&Math.random()<glitchBaseChance){
    // Trigger a glitch for the NEXT word (skipped in row mode, which keeps a fixed tile layout)
    glitchBaseChance=0.15;
    saveAll();
    glitchWordActive=true;
    glitchOriginalMode=gameMode;
    glitchOriginalType=gameType;
    const MODES=["choice","typing","sort"];
    const TYPES_NORMAL=["kanji-hira","kanji-arti","hira-kanji","arti-kanji"];
    const TYPES_GLOBAL=["kanji-arti","arti-kanji"];
    let newMode=MODES[Math.floor(Math.random()*MODES.length)];
    let typePool=globalMode?TYPES_GLOBAL:TYPES_NORMAL;
    let newType=typePool[Math.floor(Math.random()*typePool.length)];
    if(newMode===glitchOriginalMode&&newType===glitchOriginalType&&MODES.length>1){
      newMode=MODES[(MODES.indexOf(newMode)+1)%MODES.length];
    }
    gameMode=newMode;
    gameType=newType;
  }
  // Glitch chance build-up: 30% per answer to +1% base chance (max 95%)
  if(uiMode!=="simple"&&glitchModeActive&&!glitchWordActive&&Math.random()<0.30){
    glitchBaseChance=Math.min(0.95,glitchBaseChance+0.05);
    saveAll();
  }

  // ── LUCKY QUESTION SYSTEM ──
  // Check if lucky special is owned and on
  let _luckySpOn=shopData.specialEffectsOn||{};
  let _hasLucky=shopData.ownedSpecialEffects&&shopData.ownedSpecialEffects.includes("luckysession")&&!!_luckySpOn["luckysession"];

  if(luckyBonusWordActive){
    // Just finished bonus kotoba — clear flag, no further injection
    luckyBonusWordActive=false;
    luckyWordActive=false;
  } else if(luckyWordActive){
    // Just finished a lucky question — clear flag
    // 30% chance to inject a bonus kotoba word next
    luckyWordActive=false;
    if(_hasLucky&&isCorrect&&Math.random()<0.30){
      // Pick a random word from profile words not in current session
      let prof2=profiles[currentProfile];
      let allWords=(prof2&&prof2.words)||words||[];
      let pool=allWords.filter(w=>w&&w.kanji&&!sessionWords.find(sw=>sw.kanji===w.kanji)&&w.kanji!==currentWord.kanji);
      if(pool.length>0){
        let bonusWord={...pool[Math.floor(Math.random()*pool.length)],_luckyBonus:true};
        sessionWords.push(bonusWord); // push to end so it's next (pop from end)
        luckyBonusWordActive=true;
        luckyWordActive=true; // also mark as lucky so it gets bonuses
        _showLuckyBonusToast();
      }
    }
  } else if(_hasLucky&&Math.random()<0.20){
    // Roll for next question to be lucky
    luckyWordActive=true;
  }

  let newAchs=checkAchievements(flags);
  newAchs.forEach((a,i)=>setTimeout(()=>showAchievementToast(a),i*3300));

  if(globalStats.level>oldLevel){
    _delayTimer=setTimeout(()=>{
      _delayTimer=null; // clear so skip listeners don't race with the overlay
      showLevelUp(globalStats.level,()=>{
        _skipCooldown=true;
        setTimeout(()=>{ nextWord(); setTimeout(()=>{ _skipCooldown=false; },350); },200);
      });
    },answerDelay);
  } else {
    _delayTimer=setTimeout(()=>nextWord(),answerDelay);
  }
}

function exitGame(){
  // Guard: if the abandon-confirm overlay is already showing (e.g. hardware back
  // pressed more than once), don't stack a second one.
  if(document.getElementById('exit-warning-overlay')) return;
  // Pause hardcore timer while dialog is open, remembering remaining time
  let _pausedRemaining=null;
  if(hardcoreMode){
    clearTimeout(timerInterval);
    timerInterval=null;
    let tf=document.getElementById("timerFill");
    if(tf){
      // Compute remaining ms from the bar's current visual width fraction
      let computed=parseFloat(getComputedStyle(tf).width);
      let parent=tf.parentElement;
      let total=parent&&parent.offsetWidth?parent.offsetWidth:1;
      let frac=Math.max(0,Math.min(1,computed/total));
      _pausedRemaining=Math.round(frac*hardcoreTimer);
      // Freeze bar at current position
      tf.style.transition="none";
      tf.style.width=(frac*100)+"%";
    }
  }
  // Show abandon warning overlay before leaving
  let overlay=document.createElement('div');
  overlay.id='exit-warning-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;animation:screenIn 0.18s ease;';
  overlay.innerHTML=`
    <div style="background:var(--bg-card);border:1px solid var(--red);border-top:3px solid var(--red);max-width:340px;width:90%;padding:24px 20px;clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,0 100%);position:relative;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--red);margin-bottom:10px;">&#9888; MISSION ABORT</div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text-bright);letter-spacing:2px;margin-bottom:10px;">${appLang==='jp'?'ミッションを中断しますか？':'Abandon Mission?'}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#ff6060;line-height:1.8;margin-bottom:18px;background:rgba(201,64,64,0.08);border:1px solid rgba(201,64,64,0.25);padding:10px 12px;border-left:3px solid var(--red);">
        &#10007; &nbsp;${appLang==='jp'?'XPは獲得されません':'No XP will be earned'}<br>
        &#10007; &nbsp;${appLang==='jp'?'コインは獲得されません':'No coins will be earned'}<br>
        &#10007; &nbsp;${appLang==='jp'?'進捗はカウントされません':'Session progress won\'t count'}${hardcoreMode?`<br><span style="color:#ff4444;">&#9760; &nbsp;${appLang==='jp'?'ハードコアペナルティ: -30XP':'Hardcore penalty: -30 XP'}</span>`:''}
      </div>
      <div style="display:flex;gap:8px;">
        <button id="exit-confirm-btn" style="flex:1;background:rgba(201,64,64,0.12);border-color:var(--red);color:#ff6060;justify-content:center;letter-spacing:2px;">${appLang==='jp'?'中断する':'ABANDON'}</button>
        <button id="exit-cancel-btn" style="flex:1;background:rgba(58,154,92,0.1);border-color:var(--green);color:#5ecf8a;justify-content:center;letter-spacing:2px;">${appLang==='jp'?'続ける':'CONTINUE'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('exit-cancel-btn').addEventListener('click',()=>{
    overlay.remove();
    if(hardcoreMode){
      let resumeMs=(_pausedRemaining!=null&&_pausedRemaining>0)?_pausedRemaining:hardcoreTimer;
      let tf=document.getElementById("timerFill");
      if(tf){
        // Keep bar at frozen position, animate to 0 over remaining time
        tf.style.transition="none";
        tf.style.width=(resumeMs/hardcoreTimer*100)+"%";
        setTimeout(()=>{
          tf.style.transition="width linear "+resumeMs+"ms";
          tf.style.width="0%";
        },50);
      }
      timerInterval=setTimeout(handleHardcoreFail,resumeMs);
    }
  });
  document.getElementById('exit-confirm-btn').addEventListener('click',()=>{
    overlay.remove();
    ascendBar=0;ascendActive=false;if(ascendTimer)clearTimeout(ascendTimer);removeAscendOverlay();
    critAscendBonus=0;
    glitchWordActive=false;glitchOriginalMode="";glitchOriginalType="";
    if(hardcoreMode){globalStats.xp=Math.max(0,globalStats.xp-30);saveAll();}
    window._gameActive=false;
    if(typeof window._kotobaGoBack==="function") window._kotobaGoBack(); else renderMode();
  });
}

    <!-- ══ CONFIDENCE SCORE ══ -->

// Helper: get current XP bar percentage for global stats
function renderXpPct(){
  let lv=globalStats.level||0;
  let xp=globalStats.xp||0;
  let cur=xpInCurrentLevel(xp);
  let need=xpForLevel(lv);
  return need>0?Math.min(100,Math.floor((cur/need)*100)):100;
}
function calcXpForLevel(lv){ return lv<=0?0:(_xpTable[Math.min(lv,500)]||0); }

    <div class="ark-stat-row" style="margin-bottom:10px;">
      <div class="ark-stat"><div class="ark-stat-label">${isJP?'総語数':'Total Words'}</div><div class="ark-stat-value">${totalAll}</div></div>
      <div class="ark-stat"><div class="ark-stat-label">${isJP?'習得済み':'Mastered'}</div><div class="ark-stat-value" style="color:var(--green);">${masteredAll}</div></div>
      <div class="ark-stat"><div class="ark-stat-label">${isJP?'プロフィール':'Profiles'}</div><div class="ark-stat-value">${profileNames.length}</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0 8px;font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;">
      <span>${isJP?'スコアバー:':'Score bar:'}</span>
      <span style="display:inline-flex;align-items:center;gap:3px;"><span style="display:inline-block;width:16px;height:3px;background:var(--red);border-radius:1px;"></span>0–15</span>
      <span style="display:inline-flex;align-items:center;gap:3px;"><span style="display:inline-block;width:16px;height:3px;background:var(--text);border-radius:1px;"></span>16–27</span>
      <span style="display:inline-flex;align-items:center;gap:3px;"><span style="display:inline-block;width:16px;height:3px;background:var(--blue);border-radius:1px;"></span>28–36</span>
      <span style="display:inline-flex;align-items:center;gap:3px;"><span style="display:inline-block;width:16px;height:3px;background:var(--green);border-radius:1px;"></span>37–50 ✓</span>
    </div>
    <div class="ark-section">${isJP?'プロフィール別データ':'PROFILE DATABASE'}</div>
    ${profilesHtml}
  </div>`;

  // ── Event delegation: edit + note buttons ──
  app.addEventListener('click', function _kotobaClickDelegation(e){
    // ── EDIT button ──
    let editBtn=e.target.closest('.kotoba-edit-open');
    if(editBtn){
      let kanjiEncoded=editBtn.getAttribute('data-kanji');
      let profEncoded=editBtn.getAttribute('data-prof');
      if(!kanjiEncoded||!profEncoded) return;
      let kanji=decodeURIComponent(kanjiEncoded);
      let profName=decodeURIComponent(profEncoded);
      let p=profiles[profName];
      if(!p) return;
      let word=(p.words||[]).find(x=>x.kanji===kanji);
      if(!word) return;
      openKotobaEditModal(word, profName, function(newKanji, newHira, newArti){
        // Update in-place: DOM labels
        let row=editBtn.closest('.kotoba-row');
        if(row){
          let kEl=row.querySelector('.kotoba-kanji-display');
          let hEl=row.querySelector('.kotoba-hira-display');
          let aEl=row.querySelector('.kotoba-arti-display');
          if(kEl) kEl.textContent=newKanji;
          if(hEl) hEl.textContent=newHira;
          if(aEl) aEl.textContent='— '+newArti;
          // Update data-kanji on both buttons in the row
          row.querySelectorAll('[data-kanji]').forEach(el=>el.setAttribute('data-kanji',encodeURIComponent(newKanji)));
        }
      });
      return;
    }

    // ── NOTE button ──
    let noteBtn=e.target.closest('.kotoba-note-open');
    if(!noteBtn) return;
    let kanjiEncoded=noteBtn.getAttribute('data-kanji');
    if(!kanjiEncoded) return;
    let kanji=decodeURIComponent(kanjiEncoded);
    let foundWord=null;
    for(let pn of Object.keys(profiles)){
      let w=(profiles[pn].words||[]).find(x=>x.kanji===kanji);
      if(w){ foundWord=w; break; }
    }
    if(!foundWord) return;
    openNoteModal(foundWord.kanji, foundWord.hira||'', foundWord.arti||'', function(newNote){
      let has=!!(newNote&&newNote.trim());
      noteBtn.className='note-btn kotoba-note-open '+(has?'has-note':'no-note');
      noteBtn.textContent=has?'📝':'📋';
      let row=noteBtn.closest('.kotoba-row');
      if(row){
        let existing=row.querySelector('.kotoba-note-display');
        if(has){
          let safeNote=newNote.replace(/</g,'&lt;').replace(/>/g,'&gt;');
          if(existing){ existing.innerHTML=safeNote; }
          else {
            let nd=document.createElement('div');
            nd.className='kotoba-note-display';
            nd.style.cssText='margin-top:4px;margin-left:30px;padding:5px 8px;background:rgba(240,192,96,0.07);border-left:2px solid rgba(240,192,96,0.5);font-family:\'Share Tech Mono\',monospace;font-size:10px;color:#f0c060;line-height:1.6;white-space:pre-wrap;word-break:break-word;';
            nd.innerHTML=safeNote;
            row.appendChild(nd);
          }
        } else { if(existing) existing.remove(); }
      }
    });
  });
}

/* ── KOTOBA EDIT MODAL (kanji / hira / arti) ── */
function openKotobaEditModal(word, profName, onSave){
  let existing=document.getElementById('kotoba-edit-overlay');
  if(existing) existing.remove();
  let isJP=appLang==='jp';

  let overlay=document.createElement('div');
  overlay.id='kotoba-edit-overlay';
  overlay.className='note-modal-overlay';
  overlay.innerHTML=`
    <div class="note-modal-box" style="max-width:360px;">
      <div class="note-modal-label">✏ ${isJP?'単語を編集':'EDIT KOTOBA'}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:2px;margin-bottom:12px;">👤 ${profName}</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--accent);letter-spacing:2px;margin-bottom:4px;">${isJP?'漢字 / 語':'KANJI / WORD'}</div>
          <input id="kedit-kanji" type="text" value="${(word.kanji||'').replace(/"/g,'&quot;')}" style="margin:0;" placeholder="${isJP?'漢字・単語':'Kanji / Word'}">
        </div>
        <div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--accent);letter-spacing:2px;margin-bottom:4px;">${isJP?'ひらがな':'HIRAGANA / FURIGANA'}</div>
          <input id="kedit-hira" type="text" value="${(word.hira||'').replace(/"/g,'&quot;')}" style="margin:0;" placeholder="${isJP?'ひらがな':'Hiragana'}">
        </div>
        <div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--accent);letter-spacing:2px;margin-bottom:4px;">${isJP?'意味':'MEANING / ARTI'}</div>
          <input id="kedit-arti" type="text" value="${(word.arti||'').replace(/"/g,'&quot;')}" style="margin:0;" placeholder="${isJP?'意味':'Meaning / Arti'}">
        </div>
      </div>
      <div class="note-modal-actions" style="margin-top:14px;">
        <button class="note-modal-save" id="kedit-save-btn">💾 ${isJP?'保存':'SAVE'}</button>
        <button class="note-modal-cancel" id="kedit-cancel-btn">${isJP?'閉じる':'CLOSE'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('kedit-kanji')?.focus(),60);

  // Push a history entry so hardware back closes modal, not navigates away
  history.pushState({_kotoba:"modal", _modal:"kedit"}, "");
  // Signal to nav system that a modal is open
  window._kotobaModalOpen = true;

  let _modalClosed = false;

  function _modalPopstate(){
    if(!document.getElementById('kotoba-edit-overlay')) return;
    window.removeEventListener("popstate", _modalPopstate);
    window._kotobaModalOpen = false;
    _modalClosed = true;
    overlay.remove();
    history.pushState({_kotoba:"guard"}, "");
  }
  window.addEventListener("popstate", _modalPopstate);

  function _closeAndClean(){
    if(_modalClosed) return;
    _modalClosed = true;
    window.removeEventListener("popstate", _modalPopstate);
    window._kotobaModalOpen = false;
    overlay.remove();
    // Replace modal history entry back to guard — no history.back(), no popstate fired
    history.replaceState({_kotoba:"guard"}, "");
  }

  document.getElementById('kedit-save-btn').addEventListener('click',()=>{
    let newKanji=(document.getElementById('kedit-kanji').value||'').trim();
    let newHira=(document.getElementById('kedit-hira').value||'').trim();
    let newArti=(document.getElementById('kedit-arti').value||'').trim();
    if(!newKanji){ alert(isJP?'語は空にできません。':'Word cannot be empty.'); return; }
    // Check duplicate kanji in same profile (unless unchanged)
    let p=profiles[profName];
    if(p && newKanji!==word.kanji){
      let dup=(p.words||[]).find(x=>x.kanji===newKanji);
      if(dup){ alert(isJP?'同じ語がすでに存在します。':'This word already exists in the profile.'); return; }
    }
    // Update word object
    word.kanji=newKanji;
    word.hira=newHira;
    word.arti=newArti;
    // Sync words array
    if(profName===currentProfile) words=[...(p.words||[])];
    saveAll();
    if(onSave) onSave(newKanji, newHira, newArti);
    _closeAndClean();
    _showNoteToast(isJP?'✏ 単語を更新しました':'✏ Word updated','#6aa0e8');
  });
  document.getElementById('kedit-cancel-btn').addEventListener('click', _closeAndClean);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) _closeAndClean(); });
  overlay.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Escape') _closeAndClean();
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter') document.getElementById('kedit-save-btn').click();
    });
  });
}

/* ── MANAGE GRUB & KOTOBA ── */

// Helper: ALWAYS store groups of 25 internally (atomic unit)
// stepSize=50 means "view two 25-groups together as one visual grub"
function getProfileGroups(profName){
  let p=profiles[profName||currentProfile];
  if(!p) return [];
  if(Array.isArray(p.groups)) return p.groups;
  // Migrate flat words into groups of 25 always
  let ws=p.words||[];
  let groups=[];
  for(let i=0;i<ws.length;i+=25) groups.push(ws.slice(i,i+25));
  p.groups=groups;
  return p.groups;
}

// Helper: sync profile.words (flat) from profile.groups so gameplay still works
function syncWordsFromGroups(profName){
  let p=profiles[profName||currentProfile];
  if(!p) return;
  let groups=p.groups||[];
  p.words=groups.reduce((acc,g)=>acc.concat(g),[]);
  if(profName===currentProfile||!profName) words=[...p.words];
}

function renderManageGrub(){
  let isJP=appLang==='jp';
  if(!currentProfile||!profiles[currentProfile]){renderGroup();return;}
  if(profiles[currentProfile].freeMode){ renderManageGrubFree(); return; }
  let groupSize=stepSize||25;  // display grouping: 25 or 50
  let groups=getProfileGroups(currentProfile); // always 25-unit groups internally
  let totalWords=groups.reduce((s,g)=>s+g.length,0);
  const SUB=25; // internal group size always 25
  // Number of internal groups per visual grub
  let subsPerGrub=Math.floor(groupSize/SUB); // 1 for size-25, 2 for size-50
  // Number of visual grubs to show
  let numGrubs=Math.ceil(groups.length/subsPerGrub);

  let groupsHtml='';
  if(!groups.length){
    groupsHtml='<div style="font-family:\'Share Tech Mono\',monospace;font-size:10px;color:var(--text-dim);padding:16px;text-align:center;">'+(isJP?'グループがありません。':'No groups yet.')+'</div>';
  } else {
    for(let vi=0;vi<numGrubs;vi++){
      // Which internal groups belong to this visual grub
      let subIdxStart=vi*subsPerGrub;
      let subIdxEnd=Math.min(subIdxStart+subsPerGrub, groups.length);
      let subGroups=groups.slice(subIdxStart, subIdxEnd);
      // Slot range for this visual grub
      let slotStart=vi*groupSize+1;
      let slotEnd=vi*groupSize+groupSize;
      let rangeLabel=slotStart+'\u2013'+slotEnd;
      // Count words & mastered across all sub-groups
      let count=subGroups.reduce((s,g)=>s+g.length,0);
      let mastered=subGroups.reduce((s,g)=>s+g.filter(w=>isMasteredKotoba(w)).length,0);
      let maxSlots=subsPerGrub*SUB;
      let atLimit=(count>=maxSlots);
      let gid='grub_v'+vi;

      // Inline expand: show sub-groups separately
      let inlineHtml='';
      if(subsPerGrub===1){
        // size-25: flat list with remove buttons
        let g=subGroups[0]||[];
        inlineHtml=g.length?g.map((w,idx)=>{
          let globalNum=vi*groupSize+idx+1;
          return '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-left:2px solid '+(isMasteredKotoba(w)?'var(--green)':'var(--border)')+';margin:2px 0;background:var(--bg-deep);">'
            +'<span style="font-family:\'Share Tech Mono\',monospace;font-size:8px;color:var(--text-dim);min-width:26px;">'+globalNum+'</span>'
            +'<span style="font-family:\'Rajdhani\',sans-serif;font-size:13px;font-weight:700;color:var(--text-bright);">'+w.kanji+'</span>'
            +(w.hira?'<span style="font-size:10px;color:var(--accent);">'+w.hira+'</span>':'')
            +'<span style="font-size:9px;color:var(--text-dim);flex:1;">\u2014 '+w.arti+'</span>'
            +'<button onclick="removeKotoba('+(subIdxStart)+','+idx+')" style="width:auto;padding:2px 8px;font-size:9px;border-color:rgba(201,64,64,0.4);color:var(--red);background:rgba(201,64,64,0.06);justify-content:center;min-width:0;">\u2715</button>'
            +'</div>';
        }).join(''):'<div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--text-dim);padding:8px;text-align:center;">'+(isJP?'空':'empty')+'</div>';
      } else {
        // size-50: show two sub-group edit buttons
        for(let s=0;s<subsPerGrub;s++){
          let realIdx=subIdxStart+s;
          let subG=groups[realIdx]||[];
          let subSlotStart=vi*groupSize+s*SUB+1;
          let subSlotEnd=vi*groupSize+s*SUB+SUB;
          let subLabel=subSlotStart+'\u2013'+subSlotEnd;
          let subFull=(subG.length>=SUB);
          inlineHtml+='<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-left:2px solid '+(subFull?'var(--accent)':'var(--border)')+';margin:3px 0;background:var(--bg-deep);">'
            +'<span style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--accent);letter-spacing:1px;">'+subLabel+'</span>'
            +'<span style="font-family:\'Share Tech Mono\',monospace;font-size:8px;color:var(--text-dim);">'+subG.length+'/'+SUB+(subFull?' \u25cf FULL':'')+'</span>'
            +'<div style="flex:1;height:3px;background:var(--border);overflow:hidden;margin:0 4px;"><div style="height:100%;width:'+Math.floor((subG.length/SUB)*100)+'%;background:'+(subFull?'var(--accent)':'var(--green)')+'"></div></div>'
            +'<button onclick="renderManageKotoba('+realIdx+')" style="width:auto;padding:3px 10px;font-size:9px;border-color:var(--accent-dim);color:var(--accent);background:rgba(232,168,56,0.07);justify-content:center;">\u2699 '+subLabel+'</button>'
            +'</div>';
        }
      }

      groupsHtml+='<div style="background:var(--bg-card);border:1px solid var(--border);border-left:3px solid '+(atLimit?'var(--accent)':'var(--accent-dim)')+';margin-bottom:8px;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);">'
        +'<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;" onclick="document.getElementById(\''+gid+'\').style.display=document.getElementById(\''+gid+'\').style.display===\'none\'?\'block\':\'none\'">'
        +'<span style="font-family:\'Rajdhani\',sans-serif;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:1px;">'+rangeLabel+'</span>'
        +'<div style="flex:1;">'
        +'<div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--text-dim);">'+count+'/'+maxSlots+' '+(isJP?'\u5358\u8a9e':'units')+(atLimit?' <span style="color:var(--accent);font-size:8px;">\u25cf FULL</span>':'')+'</div>'
        +'<div style="width:100%;height:2px;background:var(--border);margin-top:4px;overflow:hidden;"><div style="height:100%;width:'+Math.floor((count/maxSlots)*100)+'%;background:var(--green);"></div></div>'
        +'</div>'
        +'<button onclick="event.stopPropagation();eraseGrub('+vi+','+subsPerGrub+')" style="width:auto;padding:4px 10px;font-size:9px;border-color:rgba(201,64,64,0.5);color:var(--red);background:rgba(201,64,64,0.07);justify-content:center;">\u2620 '+(isJP?'\u524a\u9664':'ERASE')+'</button>'
        +(subsPerGrub===1?'<button onclick="event.stopPropagation();renderManageKotoba('+subIdxStart+')" style="width:auto;padding:4px 10px;font-size:9px;border-color:var(--accent-dim);color:var(--accent);background:rgba(232,168,56,0.07);justify-content:center;">\u2699 '+(isJP?'\u7de8\u96c6':'EDIT')+'</button>':'')
        +'</div>'
        +'<div id="'+gid+'" style="display:none;padding:0 8px 8px;">'+inlineHtml+'</div>'
        +'</div>';
    }
  }

  app.innerHTML=`<div class="container">
    <div class="ark-header"><button class="back" data-action="goBack">${t('back')}</button><div class="ark-title">${isJP?'グループ <span>管理</span>':'Manage <span>Groups</span>'}</div></div>
    <div class="ark-stat-row" style="margin-bottom:10px;">
      <div class="ark-stat"><div class="ark-stat-label">${isJP?'グループ':'Grubs'}</div><div class="ark-stat-value" style="color:var(--accent);">${numGrubs}</div></div>
      <div class="ark-stat"><div class="ark-stat-label">${isJP?'総単語数':'Total'}</div><div class="ark-stat-value">${totalWords}</div></div>
      <div class="ark-stat"><div class="ark-stat-label">${isJP?'サイズ':'Size'}</div><div class="ark-stat-value" style="font-size:14px;">${groupSize}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">

function addGrub(){
  // Always add a new internal group of 25
  let groups=getProfileGroups(currentProfile);
  groups.push([]);
  syncWordsFromGroups(currentProfile);
  saveAll();
  renderManageKotoba(groups.length-1);
}

function eraseGrub(visualIdx, subsPerGrub){
  let isJP=appLang==='jp';
  let groups=getProfileGroups(currentProfile);
  let subIdxStart=visualIdx*subsPerGrub;
  let subIdxEnd=Math.min(subIdxStart+subsPerGrub, groups.length);
  let totalCount=groups.slice(subIdxStart,subIdxEnd).reduce((s,g)=>s+g.length,0);
  let slotStart=visualIdx*(subsPerGrub*25)+1;
  let slotEnd=visualIdx*(subsPerGrub*25)+(subsPerGrub*25);
  if(!confirm((isJP?'\u30b0\u30eb\u30fc\u30d7 ':'Group ')+slotStart+'\u2013'+slotEnd+(isJP?' \u306e\u5358\u8a9e '+totalCount+' \u4ef6\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f\n\u5143\u306b\u623b\u305b\u307e\u305b\u3093\u3002':' — remove '+totalCount+' kotoba?\nThis cannot be undone.')))return;
  groups.splice(subIdxStart, subIdxEnd-subIdxStart);
  syncWordsFromGroups(currentProfile);
  saveAll();
  renderManageGrub();
}

function removeKotoba(groupIdx,wordIdx){
  let isJP=appLang==='jp';
  let groups=getProfileGroups(currentProfile);
  let g=groups[groupIdx];
  if(!g||!g[wordIdx]) return;
  let w=g[wordIdx];
  if(!confirm(isJP?'\u300c'+w.kanji+'\u300d\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f':'Remove "'+w.kanji+'" ('+w.arti+')?'))return;
  g.splice(wordIdx,1);
  syncWordsFromGroups(currentProfile);
  saveAll();
  renderManageGrub();
}

function renderManageKotoba(groupIdx){
  let isJP=appLang==='jp';
  if(!currentProfile||!profiles[currentProfile]){renderGroup();return;}
  if(profiles[currentProfile].freeMode){ renderManageKotobaFree(groupIdx); return; }
  const SUB=25; // always 25 per internal group
  let groups=getProfileGroups(currentProfile);
  while(groups.length<=groupIdx) groups.push([]);
  let g=groups[groupIdx];
  let count=g.length;
  let atLimit=(count>=SUB);
  // Global slot range: each internal group is always 25 slots
  let slotStart=groupIdx*SUB+1;
  let slotEnd=groupIdx*SUB+SUB;
  let rangeLabel=slotStart+'\u2013'+slotEnd;

  let kotobalist='';
  if(count){
    kotobalist=g.map((w,idx)=>_kotobaRow(w,groupIdx*SUB+idx,groupIdx,idx)).join('');
  }

  let capacityBar='<div style="height:4px;background:var(--border);overflow:hidden;margin-top:6px;"><div style="height:100%;width:'+Math.floor((count/SUB)*100)+'%;background:'+(atLimit?'var(--red)':'var(--green)')+';transition:width 0.3s;"></div></div>';

  let limitBar='<div style="margin-bottom:12px;padding:8px 12px;background:var(--bg-card);border:1px solid '+(atLimit?'var(--red)':'var(--border)')+';border-left:3px solid '+(atLimit?'var(--red)':'var(--green)')+';">'
    +'<div style="display:flex;align-items:center;gap:8px;">'
    +'<span style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:'+(atLimit?'var(--red)':'var(--text-dim)')+';">'+(atLimit?'\u26d4 FULL':count+'/'+SUB)+'</span>'
    +'<span style="font-family:\'Share Tech Mono\',monospace;font-size:8px;color:var(--text-dim);margin-left:auto;">'+(atLimit?'':(SUB-count)+' slots left')+'</span>'
    +'</div>'
    +capacityBar
    +'</div>';

  let addForm=atLimit?'':'<div class="ark-section">\u2295 '+(isJP?'\u5358\u8a9e\u3092\u8ffd\u52a0':'ADD KOTOBA')+'</div>'
    +'<div style="background:var(--bg-card);border:1px solid var(--border);border-top:2px solid var(--green);padding:12px 14px;margin-bottom:10px;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);">'
    +'<div style="display:grid;gap:6px;">'
    +'<input id="inp-kanji" type="text" placeholder="'+(isJP?'\u6f22\u5b57 / \u8a9e':'Kanji / Word')+'" style="margin:0;">'
    +'<input id="inp-hira" type="text" placeholder="'+(isJP?'\u3072\u3089\u304c\u306a':'Hiragana')+'" style="margin:0;">'
    +'<input id="inp-arti" type="text" placeholder="'+(isJP?'\u610f\u5473':'Meaning')+'" style="margin:0;">'
    +'</div>'
    +'<button id="btn-save-kotoba" style="margin-top:8px;justify-content:center;border-color:var(--green);color:var(--green);background:rgba(58,154,92,0.1);">\u2295 &nbsp;'+(isJP?'\u8ffd\u52a0':'ADD KOTOBA')+'</button>'
    +'</div>';

  app.innerHTML=`<div class="container">
    <div class="ark-header"><button id="btn-back-mkotoba" class="back">${t('back')}</button>
    <div class="ark-title">Kotoba <span>${rangeLabel}</span></div>
    <div class="ark-badge">${SUB} units</div></div>
    ${limitBar}
    ${addForm}
    <div class="ark-section">📋 ${isJP?'単語一覧':'KOTOBA LIST'} (${count}/${SUB})</div>
    ${count?kotobalist:`<div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);padding:12px;text-align:center;">${isJP?'まだ単語がありません。':'No kotoba yet. Add some above.'}</div>`}
  </div>`;

  document.getElementById("btn-back-mkotoba").addEventListener("click", function(){ if(typeof window._kotobaGoBack==="function") window._kotobaGoBack(); else renderManageGrub(); });
  if(!atLimit){
    document.getElementById("btn-save-kotoba").addEventListener("click",()=>addKotobaToGroup(groupIdx));
    document.getElementById("inp-arti").addEventListener("keydown",e=>{if(e.key==="Enter")addKotobaToGroup(groupIdx);});
  }
}

function _kotobaRow(w,globalIdx,groupIdx,localIdx){
  const mastered=isMasteredKotoba(w);
  return `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-left:2px solid ${mastered?'var(--green)':'var(--accent-dim)'};margin:2px 0;background:var(--bg-card);">
    <span style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);min-width:28px;">${globalIdx+1}</span>
    <div style="flex:1;">
      <span style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text-bright);">${w.kanji}</span>
      ${w.hira?`<span style="font-size:10px;color:var(--accent);margin-left:6px;">${w.hira}</span>`:''}
      ${w.arti?`<span style="font-size:9px;color:var(--text-dim);margin-left:6px;">— ${w.arti}</span>`:''}
    </div>
    <span style="font-size:8px;color:${mastered?'var(--green)':'var(--text-dim)'};">${mastered?'✓':'×'+(w.correct||0)}</span>
    <button onclick="removeKotobaFromEdit(${groupIdx},${localIdx})" style="width:auto;padding:3px 9px;font-size:9px;border-color:rgba(201,64,64,0.4);color:var(--red);background:rgba(201,64,64,0.06);justify-content:center;min-width:0;">✕</button>
  </div>`;
}

function addKotobaToGroup(groupIdx){
  let isJP=appLang==='jp';
  let groupSize=stepSize||25;
  let kanji=(document.getElementById("inp-kanji").value||"").trim();
  let hira=(document.getElementById("inp-hira").value||"").trim();
  let arti=(document.getElementById("inp-arti").value||"").trim();
  if(!kanji||!arti){alert(isJP?'漢字と意味は必須です。':'Kanji and meaning are required.');return;}
  let groups=getProfileGroups(currentProfile);
  while(groups.length<=groupIdx) groups.push([]);
  let g=groups[groupIdx];
  if(g.length>=groupSize){alert(isJP?'このグループは満杯です！':'This group is full!');return;}
  g.push(makeWordObj(kanji,hira,arti));
  syncWordsFromGroups(currentProfile);
  saveAll();
  renderManageKotoba(groupIdx);
}

function removeKotobaFromEdit(groupIdx,wordIdx){
  let isJP=appLang==='jp';
  let groups=getProfileGroups(currentProfile);
  let g=groups[groupIdx];
  if(!g||!g[wordIdx]) return;
  let w=g[wordIdx];
  if(!confirm(isJP?`「${w.kanji}」を削除しますか？`:`Remove "${w.kanji}" (${w.arti})?`))return;
  g.splice(wordIdx,1);
  syncWordsFromGroups(currentProfile);
  saveAll();
  renderManageKotoba(groupIdx);
}

/* ══════════════════════════════════════════════════════════════
   FREE MODE — grubs with no per-group size limit + custom titles
   Each grub holds however many kotoba were pasted in. Uses the
   same profiles[name].groups array as classic mode (via
   getProfileGroups/syncWordsFromGroups) so gameplay is unaffected;
   profiles[name].groupTitles[idx] stores each grub's custom title.
   ══════════════════════════════════════════════════════════════ */

// Parse "Kanji,Hiragana,Arti" paste-text into word objects (same rules as createProfileText)
function parseKotobaText(text){
  let data=[];
  (text||"").split("\n").forEach(l=>{
    let line=l.trim();
    if(!line) return;
    let parts=line.split(",");
    let k=(parts[0]||"").trim();
    let h=(parts[1]||"").trim();
    let a=(parts[2]||"").trim();
    if(!k) return;
    if(a){ data.push(makeWordObj(k,h,a)); }
    else if(h){ data.push(makeWordObj(k,'',h)); }
  });
  return data;
}

// Scan every profile/grub for a matching kanji. Returns [{profile, groupIdx, label}]
function findKanjiLocations(kanji){
  let matches=[];
  Object.keys(profiles).forEach(pn=>{
    let p=profiles[pn];
    if(!p||typeof p!=='object') return;
    let groups=getProfileGroups(pn);
    groups.forEach((g,gi)=>{
      (g||[]).forEach(w=>{
        if(w&&w.kanji===kanji){
          let label;
          if(p.freeMode){
            label=(p.groupTitles&&p.groupTitles[gi])?p.groupTitles[gi]:('Grub '+(gi+1));
          } else {
            label=(gi*25+1)+'\u2013'+(gi*25+25);
          }
          matches.push({profile:pn, groupIdx:gi, label:label});
        }
      });
    });
  });
  return matches;
}

      <div class="ark-stat"><div class="ark-stat-label">${isJP?'総単語数':'Total'}</div><div class="ark-stat-value">${totalWords}</div></div>
    </div>
    <button onclick="renderAddFreeGrub()" style="justify-content:center;margin-bottom:12px;border-color:var(--green);color:var(--green);background:rgba(58,154,92,0.07);">⊕ &nbsp;${isJP?'新グループを追加':'Add New Grub'}</button>

function eraseFreeGrub(idx){
  let isJP=appLang==='jp';
  let p=profiles[currentProfile];
  if(!p)return;
  let groups=getProfileGroups(currentProfile);
  let g=groups[idx];
  if(!g)return;
  let title=(p.groupTitles&&p.groupTitles[idx])||((isJP?'グループ ':'Grub ')+(idx+1));
  if(!confirm(isJP?'「'+title+'」を削除しますか？ '+g.length+' 語が失われます。\n元に戻せません。':'Delete "'+title+'"? This removes '+g.length+' words.\nThis cannot be undone.'))return;
  groups.splice(idx,1);
  if(Array.isArray(p.groupTitles)) p.groupTitles.splice(idx,1);
  syncWordsFromGroups(currentProfile);
  saveAll();
  renderManageGrubFree();
}

function renameFreeGrubTitle(idx, stayOnKotoba){
  let isJP=appLang==='jp';
  let p=profiles[currentProfile];
  if(!p)return;
  if(!Array.isArray(p.groupTitles)) p.groupTitles=[];
  let current=p.groupTitles[idx]||'';
  let name=prompt(isJP?'新しいグループ名を入力してください:':'Enter a new grub title:', current);
  if(name===null)return;
  name=name.trim();
  if(!name)return;
  p.groupTitles[idx]=name;
  saveAll();
  if(stayOnKotoba) renderManageKotobaFree(idx);
  else renderManageGrubFree();
}

function submitFreeGrub(){
  let isJP=appLang==='jp';
  let title=(document.getElementById("inp-grub-title").value||"").trim();
  let text=(document.getElementById("inp-grub-text").value||"").trim();
  if(!text)return alert(isJP?'単語を貼り付けてください。':'Paste some kotoba text first.');
  let parsed=parseKotobaText(text);
  if(!parsed.length)return alert(isJP?'有効な単語が見つかりません。':'No valid kotoba found in that text.');
  if(!title) title=(isJP?'グループ ':'Grub ')+(getProfileGroups(currentProfile).length+1);

  let dupInfo=parsed.map(w=>({word:w, locations:findKanjiLocations(w.kanji)}));
  let hasDup=dupInfo.some(d=>d.locations.length>0);
  window._pendingFreeGrub={title:title, dupInfo:dupInfo};
  window._freeGrubRemoveSet=new Set();
  if(hasDup){ renderFreeGrubDupReview(); }
  else { saveFreeGrub(title, parsed); }
}

function renderFreeGrubDupReview(){
  let isJP=appLang==='jp';
  let pending=window._pendingFreeGrub;
  if(!pending){ renderAddFreeGrub(); return; }
  if(!window._freeGrubRemoveSet) window._freeGrubRemoveSet=new Set();
  let removeSet=window._freeGrubRemoveSet;
  let dupInfo=pending.dupInfo;
  let dupCount=dupInfo.filter(d=>d.locations.length>0).length;
  let cleanCount=dupInfo.length-dupCount;

  let rowsHtml=dupInfo.map((d,idx)=>{
    if(!d.locations.length) return '';
    let removed=removeSet.has(idx);
    let locText=d.locations.map(function(loc){
      return (loc.profile===currentProfile?(isJP?'このオペレーター':'This operator'):loc.profile)+' \u203a '+loc.label;
    }).join('<br>');
    return '<div style="background:var(--bg-card);border:1px solid var(--border);border-left:3px solid '+(removed?'var(--red)':'var(--accent)')+';padding:10px 12px;margin-bottom:6px;">'
      +'<div style="display:flex;align-items:center;gap:8px;">'
      +'<div style="flex:1;min-width:0;overflow-wrap:break-word;">'
      +'<span style="font-family:\'Rajdhani\',sans-serif;font-size:15px;font-weight:700;color:var(--text-bright);">'+d.word.kanji+'</span>'
      +(d.word.hira?'<span style="font-size:10px;color:var(--accent);margin-left:6px;">'+d.word.hira+'</span>':'')
      +'<span style="font-size:9px;color:var(--text-dim);margin-left:6px;">\u2014 '+d.word.arti+'</span>'
      +'</div>'
      +'<button onclick="toggleFreeGrubDupRemove('+idx+')" style="width:auto;padding:4px 10px;font-size:9px;justify-content:center;'+(removed?'border-color:rgba(201,64,64,0.5);color:var(--red);background:rgba(201,64,64,0.08);':'border-color:var(--accent-dim);color:var(--accent);background:rgba(232,168,56,0.07);')+'">'+(removed?(isJP?'\u2715 削除される':'\u2715 WILL REMOVE'):(isJP?'\u2713 このまま保存':'\u2713 KEEP'))+'</button>'
      +'</div>'
      +'<div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--text-dim);margin-top:6px;line-height:1.6;">\u26a0 '+(isJP?'既にここにあります：':'Already exists in:')+'<br>'+locText+'</div>'
      +'</div>';
  }).join('');

  app.innerHTML=`<div class="container">

function toggleFreeGrubDupRemove(idx){
  if(!window._freeGrubRemoveSet) window._freeGrubRemoveSet=new Set();
  let s=window._freeGrubRemoveSet;
  if(s.has(idx)) s.delete(idx); else s.add(idx);
  renderFreeGrubDupReview();
}

function confirmFreeGrubSave(){
  let pending=window._pendingFreeGrub;
  if(!pending) return;
  let removeSet=window._freeGrubRemoveSet||new Set();
  let finalWords=pending.dupInfo.filter(function(d,idx){ return !removeSet.has(idx); }).map(function(d){ return d.word; });
  window._pendingFreeGrub=null;
  window._freeGrubRemoveSet=null;
  saveFreeGrub(pending.title, finalWords);
}

function saveFreeGrub(title, wordsArr){
  let isJP=appLang==='jp';
  if(!wordsArr||!wordsArr.length)return alert(isJP?'保存する単語が残っていません。':'No words left to save.');

  let groups=getProfileGroups(currentProfile);
  if(!Array.isArray(p.groupTitles)) p.groupTitles=[];
  groups.push(wordsArr);
  p.groupTitles[groups.length-1]=title;
  syncWordsFromGroups(currentProfile);
  saveAll();
  renderManageGrubFree();
}

function addKotobaToFreeGroup(groupIdx){
  let isJP=appLang==='jp';
  let kanji=(document.getElementById("inp-kanji-free").value||"").trim();

  let locations=findKanjiLocations(kanji);
  if(locations.length){
    let locText=locations.map(function(loc){
      return (loc.profile===currentProfile?(isJP?'このオペレーター':'this operator'):loc.profile)+' \u203a '+loc.label;

    let msg=(isJP?'「'+kanji+'」は既に次の場所にあります：\n':'"'+kanji+'" already exists in:\n')+locText+(isJP?'\n\nこのグループにも保存しますか？':'\n\nSave it in this grub anyway?');

  let groups=getProfileGroups(currentProfile);
  while(groups.length<=groupIdx) groups.push([]);

  g.push(makeWordObj(kanji,hira,arti));

  renderManageKotobaFree(groupIdx);

/* ── SHARE / BACKUP ── */
function _buildFullBackupPayload(){
  // Snapshot every piece of persistent state into one object.
  // Word notes (word.note) are stored inside profiles → words → note and are included automatically.
  return {
    _version: 11,
    _exportedAt: new Date().toISOString(),
    _appLang: appLang,
    // ── Core data ──
    profiles,
    globalStats,
    globalProfile,
    playedGroups,
    achievements,
    dailyMissions,
    sessionHistory,
    resetCount,
    // ── Shop / cosmetics ──
    shopData,
    // ── Settings / modifiers ──
    settings: {
      hardcoreMode,
      hardcoreTimer,
      answerDelay,
      stepSize,
      choiceCount,
      sessionWordLimit,
      randomOptions,
      bamboozleMode,
      secondChance,
      srsEnabled,
      hardFocusMode,
      intenseBenkyouMode,
      uiMode,
      sortTileMode,
      globalMode,
      glitchBaseChance,
    },
  };
}

function _applyFullBackupPayload(decoded, isJP){
  if(decoded.profiles) profiles=decoded.profiles;
  if(decoded.globalStats) globalStats=Object.assign({xp:0,level:0,totalCorrect:0,totalSessions:0,grindDays:0,lastDay:''},decoded.globalStats);
  if(decoded.globalProfile) globalProfile=Object.assign({name:'Commander',masteredKotoba:{},seenKotoba:{}},decoded.globalProfile);
  if(decoded.playedGroups) playedGroups=decoded.playedGroups;
  if(decoded.achievements) achievements=decoded.achievements;
  if(decoded.dailyMissions) dailyMissions=decoded.dailyMissions;
  if(Array.isArray(decoded.sessionHistory)) sessionHistory=decoded.sessionHistory;
  if(typeof decoded.resetCount==='number') resetCount=decoded.resetCount;
  if(decoded.shopData) shopData=Object.assign({coins:0,ownedUIs:['arknight'],activeUI:'arknight'},decoded.shopData);
  if(decoded.settings){
    let s=decoded.settings;
    if(typeof s.hardcoreMode==='boolean') hardcoreMode=s.hardcoreMode;
    if(typeof s.hardcoreTimer==='number') hardcoreTimer=Math.min(10000,Math.max(2000,s.hardcoreTimer));
    if(typeof s.answerDelay==='number') answerDelay=Math.max(0,s.answerDelay);
    if(typeof s.stepSize==='number') stepSize=Math.max(1,s.stepSize);
    if(typeof s.choiceCount==='number') choiceCount=Math.max(4,Math.min(8,s.choiceCount));
    if(typeof s.sessionWordLimit==='number') sessionWordLimit=Math.max(0,s.sessionWordLimit);
    if(typeof s.randomOptions==='boolean') randomOptions=s.randomOptions;
    if(typeof s.bamboozleMode==='boolean') bamboozleMode=s.bamboozleMode;
    if(typeof s.secondChance==='number') secondChance=Math.max(0,Math.min(100,s.secondChance));
    if(typeof s.srsEnabled==='boolean') srsEnabled=s.srsEnabled;
    if(typeof s.hardFocusMode==='boolean') hardFocusMode=s.hardFocusMode;
    if(typeof s.intenseBenkyouMode==='boolean') intenseBenkyouMode=s.intenseBenkyouMode;
    if(typeof s.uiMode==='string') uiMode=s.uiMode;
    if(typeof s.sortTileMode==='string') sortTileMode=s.sortTileMode;
    if(typeof s.globalMode==='boolean') globalMode=s.globalMode;
    if(typeof s.glitchBaseChance==='number') glitchBaseChance=s.glitchBaseChance;
    if(typeof s._appLang==='string') appLang=s._appLang;
  }
  if(typeof decoded._appLang==='string') appLang=decoded._appLang;
  // Rebuild global kotoba cross-reference
  Object.values(profiles).forEach(p=>{
    (p.words||[]).forEach(w=>{
      if(w.kanji){ globalProfile.seenKotoba[w.kanji]=true; if(isMasteredKotoba(w)) globalProfile.masteredKotoba[w.kanji]=true; }
    });
  });
  globalStats.level=calcLevel(globalStats.xp);
  saveAllNow();
}

function _confirmAndApplyImport(decoded, isJP){
  // Build info string about what's in the backup
  let bkProfiles=decoded.profiles?Object.keys(decoded.profiles).length:0;

  let bkLevel=decoded.globalStats?decoded.globalStats.level:0;
  let bkSessions=Array.isArray(decoded.sessionHistory)?decoded.sessionHistory.length:0;
  let bkDate=decoded._exportedAt?new Date(decoded._exportedAt).toLocaleDateString():'Unknown';
  let bkVer=decoded._version||'legacy';
  let infoMsg=isJP
    ?`バックアップ情報:\n・バックアップ日: ${bkDate}\n・バージョン: v${bkVer}\n・プロフィール: ${bkProfiles}個\n・総単語数: ${bkWords}語\n・グローバルLV: ${bkLevel}\n・セッション履歴: ${bkSessions}件\n\n⚠ 現在のデータはすべて上書きされます。\n続行しますか？`
    :`Backup info:\n• Date: ${bkDate}\n• Version: v${bkVer}\n• Profiles: ${bkProfiles}\n• Total words: ${bkWords}\n• Global LV: ${bkLevel}\n• Session history: ${bkSessions} entries\n\n⚠ ALL current data will be overwritten.\nContinue?`;

function updateSRS(word,isCorrect){
  // Always sync seen/mastered regardless of SRS toggle
  word.lastSeenAt=Date.now();
  if(word.kanji){
    globalProfile.seenKotoba[word.kanji]=true;
    if(isMasteredKotoba(word)) globalProfile.masteredKotoba[word.kanji]=true;
  }
  if(!srsEnabled)return; // SRS algorithm disabled — skip ease/interval updates
  if(!word.ease)word.ease=2.5;if(!word.interval)word.interval=1;
  if(isCorrect){word.ease=Math.min(3,word.ease+0.1);word.interval=Math.round(word.interval*word.ease);}
  else{word.ease=Math.max(1.3,word.ease-0.2);word.interval=1;}
  word.nextReview=Date.now()+(word.interval*24*60*60*1000);
}
function getBlockProgress(start,end){
  /* Progress starts at 0% for a fresh grub.
     Each kotoba contributes only the score ABOVE the neutral baseline of 20.
     coreScore range: 0–50. Baseline = 20. Useful range = 0–30 above baseline.
     Unseen kotoba (coreScore=20, no correct/wrong) → 0 contribution.
     Score above 20 → mapped linearly: (score-20)/30 per kotoba → avg across grub → 0–100%.
     100% only when ALL kotoba are mastered (all coreScore ≥ 37).
     Color bands still based on avg raw coreScore (0–50):
       0–15 → red, 16–27 → white, 28–37 → blue, 38–50 → green */
  let bw=words.slice(start,end);if(!bw.length)return{pct:0,avg:20};
  let cp=currentProfile&&profiles[currentProfile]?profiles[currentProfile]:null;
  if(!cp||!Array.isArray(cp.words))return{pct:0,avg:20};
  let total=bw.length;
  let totalScore=0,allMastered=true;
  bw.forEach(w=>{
    let o=cp.words.find(p=>p.kanji===w.kanji);
    let cs=o?getCoreScore(o):20;
    totalScore+=cs;
    if(!o||!isMasteredKotoba(o)) allMastered=false;
  });
  let avg=totalScore/total; // raw avg 0–50
  // Progress: only count above baseline 20, over a range of 30 points
  let aboveBase=Math.max(0,avg-20); // 0–30
  let pct=allMastered?100:Math.min(99,Math.round((aboveBase/30)*100));
  return{pct,avg};
}
/* coreScore color bands:
   0–15  → red    (#e74c3c)
   16–27 → white  (#d4cfc4 / var(--text))
   28–37 → blue   (#2196F3)
   38–50 → green  (#3a9a5c) → purple crown at 100% */
function getAvgScoreColor(avg,pct){
  if(pct>=100)return{color:"#b060e8",glow:"0 0 10px rgba(176,96,232,0.55)"};
  if(avg>=38)return{color:"#3a9a5c",glow:"0 0 6px rgba(58,154,92,0.35)"};
  if(avg>=28)return{color:"#2196F3",glow:"none"};
  if(avg>=16)return{color:"#d4cfc4",glow:"none"};
  return{color:"#e74c3c",glow:"none"};
}
function getRankStyle(pctOrObj){

  if(typeof pctOrObj==='object'&&pctOrObj!==null){

/* ── BAMBOOZLE: mutate a string into a convincing fake ── */
// Hiragana/Katakana confusion maps — visually/phonetically similar pairs
const HIRA_CONFUSABLES={
  'あ':['ぁ','ぉ'], 'い':['ぃ','え'], 'う':['ぅ','ぬ'], 'え':['い','ぇ'], 'お':['あ','ぉ','を'],
  'か':['が','な'], 'き':['ぎ','さ'], 'く':['ぐ','つ'], 'け':['げ','は'], 'こ':['ご','さ'],
  'さ':['ざ','き'], 'し':['じ','ち'], 'す':['ず','つ'], 'せ':['ぜ','さ'], 'そ':['ぞ','お'],
  'た':['だ','な'], 'ち':['じ','し'], 'つ':['づ','す','っ'], 'て':['で','に'], 'と':['ど','こ'],
  'な':['た','は'], 'に':['て','り'], 'ぬ':['め','む'], 'ね':['れ','め'], 'の':['め','ぬ'],
  'は':['ば','ぱ','け'], 'ひ':['び','ぴ','り'], 'ふ':['ぶ','ぷ'], 'へ':['べ','ぺ'], 'ほ':['ぼ','ぽ'],
  'ま':['も','な'], 'み':['に','り'], 'む':['も','め'], 'め':['ぬ','ね'], 'も':['む','ま'],
  'や':['ゃ','ゆ'], 'ゆ':['ゅ','よ'], 'よ':['ょ','ゆ'],
  'ら':['ら','た'], 'り':['に','ひ'], 'る':['ゐ','ろ'], 'れ':['ね','ろ'], 'ろ':['る','れ'],
  'わ':['は','ば'], 'を':['お','を'],
  'が':['か','ざ'], 'ぎ':['き','じ'], 'ぐ':['く','ず'], 'げ':['け','べ'], 'ご':['こ','ぞ'],
  'ざ':['さ','が'], 'じ':['し','ち'], 'ず':['す','づ'], 'ぜ':['せ','で'], 'ぞ':['そ','ご'],
  'だ':['た','ば'], 'ぢ':['じ','ち'], 'づ':['ず','つ'], 'で':['て','べ'], 'ど':['と','ぞ'],
  'ば':['は','ぱ','だ'], 'び':['ひ','ぴ'], 'ぶ':['ふ','ぷ'], 'べ':['へ','で'], 'ぼ':['ほ','ど'],
  'ぱ':['は','ば'], 'ぴ':['ひ','び'], 'ぷ':['ふ','ぶ'], 'ぺ':['へ','べ'], 'ぽ':['ほ','ぼ'],
  'っ':['つ','っ'], 'ん':['ん','む'],
  'う゛':['ぶ','ぷ'],
};
// Small kana elongation tricks
const SMALL_TO_BIG={'ぁ':'あ','ぃ':'い','ぅ':'う','ぇ':'え','ぉ':'お','っ':'つ','ゃ':'や','ゅ':'ゆ','ょ':'よ','ゎ':'わ'};
const BIG_TO_SMALL={'あ':'ぁ','い':'ぃ','う':'ぅ','え':'ぇ','お':'ぉ','つ':'っ','や':'ゃ','ゆ':'ゅ','よ':'ょ'};

function mutateBamboozle(str, seed){
  // Different mutation strategies — chosen based on seed to get variety
  let chars=[...str]; // split properly for multi-byte
  let mutations=[...chars];
  let len=chars.length;
  if(len===0) return str;

  // Pick 1-3 positions to mutate, weighted towards middle chars (not position 0)
  let positions=[];
  for(let i=1;i<len;i++) positions.push(i); // skip first char so start looks right
  shuffle(positions);
  let mutCount=Math.min(len<=3?1:len<=6?2:3, positions.length);
  let toMutate=positions.slice(0,mutCount);

  toMutate.forEach(i=>{
    let c=chars[i];
    let roll=(seed+i)%5; // deterministic-ish per position+seed

    if(roll===0 && HIRA_CONFUSABLES[c]){
      // Swap with visually similar char
      let opts=HIRA_CONFUSABLES[c];
      mutations[i]=opts[(seed+i)%opts.length];
    } else if(roll===1 && BIG_TO_SMALL[c]){
      // Shrink a normal kana to small version (e.g. う→ぅ)
      mutations[i]=BIG_TO_SMALL[c];
    } else if(roll===2 && SMALL_TO_BIG[c]){
      // Grow a small kana to big (e.g. っ→つ)
      mutations[i]=SMALL_TO_BIG[c];
    } else if(roll===3 && i<len-1){
      // Delete one character (shorter word)
      mutations.splice(i,1);
    } else if(roll===4 && i<len){
      // Duplicate a character (longer word)
      mutations.splice(i,0,c);
    } else if(HIRA_CONFUSABLES[c]){
      let opts=HIRA_CONFUSABLES[c];
      mutations[i]=opts[0];
    }
    // If no mutation matched, leave char as-is (still counts as a mutation attempt)
  });

  return mutations.join('');
}

function getBamboozleOptions(correct, needed){
  let results=new Set();
  let attempts=0;
  // Try different seeds to get needed unique mutations
  while(results.size<needed && attempts<needed*20){
    let fake=mutateBamboozle(correct, attempts);
    if(fake && fake!==correct && ![...results].includes(fake)) results.add(fake);
    attempts++;
  }
  // If we couldn't get enough unique mutations (e.g. very short word), pad with confusable swaps
  let arr=[...results];
  if(arr.length<needed){
    // Last resort: append/prepend small kana or repeat last char
    let extras=[correct+'ー', correct.slice(0,-1), correct+'っ', 'お'+correct.slice(1)];
    extras.forEach(e=>{if(e!==correct&&!arr.includes(e)&&arr.length<needed)arr.push(e);});
  }
  return arr.slice(0,needed);
}


function similarityScore(a, b){
  if(!a||!b) return 0;
  a=a.toLowerCase(); b=b.toLowerCase();
  // Shared starting characters (prefix match)
  let prefix=0;
  for(let i=0;i<Math.min(a.length,b.length);i++){if(a[i]===b[i])prefix++;else break;}
  // Shared ending characters (suffix match)
  let suffix=0;
  for(let i=1;i<=Math.min(a.length,b.length);i++){if(a[a.length-i]===b[b.length-i])suffix++;else break;}
  // Character overlap (unordered shared chars)
  let setA=new Set(a.split('')), setB=new Set(b.split(''));
  let shared=[...setA].filter(c=>setB.has(c)).length;
  let union=new Set([...setA,...setB]).size;
  let jaccardChar=union>0?shared/union:0;
  // Length similarity (penalise very different lengths)
  let lenSim=1-Math.abs(a.length-b.length)/Math.max(a.length,b.length,1);
  // Shared word tokens (for meaning/arti strings like "to eat")
  let tokA=a.split(/\s+/), tokB=b.split(/\s+/);
  let tokShared=tokA.filter(t=>t.length>1&&tokB.includes(t)).length;
  let tokMax=Math.max(tokA.length,tokB.length,1);
  let tokenSim=tokShared/tokMax;
  // Weighted total
  return (prefix*1.5 + suffix*1.0 + jaccardChar*2.0 + lenSim*1.0 + tokenSim*3.0);
}

function getOptions(correct){
  let needed=choiceCount-1;

  // BAMBOOZLE MODE: all distractors are mutations of the correct answer
  if(bamboozleMode){
    return getBamboozleOptions(correct, needed);
  }

  // INTENSE BENKYOU MODE: pull distractors from ALL words across all profiles,
  // ranked by kanji+hira structural similarity (shared kanji chars, similar reading)
  if(intenseBenkyouMode){
    // Collect all words from every profile (deduplicated by kanji)
    let allWordsMap=new Map();
    Object.values(profiles).forEach(p=>{
      (p.words||[]).forEach(w=>{
        if(w&&w.kanji&&!allWordsMap.has(w.kanji)) allWordsMap.set(w.kanji,w);
      });
    });
    // Also include current session words
    (isCustomMode?customPool:words).forEach(w=>{
      if(w&&w.kanji&&!allWordsMap.has(w.kanji)) allWordsMap.set(w.kanji,w);
    });
    let allWordsList=[...allWordsMap.values()];

    function getAns(w){
      if(gameType==="kanji-hira") return w.hira;
      if(gameType==="kanji-arti") return w.arti;
      return w.kanji;
    }

    // Kanji character overlap score (for kanji-based game types)
    function kanjiCharSim(a, b){
      if(!a||!b) return 0;
      let setA=new Set([...a]), setB=new Set([...b]);
      let shared=[...setA].filter(c=>setB.has(c)&&/[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff]/.test(c)).length;
      let union=new Set([...setA,...setB]).size;
      return union>0?shared/union:0;
    }

    // Hira/reading similarity — levenshtein-based normalized score
    function hiraSim(a, b){
      if(!a||!b) return 0;
      let dist=levenshtein(a,b);
      let maxLen=Math.max(a.length,b.length,1);
      return 1-dist/maxLen;
    }

    // Combined intense benkyou similarity: kanji structure + reading/answer similarity
    function intenseSim(candidate, sourceWord){
      let ansA=correct;
      let ansB=candidate;
      // Answer field similarity (what the player sees as option)
      let ansSim=similarityScore(ansA,ansB);
      // Kanji structural similarity between source word kanji and sourceWord kanji
      let ks=0, hs=0;
      if(gameType==="kanji-hira"||gameType==="kanji-arti"){
        // Question is the kanji — compare candidate's parent kanji to currentWord.kanji
        ks=kanjiCharSim(currentWord.kanji||'', sourceWord.kanji||'');
        hs=hiraSim(currentWord.hira||'', sourceWord.hira||'');
      } else if(gameType==="hira-kanji"||gameType==="arti-kanji"){
        // Question is hira/arti — compare kanji of candidate and answer similarity
        ks=kanjiCharSim(currentWord.kanji||'', sourceWord.kanji||'');
        hs=hiraSim(currentWord.hira||'', sourceWord.hira||'');
      }
      // Weight: kanji char overlap ×3, reading sim ×2, answer sim ×1 (ensures high structural sim)
      return ks*3 + hs*2 + ansSim*0.5;
    }

    let candidates=allWordsList
      .filter(w=>getAns(w)&&getAns(w)!==correct&&w.kanji!==currentWord.kanji)
      .map(w=>({w, ans:getAns(w), score:intenseSim(getAns(w),w)}));

    // Sort descending by score — most similar first
    candidates.sort((a,b)=>b.score-a.score);

    // Deduplicate by answer string, take top needed
    let seen=new Set(), result=[];
    for(let c of candidates){
      if(!seen.has(c.ans)){seen.add(c.ans);result.push(c.ans);}
      if(result.length>=needed) break;
    }
    // Pad if still not enough
    if(result.length<needed){
      let allAns=[...new Set(allWordsList.map(getAns))].filter(x=>x&&x!==correct&&!result.includes(x));
      result=[...result,...shuffle(allAns)].slice(0,needed);
    }
    return result.slice(0,needed);
  }

  // Distractor pool: full vocab when randomOptions ON, else current group only
  let groupPool=isCustomMode?customPool:words.slice(currentBlockStart,currentBlockEnd);
  let basePool=randomOptions?words:groupPool;
  if(basePool.length<choiceCount) basePool=words;

  // Extract the answer string for each word in the pool
  function getAns(w){
    if(gameType==="kanji-hira") return w.hira;
    if(gameType==="kanji-arti") return w.arti;
    return w.kanji;
  }

  // Build candidate list (unique, not the correct answer)
  let candidates=[...new Set(basePool.map(getAns))].filter(x=>x&&x!==correct);

  if(randomOptions && candidates.length>=needed){
    // Score each candidate by similarity to the correct answer
    let scored=candidates.map(ans=>({ans, score:similarityScore(correct, ans)}));
    scored.sort((a,b)=>b.score-a.score);

    let similarCount=Math.ceil(needed*0.6);
    let randomCount=needed-similarCount;
    let similar=scored.slice(0,Math.min(similarCount*3,scored.length));
    let rest=scored.slice(similarCount*3);
    let chosenSimilar=shuffle(similar).slice(0,similarCount).map(x=>x.ans);
    let chosenRandom=shuffle(rest.length>=randomCount?rest:scored).slice(0,randomCount).map(x=>x.ans);
    let merged=[...new Set([...chosenSimilar,...chosenRandom])];
    if(merged.length<needed){
      let extra=shuffle(candidates.filter(x=>!merged.includes(x)));
      merged=[...merged,...extra].slice(0,needed);
    }
    return merged.slice(0,needed);
  }

  // Default: shuffle and slice
  return shuffle(candidates).slice(0,needed);
}
